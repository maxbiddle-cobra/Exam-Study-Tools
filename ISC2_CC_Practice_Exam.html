{type:"match",d:"Network Security",q:"Match each OSI layer to the device or protocol that primarily operates at that layer.",terms:["Layer 1  --  Physical","Layer 2  --  Data Link","Layer 3  --  Network","Layer 7  --  Application"],answers:["Hub / repeater","Switch","Router","Firewall (NGFW)"],e:"Hubs broadcast at Layer 1; switches use MAC addresses at Layer 2; routers use IP at Layer 3; next-gen firewalls inspect application-layer content at Layer 7."},
{type:"match",d:"Security Principles",q:"Match each type of security control to its correct category.",terms:["Firewall blocking traffic","Security awareness training","Security camera recording","Restoring from backup after an attack"],answers:["Technical / preventive","Administrative / preventive","Physical / detective","Corrective"],e:"Firewalls are technical preventive controls. Training is administrative. Cameras are physical detective controls. Restoring from backup corrects the damage after an incident."},
{type:"match",d:"Access Controls",q:"Match each authentication factor to its correct category.",terms:["Fingerprint scan","Hardware token (RSA key fob)","Password","Location-based (GPS)"],answers:["Something you are","Something you have","Something you know","Somewhere you are"],e:"Biometrics = something you are. Physical tokens = something you have. Passwords/PINs = something you know. Geographic location = somewhere you are. MFA combines two or more categories."},
{type:"match",d:"Business Continuity & Incident Response",q:"Match each backup type to its correct description.",terms:["Full backup","Incremental backup","Differential backup","Mirror backup"],answers:["Copies all data every time","Copies only data changed since last backup of any type","Copies all data changed since last full backup","Real-time exact copy of source data"],e:"Full: copies everything. Incremental: fastest backup, slowest restore (needs full + all incrementals). Differential: grows larger each day but only needs full + latest differential to restore. Mirror: exact duplicate, no versioning."},
{type:"match",d:"Security Principles",q:"Match each cryptographic term to its correct description.",terms:["Symmetric encryption","Asymmetric encryption","Hashing","Digital signature"],answers:["Uses one shared secret key for encryption and decryption","Uses a public/private key pair","One-way function producing a fixed-length digest","Proves authenticity and non-repudiation using a private key"],e:"Symmetric (AES): one key, fast. Asymmetric (RSA): key pair, solves key distribution. Hashing (SHA-256): integrity verification, not reversible. Digital signatures: combines hashing with asymmetric encryption for non-repudiation."},
{type:"match",d:"Network Security",q:"Match each network attack to its correct description.",terms:["Phishing","SQL injection","DoS attack","Man-in-the-middle"],answers:["Social engineering via deceptive emails or messages","Inserting malicious code into database input fields","Overwhelming a target with traffic to deny service","Secretly intercepting communications between two parties"],e:"Phishing targets humans. SQL injection targets databases. DoS exhausts resources. MitM intercepts communications  --  all require different defensive controls."},
{type:"match",d:"Access Controls",q:"Match each access control model to its defining characteristic.",terms:["MAC (Mandatory)","DAC (Discretionary)","RBAC (Role-Based)","ABAC (Attribute-Based)"],answers:["System enforces access based on security labels  --  users cannot override","Resource owner decides who can access their data","Permissions assigned based on organizational role","Access decisions use multiple attributes simultaneously (user, resource, environment)"],e:"MAC is system-enforced and rigid (used in military). DAC gives owners control (most OS file systems). RBAC simplifies administration by grouping permissions into roles. ABAC is the most flexible and fine-grained."},
{type:"match",d:"Security Operations",q:"Match each security operations term to its correct definition.",terms:["SIEM","SOC","IoC","SOAR"],answers:["Aggregates and correlates logs from multiple sources to detect threats","Centralized team monitoring and responding to security incidents 24/7","Forensic evidence indicating a system may be compromised","Platform automating security workflows and incident response"],e:"SIEM = log aggregation/correlation. SOC = the team. IoC = indicators of compromise (IPs, hashes, domains). SOAR = automation of repetitive SOC tasks and orchestration across tools."},
{type:"match",d:"Business Continuity & Incident Response",q:"Match each recovery site type to its correct description.",terms:["Hot site","Warm site","Cold site","Cloud failover"],answers:["Fully operational duplicate  --  immediate failover","Partially equipped  --  needs some configuration before use","Basic infrastructure only  --  must procure and configure equipment","On-demand scalable recovery using cloud provider infrastructure"],e:"Hot sites are fastest but most expensive. Cold sites are cheapest but slowest. Warm sites balance cost and speed. Cloud failover offers elasticity without physical site costs but requires network connectivity."},
{type:"match",d:"Security Principles",q:"Match each risk response strategy to its correct example.",terms:["Risk avoidance","Risk transference","Risk mitigation","Risk acceptance"],answers:["Stop collecting sensitive data you don't need","Purchase cyber insurance","Implement multi-factor authentication","Document known risk and continue without additional controls"],e:"Avoidance: eliminate the risk source. Transference: shift financial burden (insurance). Mitigation: reduce likelihood or impact. Acceptance: acknowledge and monitor within tolerance."},
{type:"order",d:"Business Continuity & Incident Response",q:"Place the NIST incident response lifecycle phases in the correct order (1 = first).",steps:["Preparation","Detection and analysis","Containment, eradication and recovery","Post-incident activity"],e:"NIST SP 800-61: Preparation (build capability) -> Detection & Analysis (identify incident) -> Containment/Eradication/Recovery (stop and fix) -> Post-Incident Activity (lessons learned)."},
{type:"order",d:"Business Continuity & Incident Response",q:"Place the steps for restoring from an incremental backup in the correct order (1 = first).",steps:["Restore the last full backup","Apply the first incremental backup","Apply each subsequent incremental in order","Verify data integrity and resume operations"],e:"Incremental restore requires the full backup first, then each incremental applied in chronological order. Skipping any incremental will result in data loss for that period."},
{type:"order",d:"Security Principles",q:"Place the steps of the risk management process in the correct order (1 = first).",steps:["Identify assets and threats","Assess likelihood and impact","Select and implement controls","Monitor and review effectiveness"],e:"Risk management is cyclical: identify what you have and what threatens it -> assess probability and impact -> treat the risk with controls -> continuously monitor whether controls remain effective."},
{type:"order",d:"Access Controls",q:"Place the steps of the identity and access management (IAM) user lifecycle in the correct order (1 = first).",steps:["Identity proofing and account creation","Role assignment and access provisioning","Periodic access recertification","Account de-provisioning on departure"],e:"IAM lifecycle: verify identity and create account -> assign appropriate role/permissions -> periodically review that access is still appropriate -> immediately revoke all access on departure."},
{type:"order",d:"Network Security",q:"Place the steps of the TCP three-way handshake in the correct order (1 = first).",steps:["Client sends SYN packet to server","Server responds with SYN-ACK","Client sends ACK to complete connection","Data transfer begins"],e:"TCP handshake: SYN (client requests) -> SYN-ACK (server acknowledges and responds) -> ACK (client confirms). SYN flood attacks exploit this by sending many SYNs without completing the handshake."},
{type:"order",d:"Security Operations",q:"Place the steps of the vulnerability management cycle in the correct order (1 = first).",steps:["Asset discovery and inventory","Vulnerability scanning","Risk-based prioritization","Remediation and verification"],e:"Vulnerability management: know what you have -> scan for weaknesses -> prioritize by risk (CVSS score, exploitability, asset value) -> fix and verify. This cycle never stops."},
{type:"order",d:"Business Continuity & Incident Response",q:"After a ransomware attack, place the recovery steps in the correct order (1 = first).",steps:["Isolate and contain affected systems","Eradicate the malware and close the entry point","Restore from clean offline backup","Resume operations and conduct post-incident review"],e:"Containment first to prevent spread -> eradication removes the threat -> restoration from clean backups (not network-connected ones, which may also be encrypted) -> lessons learned."},
{type:"order",d:"Security Principles",q:"Place the steps for implementing data classification in the correct order (1 = first).",steps:["Identify and inventory all data assets","Assign classification levels based on sensitivity","Apply appropriate controls per classification","Train employees on handling requirements"],e:"You cannot classify what you haven't inventoried. Classification drives control selection. Controls without training are undermined by human error. All four steps build on each other."},
{type:"hotspot",d:"Network Security",q:"Click the component in the network diagram that represents the DMZ (Demilitarized Zone).",scene:"dmz_network",correct:"b",zones:{"a":{label:"Zone A  --  Internet (untrusted)",hint:"This is the untrusted internet  --  not the DMZ."},"b":{label:"Zone B  --  middle segment",hint:"Correct! The DMZ sits between both firewalls, hosting public-facing servers."},"c":{label:"Zone C  --  Internal network",hint:"This is the trusted internal network  --  not the DMZ."}},e:"The DMZ sits between the outer and inner firewalls. Public-facing servers (web, mail) go here so that if they are compromised, the attacker still faces the inner firewall before reaching internal systems."},
