{d:"Network Security",q:"Which of the following is a common sign of a phishing email?",o:["It comes from a known colleague","It uses the company's official email system","It contains urgent requests, unexpected attachments, or links to unfamiliar domains","It has correct spelling and grammar"],a:2,e:"Phishing emails typically create urgency, use spoofed or similar-looking sender addresses, contain suspicious links (hover to check), or include unexpected attachments. Training users to recognize these signs is critical."},
{d:"Network Security",q:"Which of the following BEST describes 'network baselining'?",o:["Blocking all non-essential network traffic","Documenting normal network behavior to identify anomalies","Setting all devices to factory defaults","Encrypting all network communications"],a:1,e:"Network baselining records normal traffic patterns, volumes, and behavior. Deviations from the baseline can indicate attacks, misconfigurations, or unusual activity requiring investigation."},
{d:"Network Security",q:"Email authentication standards like SPF, DKIM, and DMARC are designed to:",o:["Speed up email delivery","Prevent email spoofing and verify that emails come from legitimate senders","Compress email attachments","Encrypt email content"],a:1,e:"SPF specifies authorized mail servers; DKIM adds digital signatures; DMARC defines policy when checks fail. Together they significantly reduce email spoofing and phishing effectiveness."},
{d:"Network Security",q:"Which of the following BEST describes 'data in transit'?",o:["Data stored on a backup tape","Data processed in RAM","Data stored in a database","Data actively moving across a network"],a:3,e:"Data in transit is data moving between systems over a network. TLS, VPNs, and IPSec protect confidentiality and integrity of data in transit against eavesdropping and tampering."},
{d:"Network Security",q:"What is the purpose of a Web Application Firewall (WAF)?",o:["To encrypt web server databases","To manage web server user accounts","To protect physical web servers","To filter and monitor HTTP traffic to protect web applications from attacks like SQLi and XSS"],a:3,e:"A WAF inspects HTTP/HTTPS traffic to and from web applications, filtering attacks like SQL injection, XSS, and CSRF. It is an application-layer control complementing network firewalls."},
{d:"Network Security",q:"Which of the following describes 'social engineering' in the context of cybersecurity?",o:["Physically breaking into a data center","Installing malware via USB drives","Hacking through technical exploits","Manipulating people into divulging information or performing actions that compromise security"],a:3,e:"Social engineering exploits human psychology rather than technical vulnerabilities  --  phishing, vishing, pretexting, baiting, and tailgating are all social engineering techniques."},
{d:"Network Security",q:"What is 'war driving'?",o:["Driving around to discover and map wireless networks, often to find unsecured access points","A physical attack on network equipment","A technique to intercept cellular communications","A brute force attack on WiFi passwords"],a:0,e:"War driving involves using a vehicle equipped with a laptop and wireless adapter to locate wireless networks. Attackers look for unsecured or poorly secured networks to exploit."},
{d:"Network Security",q:"Which of the following is the BEST protection against brute force password attacks?",o:["Using only uppercase letters in passwords","Using the same password across all accounts","Increasing password expiration frequency","Implementing account lockout policies and MFA"],a:3,e:"Account lockout (limiting failed attempts) directly counters brute force. MFA adds a second factor attackers also need to compromise. Together they make brute force impractical."},
{d:"Network Security",q:"Which of the following BEST describes 'network hardening'?",o:["Physically reinforcing server hardware","Installing additional networking equipment","Reducing the attack surface by disabling unnecessary services, ports, and features","Increasing network bandwidth"],a:2,e:"Network hardening reduces attack surface: disable unused ports/services, remove default credentials, apply patches, enforce strong configurations, and follow CIS benchmarks."},
{d:"Network Security",q:"Encryption at rest protects data by:",o:["Preventing unauthorized users from logging into systems","Compressing data to save storage space","Encrypting data as it moves across the network","Encrypting data stored on disks and databases so it is unreadable if the storage media is stolen"],a:3,e:"Encryption at rest protects stored data  --  if physical media is stolen or a database is breached, encrypted data is unreadable without the decryption key."},
{d:"Security Operations",q:"A security patch is BEST described as:",o:["A type of network firewall","A fix that addresses a known vulnerability in software","A backup of system files","A new software feature"],a:1,e:"A security patch is a software update fixing known vulnerabilities. Timely patch management is one of the most effective controls  --  a large percentage of breaches exploit known, patchable vulnerabilities."},
{d:"Security Operations",q:"Data Loss Prevention (DLP) tools are primarily used to:",o:["Detect and prevent unauthorized data exfiltration","Encrypt all data at rest","Speed up network performance","Manage user passwords"],a:0,e:"DLP solutions monitor, detect, and prevent unauthorized transmission or storage of sensitive data, helping enforce data handling policies and prevent both accidental and intentional data leakage."},
{d:"Security Operations",q:"A security baseline is BEST described as:",o:["A list of all known threats","The maximum security level possible","A record of past incidents","A minimum set of security controls and configurations that must be met"],a:3,e:"A security baseline defines the minimum acceptable security configuration. Systems below baseline are non-compliant and must be remediated. CIS Benchmarks are a widely used baseline framework."},
{d:"Security Operations",q:"Security log management is important primarily because:",o:["Logs reduce network bandwidth","Logs improve system performance","Logs eliminate the need for backups","Logs provide an audit trail for detecting and investigating security incidents"],a:3,e:"Logs record events providing audit trails for anomaly detection, incident investigation, compliance demonstration, and forensic analysis. Logs are only useful if they are reviewed."},
{d:"Security Operations",q:"The MOST effective defense against phishing attacks is:",o:["Installing a router","User security awareness training","Increasing storage capacity","Implementing RAID"],a:1,e:"Phishing targets humans, not technology. Awareness training teaching users to recognize and report suspicious emails is the most effective defense, complemented by technical controls like email filtering."},
{d:"Security Operations",q:"Change management in IT security is designed to:",o:["Ensure changes are reviewed, approved, and documented to minimize risk","Allow unlimited system changes for faster development","Prevent any modifications to production systems","Automatically apply software updates"],a:0,e:"Change management provides a structured process for requesting, reviewing, approving, implementing, and documenting changes to reduce the risk of unauthorized or disruptive modifications."},
{d:"Security Operations",q:"What is the purpose of vulnerability scanning?",o:["To back up system configurations","To actively exploit systems","To identify known weaknesses before attackers do","To encrypt sensitive data"],a:2,e:"Vulnerability scanning uses automated tools to identify known weaknesses, misconfigurations, and unpatched software. It is proactive  --  finding and fixing issues before attackers exploit them."},
{d:"Security Operations",q:"A SIEM (Security Information and Event Management) system is primarily used to:",o:["Encrypt database records","Block network intrusions","Manage user passwords","Aggregate and correlate security logs from multiple sources to detect threats"],a:3,e:"A SIEM collects, aggregates, and correlates log data from across the environment, providing real-time analysis, alerting, and dashboards for security teams to detect and respond to threats."},
{d:"Security Operations",q:"Which of the following BEST describes 'configuration management'?",o:["Managing network traffic configurations","Configuring backup schedules","Managing user account configurations","Maintaining control over system configurations to ensure consistency and security"],a:3,e:"Configuration management tracks and controls system configurations to ensure they remain secure and consistent. Changes are documented, and configurations are regularly audited against baselines."},
{d:"Security Operations",q:"A 'zero-day exploit' refers to:",o:["A vulnerability in zero-day-old software","An attack that occurs at midnight","An attack that takes zero seconds to execute","An exploit targeting a vulnerability for which no patch exists"],a:3,e:"A zero-day exploit attacks a vulnerability unknown to the vendor or with no available patch. The name refers to zero days being available to defenders to fix the issue."},
{d:"Security Operations",q:"Which of the following is the BEST description of 'security hardening'?",o:["Adding more security staff","Reducing a system's attack surface by disabling unnecessary features, services, and accounts","Increasing system performance","Installing additional hardware"],a:1,e:"Security hardening reduces attack surface: disabling unused services, removing default accounts, patching software, applying least privilege, and following CIS Benchmarks or vendor hardening guides."},
{d:"Security Operations",q:"What does 'patch management' involve?",o:["Configuring firewall rules","Managing employee access badges","Identifying, testing, and applying software updates to fix vulnerabilities and bugs","Managing physical cables and hardware"],a:2,e:"Patch management systematically identifies available patches, tests them for compatibility, deploys them in a timely manner, and verifies successful installation. Delayed patching is a top cause of breaches."},
{d:"Security Operations",q:"Which of the following BEST describes 'security monitoring'?",o:["Installing security cameras","Testing system backups","Creating security policies","Continuously reviewing security events and alerts to detect threats and anomalies"],a:3,e:"Security monitoring involves continuously reviewing logs, alerts, and events from systems, networks, and security tools to detect suspicious activity and enable timely incident response."},
{d:"Security Operations",q:"Antivirus software protects systems by:",o:["Identifying and removing known malware using signatures and heuristics","Encrypting all files","Managing user access rights","Backing up data automatically"],a:0,e:"Antivirus software detects and removes malware using signature databases (known malware patterns) and heuristic analysis (behavior-based detection of unknown threats). Regular updates are critical."},
{d:"Security Operations",q:"Which of the following BEST describes 'endpoint security'?",o:["Security policies for physical office spaces","Security focused only on network perimeter devices","Security solutions deployed on individual devices (laptops, phones, servers) to detect and prevent threats","Security controls for cloud services only"],a:2,e:"Endpoint security protects individual devices  --  antivirus, EDR (Endpoint Detection & Response), host firewalls, disk encryption, and patch management applied at the device level."},
{d:"Security Operations",q:"A SOC (Security Operations Center) is primarily responsible for:",o:["Managing HR and payroll systems","Physical security of facilities","Monitoring, detecting, analyzing, and responding to security incidents","Developing software applications"],a:2,e:"A SOC is a centralized team that monitors security alerts and events 24/7, investigates incidents, and coordinates response. It is the operational heart of an organization's security program."},
{d:"Security Operations",q:"Which of the following is a key principle of forensic evidence collection?",o:["Delete logs to prevent misuse","Share evidence freely with all parties","Preserve evidence in its original state and maintain a documented chain of custody","Modify evidence to make it easier to analyze"],a:2,e:"Forensic evidence must be preserved unchanged and documented meticulously (chain of custody). Modification or improper handling can render evidence inadmissible in legal proceedings."},
{d:"Security Operations",q:"What is 'vulnerability management'?",o:["Managing physical security vulnerabilities only","An ongoing process of identifying, classifying, prioritizing, and remediating security vulnerabilities","A one-time security assessment","Managing user account vulnerabilities"],a:1,e:"Vulnerability management is a continuous cycle: discover assets, scan for vulnerabilities, prioritize by risk, remediate, and verify. It is not a one-time activity but an ongoing program."},
{d:"Security Operations",q:"Which of the following BEST describes 'log retention'?",o:["Keeping logs for a defined period to support investigations, audits, and compliance requirements","Deleting logs daily to save space","Sharing logs with all employees","Encrypting all log files permanently"],a:0,e:"Log retention policies define how long logs are kept. Retention periods are driven by compliance requirements (PCI-DSS, HIPAA, SOX), investigation needs, and the time attackers may have been present undetected."},
{d:"Security Operations",q:"A 'threat intelligence' feed provides:",o:["Weather-based risk forecasts","Physical security alerts","Up-to-date information on current threats, attacker tactics, indicators of compromise (IoCs), and vulnerabilities","Employee performance metrics"],a:2,e:"Threat intelligence provides actionable information about threats: attacker TTPs, malware samples, IoCs (IPs, hashes, domains), and vulnerability information to improve proactive defenses."},
{d:"Security Operations",q:"Which of the following BEST describes 'data sanitization'?",o:["Securely erasing data so it cannot be recovered before media is repurposed or disposed of","Backing up data before deletion","Cleaning up poorly formatted data","Encrypting data before transmission"],a:0,e:"Data sanitization (secure erasure/destruction) ensures data cannot be recovered from media being repurposed or disposed of. Methods include overwriting, degaussing, and physical destruction."},
{d:"Security Operations",q:"Why is it important to apply the 'principle of least functionality' to systems?",o:["To simplify user interfaces","To reduce licensing costs","To maximize system performance","To reduce the attack surface by only enabling functions, services, and features that are needed"],a:3,e:"Least functionality means removing or disabling all features not required for the system's purpose. Each unnecessary service or feature is a potential attack vector."},
{d:"Security Operations",q:"What is 'network traffic analysis' used for in security operations?",o:["Configuring network hardware","Managing IP address assignments","Detecting anomalies, malware communications, and unauthorized data transfers by analyzing network traffic patterns","Designing network diagrams"],a:2,e:"Network traffic analysis examines patterns, volumes, and content of network traffic to detect malware C2 communications, data exfiltration, policy violations, and anomalous behavior."},
{d:"Security Operations",q:"Which of the following is the PRIMARY goal of a security audit?",o:["To independently verify that security controls are in place, functioning, and meeting requirements","To design new security controls","To train security staff","To find and exploit vulnerabilities"],a:0,e:"A security audit independently assesses whether controls exist, are implemented correctly, and meet defined requirements. Audits provide assurance to management and stakeholders."},
{d:"Security Operations",q:"Which of the following BEST describes 'security event' vs. 'security incident'?",o:["Security events are physical; incidents are digital","A security event is any observable occurrence; a security incident is an event with adverse consequences requiring a response","They are the same thing","A security incident is minor; an event is major"],a:1,e:"A security event is any observable system or network occurrence. A security incident is an event confirmed to have caused or be likely to cause harm, requiring formal response."},
{d:"Security Operations",q:"Which of the following is an example of 'data exfiltration'?",o:["A user downloading authorized software","System logs filling up storage","An attacker sending stolen data from inside the network to an external location","An employee encrypting their laptop"],a:2,e:"Data exfiltration is the unauthorized transfer of data from an organization. DLP tools, egress filtering, and monitoring of unusual outbound traffic help detect and prevent it."},
{d:"Security Operations",q:"Which of the following BEST describes the purpose of a 'security awareness program'?",o:["To teach advanced hacking techniques to all employees","To ensure all employees understand security threats, policies, and their role in protecting the organization","To replace technical security controls","To train only IT security staff"],a:1,e:"A security awareness program builds a security-conscious culture by ensuring all employees recognize threats, know policies, and understand their responsibilities in protecting organizational assets."},
{d:"Security Operations",q:"Which of the following is the MOST important reason to keep software up to date?",o:["Updates fix known vulnerabilities that attackers actively exploit","Updates improve system speed","Updates are required by vendors","New versions have better interfaces"],a:0,e:"Most successful attacks exploit known, patchable vulnerabilities. Prompt patching eliminates these windows of exposure. Unpatched systems remain vulnerable even when patches are available."}
];
const MC_BANK5=[
{d:"Security Operations",q:"What is 'asset management' in the context of security?",o:["Managing financial assets","Tracking employee attendance","Identifying, inventorying, and tracking all IT assets to ensure they are secured and managed appropriately","Managing physical security guards"],a:2,e:"Security asset management identifies all hardware, software, and data assets, their owners, classifications, and security requirements. You cannot protect what you don't know you have."},
{d:"Security Operations",q:"Which of the following BEST describes a 'security information and event management' (SIEM) correlation rule?",o:["A rule that encrypts all log data","Logic that connects multiple events across systems to detect attack patterns that no single event would reveal","A rule that blocks all suspicious traffic","A configuration standard for firewalls"],a:1,e:"SIEM correlation rules link related events across different systems and timeframes. A single failed login is noise; 1000 failed logins followed by a success across multiple accounts is a pattern indicating a brute force attack."},
{d:"Security Operations",q:"Which of the following is the BEST example of 'security by obscurity'?",o:["Implementing MFA","Using strong encryption","Using complex passwords","Hiding system details hoping attackers won't find them"],a:3,e:"Security by obscurity relies on concealing implementation details as a defense. It is considered a weak control because once the secret is out, protection is lost. It should supplement, never replace, real controls."},
{d:"Security Operations",q:"Which of the following BEST describes 'end-of-life' (EOL) software risk?",o:["Software no longer receiving security patches, leaving known vulnerabilities permanently unaddressed","Software that is running slowly","Software that requires expensive licenses","Software that is too new to be trusted"],a:0,e:"EOL software receives no more security patches. Known vulnerabilities are never fixed, creating permanent risk. Organizations should plan migrations well before EOL dates."},
{d:"Security Operations",q:"What is 'multitier architecture' in application security?",o:["Separating application components (presentation, logic, data) into distinct layers with independent security controls","Using multiple passwords for application access","Installing multiple firewalls","Using multiple cloud providers"],a:0,e:"Multitier (N-tier) architecture separates presentation, business logic, and data tiers. Each layer has independent access controls and can be secured and scaled separately, limiting blast radius of a breach."},
{d:"Security Operations",q:"Which of the following is the PRIMARY purpose of a security risk register?",o:["To list all employees","To document identified risks, their likelihood, impact, owner, and treatment status for tracking and management","To log all security incidents","To store encryption keys"],a:1,e:"A risk register is the central document tracking all identified risks, their ratings, owners, and treatment plans. It ensures risks are actively managed and provides visibility to leadership."},
{d:"Security Operations",q:"Which of the following is MOST important when disposing of hard drives containing sensitive data?",o:["Donating the drives to charity","Formatting the drive once","Simply deleting the files","Using certified data destruction (overwriting, degaussing, or physical destruction)"],a:3,e:"Simple deletion or formatting does not permanently erase data  --  it can be recovered with forensic tools. Certified destruction (NIST 800-88 methods, shredding) ensures data cannot be recovered."},
{d:"Security Operations",q:"Which of the following describes a 'security control assessment'?",o:["Testing physical security guards","Designing system architectures","Creating new security policies","Evaluating whether security controls are correctly implemented and effective"],a:3,e:"A security control assessment evaluates whether controls are implemented correctly and operating effectively to meet security requirements. It is a component of ongoing security authorization."},
{d:"Security Operations",q:"Which of the following BEST describes the concept of 'privacy'?",o:["The same as data security","The right of individuals to control information about themselves and how it is collected, used, and shared","Only applicable to healthcare organizations","Encrypting all organizational data"],a:1,e:"Privacy is about individuals' rights to control their personal information. Security protects information; privacy governs how personal information is collected, used, disclosed, and retained."},
{d:"Security Operations",q:"What is 'user behavior analytics' (UBA) used for in security operations?",o:["Training users on security policies","Detecting anomalous behavior patterns that may indicate insider threats or compromised accounts","Managing user accounts","Enforcing password policies"],a:1,e:"UBA uses machine learning to establish behavioral baselines for users and detect deviations  --  unusual access times, locations, data volumes  --  that may indicate insider threats or compromised credentials."},
{d:"Security Operations",q:"Which of the following is the MAIN purpose of 'separation of environments' (development, testing, production)?",o:["To reduce hardware costs","To simplify IT management","To increase development speed","To prevent untested changes from impacting production systems and to protect sensitive production data"],a:3,e:"Keeping environments separate prevents untested code from reaching production, protects real data from being used in development/testing, and limits blast radius of issues in non-production environments."},
{d:"Security Operations",q:"Which of the following BEST describes 'continuous monitoring'?",o:["Watching security cameras around the clock","The ongoing assessment of security controls to maintain situational awareness and identify changes in risk","Continuously training security staff","Running daily antivirus scans only"],a:1,e:"Continuous monitoring (ISCM) provides ongoing situational awareness of the security posture through automated monitoring of controls, configurations, vulnerabilities, and threats in real time."},
{d:"Security Operations",q:"A 'tabletop exercise' is valuable for security operations because it:",o:["Trains staff to use security tools","Allows teams to practice decision-making during simulated incidents without real operational impact","Tests backup systems","Tests physical security controls"],a:1,e:"Tabletop exercises simulate incident scenarios in a discussion format, testing team coordination, decision-making, and plan gaps without operational disruption. They are cost-effective and reveal communication issues."},
{d:"Security Principles",q:"A hospital employee looks up the medical records of a celebrity patient out of curiosity without any clinical need. This is a violation of which principle?",o:["Data integrity","Non-repudiation","Need to know / least privilege","Availability"],a:2,e:"Accessing data without a legitimate need violates the 'need to know' principle, even if the employee has system access. This is a common form of insider privacy violation."},
{d:"Security Principles",q:"Which of the following BEST describes a 'threat actor'?",o:["Any individual or group that poses a potential threat to an organization","A vulnerability in a system","A type of security control","An unpatched software flaw"],a:0,e:"A threat actor (or threat agent) is any individual, group, or entity that can exploit vulnerabilities to cause harm  --  including hackers, insiders, nation-states, and even natural events."},
{d:"Security Principles",q:"An organization's security policy states all data must be encrypted. An employee emails sensitive data unencrypted. Which control FAILED?",o:["Corrective control","Physical control","Preventive technical control","Detective control"],a:2,e:"A preventive technical control (like enforced email encryption or DLP) should have blocked the unencrypted transmission. The policy alone is administrative  --  without a technical enforcement mechanism, it can be bypassed."},
{d:"Security Principles",q:"Which of the following is the BEST definition of 'information security'?",o:["Installing antivirus on all computers","Physically locking server rooms","Hiring security guards for offices","Protecting the confidentiality, integrity, and availability of information and information systems"],a:3,e:"Information security is the practice of protecting the CIA (Confidentiality, Integrity, Availability) of information and the systems that store, process, and transmit it, using technical, administrative, and physical controls."},
{d:"Security Principles",q:"Symmetric encryption uses:",o:["A hash to verify data integrity","The same key for both encryption and decryption","Two mathematically related keys  --  one public and one private","A digital certificate to authenticate identity"],a:1,e:"Symmetric encryption uses a single shared secret key for both encryption and decryption (e.g., AES). It is fast but requires a secure key exchange. Asymmetric encryption uses a key pair (public/private)."},
{d:"Security Principles",q:"Asymmetric encryption (public key cryptography) is used for:",o:["Bulk data encryption due to its speed","Hashing passwords before storage","Securely exchanging keys and digital signatures without sharing a secret in advance","Creating backup copies of data"],a:2,e:"Asymmetric encryption uses a public/private key pair. It solves the key distribution problem  --  anyone can encrypt with a public key, but only the private key holder can decrypt. RSA and ECC are common algorithms."},
{d:"Security Principles",q:"A digital signature provides:",o:["Authentication and non-repudiation  --  confirming who signed and that the data has not been altered","A backup copy of the original document","Encryption of the signed document","Confidentiality only"],a:0,e:"A digital signature uses the signer's private key to create a verifiable stamp. It provides authentication (proves who signed), integrity (detects tampering), and non-repudiation (signer cannot deny it)."},
{d:"Security Principles",q:"A hash function is used to:",o:["Compress files for storage","Encrypt data so only authorized parties can read it","Generate a public/private key pair","Produce a fixed-length digest of data to verify its integrity"],a:3,e:"Hash functions (SHA-256, MD5) produce a unique fixed-size output from any input. Even a single character change produces a completely different hash, making them ideal for integrity verification."},
{d:"Security Principles",q:"Which of the following BEST describes 'security through obscurity'?",o:["Using physical locks on server rooms","A strong encryption algorithm","Relying on keeping system details secret as the primary defense","Implementing multi-factor authentication"],a:2,e:"Security through obscurity uses secrecy of implementation as a defense. It is widely considered ineffective as a primary control because once the secret is discovered, all protection is lost. It should supplement, not replace, real controls."},
{d:"Security Principles",q:"Which of the following is the PRIMARY reason access logs should be reviewed regularly?",o:["To train new security employees","To comply with IT department policies","To improve system performance","To detect unauthorized access attempts and anomalies early"],a:3,e:"Regular log review detects suspicious activity  --  unauthorized logins, privilege escalations, access at odd hours  --  before they escalate into serious breaches. Unreviewed logs provide no security value."},
{d:"Security Principles",q:"An organization's data owner is BEST defined as:",o:["The vendor who supplied the database software","The IT administrator who manages the storage systems","The person or business unit responsible for defining data classification and access rules","The auditor who reviews data handling"],a:2,e:"The data owner is accountable for classifying data and determining who can access it. The data custodian (often IT) is responsible for the technical safeguards that implement the owner's decisions."},
{d:"Security Principles",q:"PKI (Public Key Infrastructure) is used to:",o:["Store passwords securely","Back up encryption keys","Monitor network traffic for threats","Manage digital certificates that bind public keys to verified identities"],a:3,e:"PKI is a framework of policies, procedures, hardware, and software for creating, managing, distributing, and revoking digital certificates. It enables trusted encrypted communications and digital signatures at scale."},
{d:"Security Principles",q:"Which of the following is the MAIN security concern with using public Wi-Fi?",o:["The connection is always slower","The signal range is limited","Public Wi-Fi requires registration","Traffic may be intercepted by other users on the same network"],a:3,e:"Public Wi-Fi is untrusted. Attackers can sniff unencrypted traffic, perform MitM attacks, or set up rogue access points (evil twin attacks). VPNs mitigate this risk by encrypting traffic."},
{d:"Security Principles",q:"The term 'attack surface' refers to:",o:["The physical area of a data center","All the points where an attacker could try to enter or extract data from a system","The cost of security controls","The number of security staff in an organization"],a:1,e:"The attack surface is the sum of all possible entry points an attacker could use. Reducing the attack surface (disabling unused ports, removing unnecessary software, limiting access) is a fundamental security practice."},
{d:"Security Principles",q:"A company trains all employees to recognize phishing attempts. This reduces which type of risk?",o:["Cryptographic risk","Technical vulnerability risk","Human error and social engineering risk","Physical security risk"],a:2,e:"People are the most exploited attack vector. Training reduces human risk by improving ability to recognize social engineering, phishing, and other manipulation attempts that technical controls cannot fully block."},
{d:"Security Principles",q:"Which of the following BEST describes a 'zero trust' network architecture?",o:["Using no passwords","Assuming no user or device is trusted by default  --  verification is required for every access request","Blocking all external traffic","Trusting all users on the internal network"],a:1,e:"Zero trust rejects the traditional perimeter model. It assumes breach, verifies every user and device regardless of location, grants least-privilege access, and monitors all traffic  --  'never trust, always verify.'"},
{d:"Security Principles",q:"Which of the following is an example of data 'in use'?",o:["A file archived on tape","Data being processed in RAM by a running application","An encrypted database at rest","A file stored on a hard drive"],a:1,e:"Data in use is actively being processed by applications in memory (RAM). It is often unencrypted during processing, making it a target for memory-scraping malware. Protecting data in use is the hardest of the three states."},
{d:"Security Principles",q:"What is the purpose of a 'security awareness program' for new employees?",o:["To test their technical cybersecurity skills","To ensure they understand security policies, threats, and their responsibilities before accessing systems","To teach them how to hack systems","To give them system administrator access"],a:1,e:"Onboarding security awareness programs establish good security habits from day one, ensuring new employees know policies, recognize threats, and understand their role in protecting organizational assets before they have access."},
{d:"Security Principles",q:"Which of the following BEST describes 'personally identifiable information' (PII)?",o:["Only biometric data","All corporate financial data","Any information that can be used to identify a specific individual","Only social security numbers"],a:2,e:"PII is any data that could be used to identify a specific person  --  names, addresses, SSNs, email addresses, phone numbers, biometrics, or combinations of less sensitive data that together identify someone."},
{d:"Security Principles",q:"The principle of 'accountability' is supported by:",o:["Shared user accounts for efficiency","Unique user IDs and comprehensive audit logging to trace actions to individuals","Disabling all user accounts after hours","Encrypting all data"],a:1,e:"Accountability requires that each action be traceable to a specific individual. This requires unique user identities and robust audit logging. Shared accounts destroy accountability."},
{d:"Security Principles",q:"An employee intentionally deletes critical database records. Which element of the CIA triad is MOST directly violated?",o:["Availability","Confidentiality","Authentication","Integrity"],a:3,e:"Intentional deletion of records violates integrity  --  the assurance that data is accurate and has not been tampered with. It may also affect availability if the deleted records cannot be recovered."},
{d:"Security Principles",q:"What does 'key management' involve in cryptography?",o:["The secure generation, storage, distribution, use, and destruction of cryptographic keys","Managing passwords for user accounts","Managing physical access to server rooms","Controlling which users can access encrypted files"],a:0,e:"Key management is one of the hardest problems in cryptography. Even the strongest algorithm fails if keys are poorly generated, stored, distributed, or disposed of. Key management systems (KMS) automate this lifecycle."},
{d:"Security Principles",q:"Which of the following is MOST important when classifying data?",o:["The file size","The age of the data","Whether the data is stored on-premises or in the cloud","The sensitivity of the information and the impact of its unauthorized disclosure"],a:3,e:"Data classification is driven by sensitivity and impact. The question 'what would happen if this were disclosed?' determines the appropriate classification level and corresponding security controls."},
{d:"Security Principles",q:"What is 'steganography'?",o:["A type of network attack","A network monitoring technique","A method of encrypting data","Hiding a message within another file (like an image) so its existence is concealed"],a:3,e:"Steganography hides secret data within ordinary, non-secret data (embedding text in an image's pixel values, for example). It differs from encryption  --  the goal is concealment of the message's existence, not just its content."},
{d:"Security Principles",q:"When evaluating security controls, 'cost-benefit analysis' means:",o:["Choosing the most expensive control for maximum protection","Ensuring the cost of a control does not exceed the value of the asset being protected","Avoiding all spending on security","Always choosing the cheapest control"],a:1,e:"Security spending must be rational. If a control costs $100,000 to protect a $10,000 asset, it is not cost-effective. Controls should be proportionate to the value and risk associated with the assets they protect."}
];
const MC_BANK6=[
{d:"Security Principles",q:"Which of the following BEST describes a 'security incident'?",o:["A planned maintenance window","Any system error or performance issue","A failed software update","A confirmed event that has compromised or threatens to compromise the CIA of information"],a:3,e:"A security incident is an event that violates or imminently threatens the confidentiality, integrity, or availability of information or information systems. Not all security events become incidents  --  many are benign."},
{d:"Security Principles",q:"What is the purpose of 'security metrics'?",o:["To track individual employee performance","To measure the effectiveness of security controls and programs to support decision-making","To make security seem more complicated","To satisfy regulators only"],a:1,e:"Security metrics provide quantitative evidence of program effectiveness, helping organizations make data-driven decisions, justify security investments, demonstrate compliance, and identify improvement areas."},
{d:"Security Principles",q:"A certificate authority (CA) in PKI is responsible for:",o:["Storing user passwords","Issuing and revoking digital certificates that verify the identity of certificate holders","Monitoring network traffic","Managing firewall rules"],a:1,e:"A CA is the trusted entity that issues digital certificates after verifying the identity of the requester. If you trust the CA, you can trust certificates it has signed. Root CAs are the foundation of the public PKI trust chain."},
{d:"Security Principles",q:"Which of the following types of malware encrypts files and demands payment to restore access?",o:["Spyware","Adware","Ransomware","Worm"],a:2,e:"Ransomware encrypts victim files or entire systems and demands payment (often cryptocurrency) for the decryption key. Offline backups are the most effective recovery control."},
{d:"Security Principles",q:"A rootkit is BEST described as:",o:["A physical access control device","A type of network firewall","A vulnerability scanner","Malware that hides its presence on a system by modifying the OS and is difficult to detect"],a:3,e:"Rootkits operate at the OS or firmware level, hiding malicious processes, files, and network connections from normal detection. They are very difficult to remove  --  often requiring OS reinstallation."},
{d:"Security Principles",q:"Which of the following BEST describes 'spear phishing'?",o:["A generic mass phishing email sent to thousands of people","A brute force attack on email passwords","A highly targeted phishing attack personalized with details about a specific individual or organization","An attack using malicious USB drives"],a:2,e:"Spear phishing uses personalized information (gathered from social media, LinkedIn, etc.) to craft convincing targeted emails. They are far more effective than generic phishing because they appear legitimate."},
{d:"Security Principles",q:"Why is it important to have a formal 'acceptable use policy' (AUP)?",o:["To restrict all personal use of technology","To define permitted and prohibited uses of organizational IT resources, protecting both the organization and users","To monitor all employee activities","To eliminate the need for technical controls"],a:1,e:"An AUP sets clear expectations for appropriate use of IT resources. It protects the organization legally, establishes grounds for disciplinary action if violated, and informs users of their responsibilities."},
{d:"Security Principles",q:"Which of the following describes a 'supply chain attack'?",o:["An insider threat in the procurement department","A ransomware attack on a warehouse","Compromising a vendor or supplier to gain access to the vendor's customers downstream","An attack on a company's delivery vehicles"],a:2,e:"Supply chain attacks target the software or hardware supply chain  --  inserting malware into software updates (like SolarWinds), compromising hardware manufacturers, or exploiting trusted vendor relationships to reach victims indirectly."},
{d:"Network Security",q:"Which of the following BEST describes the OSI model?",o:["A firewall architecture","A type of network protocol","A physical network cabling standard","A conceptual framework with seven layers describing how network communications function"],a:3,e:"The OSI (Open Systems Interconnection) model has 7 layers: Physical, Data Link, Network, Transport, Session, Presentation, Application. It provides a common framework for understanding and troubleshooting network communications."},
{d:"Network Security",q:"DNS (Domain Name System) translates:",o:["Network packets into data frames","Usernames into access permissions","IP addresses into MAC addresses","Human-readable domain names into IP addresses"],a:3,e:"DNS is the internet's phone book  --  it resolves domain names like 'google.com' into IP addresses computers use to route traffic. DNS poisoning is a common attack that corrupts these translations."},
{d:"Network Security",q:"What is a 'man-in-the-browser' attack?",o:["A network eavesdropping technique","Malware that intercepts and modifies web transactions within the browser before they are sent","Physically placing a spy device near a computer","A vulnerability in web server software"],a:1,e:"Man-in-the-browser (MitB) malware injects itself into the browser, intercepting and modifying transactions (like banking transfers) in real time, even when the connection is encrypted with HTTPS."},
{d:"Network Security",q:"Which port does standard unencrypted HTTP use?",o:["443","25","80","22"],a:2,e:"HTTP uses port 80; HTTPS uses port 443; SSH uses port 22; SMTP uses port 25. Understanding common port numbers is fundamental to firewall configuration and network security analysis."},
{d:"Network Security",q:"What is the purpose of a 'network baseline'?",o:["To document normal traffic patterns so anomalies can be identified","To block all non-essential traffic","To map network topology","To reset all devices to factory settings"],a:0,e:"A network baseline records normal traffic volumes, protocols, and patterns. Deviations from the baseline can indicate attacks, malware, or unauthorized activity  --  it's the foundation for anomaly-based detection."},
{d:"Network Security",q:"Which of the following BEST describes 'defense in depth' applied to network security?",o:["Relying on user awareness alone","Layering firewalls, IDS/IPS, segmentation, and endpoint security so no single failure exposes all systems","Encrypting only the most sensitive data","Using only a single powerful firewall"],a:1,e:"Network defense in depth layers multiple controls: perimeter firewall, IDS/IPS, network segmentation, host-based firewalls, endpoint protection, and encryption. Each layer provides independent protection."},
{d:"Network Security",q:"What is a 'rogue access point'?",o:["A firewall bypassing device","An unauthorized wireless access point connected to a network, allowing attackers to intercept traffic","A backup internet connection","An access point with outdated firmware"],a:1,e:"A rogue access point is an unauthorized WiFi AP plugged into a corporate network. It can bypass wired security controls, capture credentials, and allow outside attackers direct network access. NAC and wireless IDS detect them."},
{d:"Network Security",q:"Network Address Translation (NAT) provides a security benefit by:",o:["Blocking all incoming connections","Encrypting all network traffic","Hiding internal IP addresses from external systems, reducing direct exposure","Replacing firewalls in small networks"],a:2,e:"NAT translates private internal IPs to a shared public IP. External systems only see the public IP, obscuring internal network structure. However, NAT is not a security control by itself  --  it is primarily an address conservation mechanism."},
{d:"Network Security",q:"What is the TCP three-way handshake?",o:["A physical cable connection method","The process of encrypting TCP data","A method of routing packets across networks","SYN, SYN-ACK, ACK  --  the process establishing a TCP connection between client and server"],a:3,e:"TCP connections start with SYN (client requests connection), SYN-ACK (server acknowledges and responds), ACK (client confirms). SYN flood attacks exploit this by sending many SYNs without completing handshakes."},
{d:"Network Security",q:"A 'SYN flood' attack exploits which protocol?",o:["TCP's three-way handshake process to exhaust server resources","ICMP","UDP","DNS resolution"],a:0,e:"SYN floods send many TCP SYN packets without completing the handshake, filling the server's connection table with half-open connections. SYN cookies and rate limiting are common mitigations."},
{d:"Network Security",q:"Which of the following is the PRIMARY purpose of a network IPS (Intrusion Prevention System)?",o:["Encrypting network communications","Managing user access to network resources","Actively blocking detected attacks in real time","Only generating alerts about suspicious traffic"],a:2,e:"An IPS not only detects attacks (like an IDS) but also actively blocks or mitigates them in real time  --  dropping malicious packets, resetting connections, or blocking source IPs."},
{d:"Network Security",q:"What is the difference between IPv4 and IPv6?",o:["IPv4 uses 32-bit addresses; IPv6 uses 128-bit addresses, providing a vastly larger address space","IPv6 is less secure than IPv4","They are identical in terms of address size","IPv6 is older than IPv4"],a:0,e:"IPv4 uses 32-bit addresses (~4.3 billion addresses). IPv6 uses 128-bit addresses, providing 340 undecillion addresses  --  effectively unlimited. IPv6 also has built-in IPSec support and improved routing efficiency."},
{d:"Network Security",q:"What does 'HTTPS' stand for and what does the 'S' mean?",o:["HyperText Transfer Protocol with SSH encryption","HyperText Transfer Protocol Secure  --  uses TLS to encrypt web communications","HyperText Transfer Protocol Standard  --  the modern standard version of HTTP","High-Traffic Transfer Protocol System"],a:1,e:"HTTPS (HyperText Transfer Protocol Secure) adds TLS encryption to HTTP, ensuring confidentiality and integrity of web communications. The 'S' means the connection is encrypted and the server identity is verified."},
{d:"Network Security",q:"Which of the following BEST describes a 'packet filter' firewall?",o:["A firewall that tracks connection state","A firewall that inspects application-layer content","A firewall that uses AI to detect threats","A firewall that inspects individual packets based on IP address, port, and protocol without connection context"],a:3,e:"Packet filter firewalls operate at Layer 3/4, inspecting each packet in isolation based on rules (source/destination IP, port, protocol). They are fast but less intelligent than stateful or application firewalls."},
{d:"Network Security",q:"What is 'credential stuffing'?",o:["Using leaked username/password combinations from one breach to attempt logins on other services","Embedding credentials in malware","Brute forcing passwords using random characters","Physically stealing password lists"],a:0,e:"Credential stuffing exploits password reuse  --  attackers take credentials leaked from one breach and try them against other services. MFA and unique passwords per site are the primary defenses."},
{d:"Network Security",q:"What is an 'air gap' in network security?",o:["A gap in firewall coverage","A type of VPN tunnel","A type of wireless encryption","Physical isolation of a system from all network connections, including the internet"],a:3,e:"An air-gapped system has no network connections  --  it is physically isolated. Used for the most sensitive systems (nuclear control, classified networks). Even air gaps can be bridged by USB malware (like Stuxnet)."},
{d:"Network Security",q:"Which of the following BEST describes 'lateral movement' in a cyberattack?",o:["Network traffic being rerouted","After initial compromise, an attacker moving through a network to access additional systems and data","An attacker moving physical hardware","A firewall rule change"],a:1,e:"Lateral movement is how attackers spread through a network after initial compromise  --  using harvested credentials, exploiting trust relationships, or internal vulnerabilities to reach higher-value targets."},
{d:"Network Security",q:"What is the primary security risk of using default credentials on network devices?",o:["Default credentials cannot access admin functions","Default credentials expire quickly","Default credentials require more bandwidth","Attackers know default usernames and passwords and routinely try them  --  leaving devices trivially compromised"],a:3,e:"Default credentials (admin/admin, admin/password) are publicly documented. Attackers routinely scan for devices with unchanged defaults. Changing default credentials on every device is a fundamental hardening step."},
{d:"Network Security",q:"TLS 1.3 improved upon TLS 1.2 primarily by:",o:["Supporting more devices","Removing weak cipher suites, improving handshake speed, and providing stronger forward secrecy","Reducing encryption strength for compatibility","Adding more cipher suites"],a:1,e:"TLS 1.3 removed legacy algorithms (RC4, SHA-1, DES), deprecated RSA key exchange, mandated forward secrecy, and reduced handshake round trips. Organizations should prefer TLS 1.3 and disable older protocol versions."},
{d:"Network Security",q:"What is 'network forensics'?",o:["Designing network architecture","Managing network configurations","Monitoring network performance metrics","Capturing and analyzing network traffic to investigate security incidents and understand attack timelines"],a:3,e:"Network forensics involves capturing and analyzing network traffic to reconstruct events during a security incident  --  identifying attack origin, scope, lateral movement, and data exfiltrated."},
{d:"Network Security",q:"Which of the following is the MAIN advantage of using a cloud-based SIEM?",o:["It is always more secure than on-premises SIEM","It is always free","It requires no configuration","Scalable ingestion of logs from distributed environments without managing on-premises hardware"],a:3,e:"Cloud SIEMs scale elastically to handle large log volumes from distributed cloud and on-premises sources, eliminating hardware management overhead. They are well-suited for organizations with dynamic or cloud-heavy environments."},
{d:"Network Security",q:"What is 'exfiltration over DNS'?",o:["Tunneling stolen data out of a network by encoding it in DNS queries, bypassing many security controls","A method of encrypting DNS traffic","Using DNS servers to block data exfiltration","A DNS configuration vulnerability"],a:0,e:"DNS is often trusted and not deeply inspected. Attackers encode data in DNS query strings to exfiltrate it through DNS requests to attacker-controlled domains. DNS filtering and anomaly detection can catch unusual query volumes."},
{d:"Network Security",q:"Which wireless security protocol is considered BROKEN and should never be used?",o:["WPA2-Personal","WPA3","WEP","WPA2-Enterprise"],a:2,e:"WEP (Wired Equivalent Privacy, 1997) is completely broken  --  its RC4 encryption can be cracked in minutes. Any wireless network still using WEP is effectively unencrypted. WPA3 is the current recommended standard."},
{d:"Network Security",q:"What is the purpose of 'egress filtering' in network security?",o:["Filtering traffic between internal VLANs","Filtering outbound traffic leaving the network to prevent data exfiltration and C2 communications","Filtering incoming traffic from the internet","Filtering wireless network traffic"],a:1,e:"Egress filtering controls traffic leaving the network  --  blocking unexpected outbound connections, preventing data exfiltration, and cutting off malware command-and-control (C2) communications."},
{d:"Network Security",q:"Which of the following BEST describes a 'birthday attack' in cryptography?",o:["A brute force attack on birthday-related passwords","An attack exploiting the mathematical probability that two different inputs will produce the same hash output (collision)","An attack that occurs on a specific calendar date","An attack targeting older, legacy systems"],a:1,e:"The birthday attack exploits the birthday paradox  --  it is easier to find any two messages with the same hash (collision) than to find a second message matching a specific hash. This is why longer hash outputs (SHA-256+) matter."},
{d:"Network Security",q:"What is 'SSID hiding' and why is it NOT a strong security control?",o:["Encrypting the SSID  --  a strong control","A firewall rule that blocks SSID traffic","Hiding the wireless network name from broadcast  --  weak because SSIDs can still be discovered by passive sniffing","A VPN technique for wireless security"],a:2,e:"SSID hiding removes the network name from broadcast beacons, but the SSID is still transmitted in probe requests from connecting devices. Passive sniffers can easily discover hidden SSIDs. It is security through obscurity."},
{d:"Network Security",q:"What is an 'insider threat'?",o:["Only disgruntled former employees","A physical intrusion by outsiders","A security threat originating from people within the organization  --  employees, contractors, or partners  --  who misuse their access","Malware downloaded from inside the network"],a:2,e:"Insider threats are particularly dangerous because insiders already have legitimate access, knowledge of systems, and trust. They may be malicious, negligent, or compromised by external actors. UBA and least privilege are key mitigations."},
{d:"Network Security",q:"What is the primary security benefit of 'full disk encryption' on a laptop?",o:["It prevents network-based attacks","It speeds up data access","It protects data from being read if the laptop is lost or stolen","It prevents malware infections"],a:2,e:"Full disk encryption (BitLocker, FileVault) protects data at rest. If a laptop is stolen, the data is unreadable without the encryption key/password. It has no effect on network-based attacks or malware on a running, unlocked machine."},
{d:"Network Security",q:"What does 'DNSSEC' provide?",o:["Cryptographic authentication of DNS responses to prevent poisoning  --  verifying responses are from the legitimate DNS server","Encryption of DNS queries","Faster DNS resolution","Blocking of malicious domain lookups"],a:0,e:"DNSSEC adds digital signatures to DNS records, allowing resolvers to verify responses came from the authoritative server and were not tampered with. It prevents cache poisoning but does not encrypt DNS queries."},
{d:"Network Security",q:"Which of the following BEST describes a 'penetration test scope'?",o:["The number of testers involved","The physical area of the test center","The defined boundaries of systems, networks, and methods authorized for testing","The cost of the penetration test"],a:2,e:"Scope defines what is authorized for testing  --  specific systems, IP ranges, test methods, and time windows. Clearly defined scope prevents legal issues and ensures the test is focused on meaningful targets."}
];
const MC_BANK7=[
{d:"Network Security",q:"What is the purpose of 'certificate pinning'?",o:["Storing certificates on a USB drive","Physically securing server hardware","Renewing certificates automatically","Hardcoding expected certificate details into an application to prevent accepting fraudulent certificates from rogue CAs"],a:3,e:"Certificate pinning ties an application to a specific certificate or public key. Even if an attacker obtains a certificate from a rogue CA, the application rejects it. Used in mobile apps to prevent MitM attacks."},
{d:"Network Security",q:"Which protocol is used to securely synchronize time across network devices?",o:["FTP","DHCP","NTP (Network Time Protocol) with authentication, or NTS","SNMP"],a:2,e:"Accurate time synchronization is essential for log correlation and forensics. Standard NTP is unauthenticated; secure NTP uses authentication keys or NTS (Network Time Security) to prevent time manipulation attacks."},
{d:"Access Controls",q:"A user logs into a company laptop at 3 AM from a country they have never visited before. A risk-based authentication system flags this for additional verification. This is an example of:",o:["Discretionary access control","Mandatory access control","Context-aware / adaptive authentication","Role-based access control"],a:2,e:"Context-aware (adaptive/risk-based) authentication evaluates contextual signals  --  unusual time, location, device  --  to determine real-time risk and step up authentication requirements when risk is elevated."},
{d:"Access Controls",q:"What is 'identity governance' in IAM?",o:["Issuing government IDs","Policies and processes ensuring user access rights are aligned with business rules, reviewed regularly, and certified","Creating admin accounts","Monitoring physical access to buildings"],a:1,e:"Identity governance provides visibility and control over user access across the organization  --  who has access to what, whether it is appropriate, and managing access request, approval, and certification workflows."},
{d:"Access Controls",q:"What is the purpose of a 'CAPTCHA'?",o:["To encrypt website forms","To distinguish human users from automated bots by presenting challenges difficult for computers to solve","To log all user form submissions","To verify user identity with a certificate"],a:1,e:"CAPTCHAs (Completely Automated Public Turing test to tell Computers and Humans Apart) block automated attacks like credential stuffing, account creation bots, and form spam by presenting challenges humans solve easily but bots cannot."},
{d:"Access Controls",q:"What is 'OAuth 2.0' used for?",o:["Physical access control","Multi-factor authentication","Encrypting stored passwords","Authorization delegation  --  allowing users to grant applications limited access to their accounts without sharing passwords"],a:3,e:"OAuth 2.0 allows users to grant applications specific, limited permissions to act on their behalf (like 'allow this app to read my email') without giving the app their password. It is widely used in 'Login with Google/Facebook.'"},
{d:"Access Controls",q:"Which of the following BEST describes SAML (Security Assertion Markup Language)?",o:["A physical access card standard","An XML-based standard for exchanging authentication and authorization data between identity providers and service providers","A network scanning protocol","A password hashing algorithm"],a:1,e:"SAML enables single sign-on (SSO) across domains by exchanging XML-based assertions between identity providers (IdP) and service providers (SP). It is widely used for enterprise SSO to SaaS applications."},
{d:"Access Controls",q:"What is 'privileged identity management' (PIM)?",o:["Managing all user passwords","Just-in-time elevation of standard accounts to privileged roles for specific tasks, then automatic revocation","Monitoring all user actions","Granting permanent admin rights to IT staff"],a:1,e:"PIM enables privileged access on a just-in-time, as-needed basis. Users request elevation for a specific task with a defined time window; access is automatically revoked after. This dramatically reduces standing privilege exposure."},
{d:"Access Controls",q:"Which of the following is the MOST effective way to prevent unauthorized access after an employee termination?",o:["Immediately revoking all system access, credentials, and physical access upon termination","Collecting the employee's laptop","Sending a reminder email","Changing the office WiFi password"],a:0,e:"Immediate, comprehensive revocation of all access (network accounts, email, physical badges, cloud accounts, VPN) upon termination is critical. Delayed revocation leaves windows for data theft or sabotage."},
{d:"Access Controls",q:"What is 'continuous authentication'?",o:["Requiring re-login every 5 minutes","Ongoing verification of user identity throughout a session using behavioral signals like typing patterns and mouse movements","Requiring MFA on every page load","Using biometrics instead of passwords"],a:1,e:"Continuous authentication monitors behavioral patterns throughout a session to ensure the authenticated user is still the same person. It can detect account takeover mid-session without requiring re-authentication."},
{d:"Access Controls",q:"An access review shows a developer has write access to the production database. This access is no longer needed. The BEST action is:",o:["Ask the developer if they want to keep it","Leave the access in case it is needed later","Escalate it to an audit","Immediately revoke the write access  --  applying least privilege and preventing unnecessary risk"],a:3,e:"Least privilege requires removing access that is no longer needed. Standing unnecessary permissions increase risk from insider threats and compromised accounts. Access reviews exist specifically to catch this."},
{d:"Access Controls",q:"What is a 'hardware security module' (HSM)?",o:["A USB-based password manager","A dedicated physical device for secure cryptographic key generation, storage, and operations  --  tamper-resistant","A biometric fingerprint reader","A hardware firewall appliance"],a:1,e:"HSMs are tamper-resistant hardware devices that securely generate, store, and use cryptographic keys. They are used in PKI, payment systems, and anywhere keys must be protected from software compromise."},
{d:"Access Controls",q:"Which of the following BEST describes 'shadow IT'?",o:["IT security testing in the background","Unauthorized technology used by employees without IT department knowledge or approval","A backup IT system","IT systems accessed after hours"],a:1,e:"Shadow IT  --  cloud apps, personal devices, unsanctioned services  --  creates security risks because IT cannot apply controls, monitor usage, or ensure compliance. Data may flow through unvetted, unprotected services."},
{d:"Access Controls",q:"What is the purpose of an 'access control vestibule' (mantrap)?",o:["A software-based MFA system","A physical security mechanism using two interlocked doors so only one opens at a time, preventing tailgating","A type of database access control","A network access control system"],a:1,e:"A mantrap (access control vestibule) prevents tailgating by allowing only one person through a secured area at a time. The first door must close before the second opens, ensuring each person authenticates individually."},
{d:"Access Controls",q:"What is 'password spraying'?",o:["Brute forcing a single account with many passwords","Trying a few commonly used passwords across many accounts to avoid triggering account lockout","Generating random passwords for users","Phishing for passwords via email"],a:1,e:"Password spraying avoids lockout by using one or two common passwords (Password1!, Winter2024!) against thousands of accounts rather than many attempts on one account. It is effective because many users choose predictable passwords."},
{d:"Access Controls",q:"Which of the following BEST describes 'time-of-day restrictions' as an access control?",o:["Restricting user access to systems only during authorized hours to reduce unauthorized access outside work hours","Automatically logging out users after a period of inactivity","Requiring re-authentication every hour","Limiting how long passwords are valid"],a:0,e:"Time-of-day restrictions limit access to business hours or defined windows, reducing the attack surface during nights and weekends when attacks are harder to detect and respond to. Useful for high-privilege accounts."},
{d:"Access Controls",q:"A system locks a user account after 5 failed login attempts. After 30 minutes, it automatically unlocks. This is an example of:",o:["Mandatory access control","Account lockout with automatic reset  --  balancing security against denial-of-service risk","Biometric authentication","Role-based access control"],a:1,e:"Account lockout deters brute force attacks. Automatic reset (after a delay) balances security with usability  --  preventing permanent denial-of-service while still slowing attackers. Permanent lockout requires admin intervention."},
{d:"Access Controls",q:"Which of the following is the BEST reason to implement 'separation of environments' between development and production?",o:["Development environments are always faster","Development and production use different programming languages","Developers should not have direct access to production data or systems, reducing risk of accidental or intentional exposure","Production systems have better hardware"],a:2,e:"Developers having direct production access bypasses change control, creates risk of accidental damage, and exposes sensitive production data. Separate environments with controlled promotion pipelines enforce change management."},
{d:"Access Controls",q:"What does 'LDAP' stand for and what is it used for?",o:["Local Directory Access Protocol  --  for printing","Linux Directory Application Program  --  a Linux access tool","Lightweight Directory Access Protocol  --  a standard protocol for querying and modifying directory services like Active Directory","Long Distance Authentication Protocol  --  for remote access"],a:2,e:"LDAP is the standard protocol for accessing directory services (Active Directory, OpenLDAP). It is used to authenticate users, query group memberships, and enforce access policies across enterprise environments."},
{d:"Access Controls",q:"What is 'access transparency' in cloud security?",o:["Encrypting all access logs","Cloud provider logs giving customers visibility into when and why provider staff access their data","Allowing all employees to see access logs","Making all cloud data publicly visible"],a:1,e:"Access transparency gives cloud customers logs of provider personnel access to their data and the reasons. It enables customers to verify that cloud providers are accessing their data only for legitimate support purposes."},
{d:"Access Controls",q:"What is the security risk of 'password reuse' across multiple accounts?",o:["Reused passwords are always longer","A breach of one service exposes all other accounts using the same password through credential stuffing","It uses too much storage","Reused passwords expire too quickly"],a:1,e:"Password reuse is one of the most dangerous habits. When one service is breached, attackers take those credentials and try them everywhere (credential stuffing). Unique passwords per account, managed by a password manager, prevent this."},
{d:"Access Controls",q:"Which of the following BEST describes 'object-based access control'?",o:["Access permissions attached directly to the resource (object) itself, specifying which subjects can perform which operations","Access based on network location","Access based on time of day","Access based on the job role of the user"],a:0,e:"Object-based (or resource-based) access control attaches permissions to the resource  --  the file's ACL specifies who can read, write, or execute it. This is how most file system and storage access control works."},
{d:"Access Controls",q:"What is 'mutual authentication'?",o:["Two users authenticating to each other","Both the client and server verify each other's identity, preventing man-in-the-middle attacks","A type of biometric authentication","MFA using two different biometrics"],a:1,e:"Mutual (two-way) authentication requires both sides to prove their identity. TLS with client certificates achieves this  --  the server presents its certificate AND verifies the client's certificate, preventing rogue servers and clients."},
{d:"Access Controls",q:"Which of the following is the MAIN difference between authentication and authorization?",o:["Authentication confirms who you are; authorization determines what you are allowed to do","They are the same process","Authentication is for humans; authorization is for systems","Authorization confirms identity; authentication grants permissions"],a:0,e:"Authentication answers 'Who are you?' (identity verification). Authorization answers 'What can you do?' (permission enforcement). Both are required  --  you must know who someone is before deciding what they can access."},
{d:"Access Controls",q:"Which of the following BEST describes 'attribute-based access control' (ABAC) compared to RBAC?",o:["ABAC is older than RBAC","RBAC is more fine-grained than ABAC","ABAC uses multiple attributes (user, resource, environment) for fine-grained decisions; RBAC uses only assigned roles","They are identical"],a:2,e:"RBAC assigns permissions to roles and users to roles  --  coarser-grained. ABAC evaluates combinations of attributes (clearance level + resource sensitivity + time of day + location) for more dynamic, context-aware access decisions."},
{d:"Access Controls",q:"What is the purpose of 'session management' in web applications?",o:["Managing database sessions","Managing user passwords","Controlling network connections","Securely creating, maintaining, and terminating authenticated user sessions to prevent session hijacking"],a:3,e:"Proper session management (secure session tokens, timeouts, invalidation on logout) prevents session hijacking. Attackers can steal valid session tokens to impersonate authenticated users if sessions are poorly managed."},
{d:"Access Controls",q:"Which of the following is a characteristic of a 'strong password policy'?",o:["Requiring the same password format across all users","Requiring passwords to be changed every day","Requiring minimum length, complexity (upper, lower, numbers, symbols), and prohibiting commonly used passwords","Storing passwords in plain text for easy reset"],a:2,e:"Strong password policies enforce length (12+ characters), complexity, and prohibit known weak passwords. NIST now recommends length over complexity rules and checking against known breached password lists."},
{d:"Access Controls",q:"What is the PRIMARY security benefit of 'just-in-time' (JIT) provisioning?",o:["It eliminates the need for MFA","It creates user accounts faster","It reduces help desk workload","Accounts and elevated privileges exist only when needed, reducing the window of exposure from standing access"],a:3,e:"JIT provisioning creates accounts or elevates privileges only for the duration of a specific need, then automatically deprovisions. This eliminates standing access that represents perpetual risk if credentials are compromised."},
{d:"Access Controls",q:"Which of the following BEST describes 'identity federation'?",o:["Requiring users to maintain separate credentials for each organization","Storing all user identities in a single database","A government identity verification system","A system where multiple organizations trust each other's identity assertions, allowing users to access resources across organizational boundaries"],a:3,e:"Identity federation establishes trust relationships between organizations (e.g., a university and an employer), allowing students/employees to use their home credentials to access partner resources without separate accounts."},
{d:"Access Controls",q:"What is 'cross-site request forgery' (CSRF)?",o:["A database injection attack","A method of stealing cookies","Tricking an authenticated user's browser into unknowingly submitting requests to a web application they are logged into","An attack on the session management system"],a:2,e:"CSRF tricks a browser into sending authenticated requests the user did not intend  --  like transferring funds by luring a logged-in banking customer to a malicious page. Anti-CSRF tokens and SameSite cookie attributes prevent it."},
{d:"Access Controls",q:"Which of the following BEST describes 'non-persistent' (stateless) access tokens?",o:["Tokens stored permanently in a database","Short-lived tokens that carry all necessary authorization information and do not require server-side session storage","Tokens that never expire","Tokens that require biometric verification"],a:1,e:"Stateless tokens (like JWTs) carry encoded claims and are verified cryptographically without server-side session lookup. They are used in modern APIs and microservices for scalable authorization without central session state."},
{d:"Security Operations",q:"A SOC analyst sees 10,000 failed SSH login attempts to a server from a single IP in one minute, followed by a successful login. This is MOST likely:",o:["A network performance issue","A misconfigured application","Normal administrative activity","A successful brute force attack requiring immediate incident response"],a:3,e:"This pattern  --  high-volume failed logins followed by success  --  is the classic signature of a successful brute force attack. Immediate response should include isolating the server, revoking the session, and investigating the compromise."},
{d:"Security Operations",q:"What is 'threat hunting'?",o:["Responding to SIEM alerts reactively","Automating vulnerability scanning","Training users to report threats","Proactively searching through networks and systems for threats that have evaded existing security controls"],a:3,e:"Threat hunting is proactive  --  rather than waiting for alerts, security analysts actively search for indicators of compromise, attacker TTPs, and anomalies that automated tools missed. It assumes breach and looks for evidence."},
{d:"Security Operations",q:"Which of the following BEST describes a 'canary token'?",o:["A decoy file, credential, or data item that triggers an alert when accessed, revealing unauthorized activity","A physical security camera","A type of encryption key","A backup verification method"],a:0,e:"Canary tokens (honeytokens) are decoys  --  fake documents, credentials, or records that should never be accessed legitimately. Any access triggers an alert, providing early warning of attackers exploring a compromised system."},
{d:"Security Operations",q:"What is 'mean time to detect' (MTTD) in security operations?",o:["The average time between an incident occurring and the security team detecting it","The time to patch a vulnerability","The time between security audits","The time to restore a system after an attack"],a:0,e:"MTTD measures how long attackers are inside systems before detection. The industry average is measured in months. Lower MTTD limits damage. Continuous monitoring, threat hunting, and anomaly detection all reduce MTTD."},
{d:"Security Operations",q:"What does 'indicator of compromise' (IoC) refer to?",o:["Forensic evidence  --  IP addresses, file hashes, domain names  --  that suggests a system has been compromised","A legal document signed by attackers","A type of security policy","A vulnerability in an application"],a:0,e:"IoCs are artifacts observed on networks or in systems that indicate intrusion: known-bad IP addresses, malware hashes, malicious domains, unusual registry keys. Sharing IoCs (via STIX/TAXII) improves collective defense."},
{d:"Security Operations",q:"Which of the following BEST describes 'data masking' in security operations?",o:["Replacing sensitive data with realistic but fictitious values for use in non-production environments","Blocking sensitive data in logs","Encrypting data before transmission","Hiding backup drives"],a:0,e:"Data masking replaces sensitive values (SSNs, credit card numbers) with realistic substitutes for development, testing, and analytics. Real sensitive data is protected while developers and analysts can work with realistic data."},
{d:"Security Operations",q:"What is the purpose of 'penetration testing' in security operations?",o:["To create new vulnerabilities for testing","To permanently fix all vulnerabilities","To replace routine vulnerability scanning","To simulate real-world attacks in a controlled manner to identify exploitable weaknesses and validate defenses"],a:3,e:"Penetration testing goes beyond scanning by actively attempting exploitation to determine real-world risk. It validates whether controls actually work and identifies high-risk exploitable chains that scanners might miss."}
];

{d:"Security Operations",q:"What is a 'security scorecard'?",o:["A list of all security incidents","A grade given by regulators after an audit","An employee performance review","A visual summary of security KPIs and metrics showing the current security posture to leadership"],a:3,e:"A security scorecard presents key metrics to leadership in a visual, understandable format  --  patch compliance, open vulnerabilities, incident counts, training completion  --  enabling informed decisions about security investments."},
{d:"Security Operations",q:"What is 'forensic imaging' in incident response?",o:["Photographing physical servers","Taking screenshots of an active attack","Creating a bit-for-bit copy of storage media to preserve evidence for analysis without altering the original","Installing monitoring agents on systems"],a:2,e:"Forensic imaging creates an exact copy of storage media (bit-for-bit). Analysis is performed on the copy to preserve original evidence integrity. Hash verification confirms the image matches the original."},
