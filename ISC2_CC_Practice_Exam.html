<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISC2 CC Certification Practice Exam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#0f1117;--sur:#181c27;--sur2:#1f2436;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --tx:#e8eaf0;--mu:#7a8099;
  --ac:#4f8ef7;--acd:rgba(79,142,247,0.12);
  --gn:#3ecf8e;--gnd:rgba(62,207,142,0.12);
  --rd:#f76f6f;--rdd:rgba(247,111,111,0.12);
  --am:#f5a623;
  --fn:'IBM Plex Sans',sans-serif;--mo:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh;line-height:1.6;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrap{max-width:820px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1;}
/* HEADER */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--bdr);}
.logo-tag{font-family:var(--mo);font-size:11px;color:var(--ac);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.logo-tag::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.hdr h1{font-size:22px;font-weight:600;letter-spacing:-.02em;}
.hdr-sub{font-size:13px;color:var(--mu);margin-top:3px;}
.timer-block{text-align:right;flex-shrink:0;}
.timer{font-family:var(--mo);font-size:28px;font-weight:500;letter-spacing:.04em;line-height:1;}
.timer.warn{color:var(--am);}
.timer.dngr{color:var(--rd);animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:.4;}}
.timer-lbl{font-size:11px;color:var(--mu);margin-top:4px;font-family:var(--mo);}
/* START */
.start-card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:2.5rem 2rem;animation:up .3s ease;}
.start-card h2{font-size:20px;font-weight:600;margin-bottom:6px;}
.start-card>p{font-size:14px;color:var(--mu);margin-bottom:2rem;line-height:1.6;}
.slbl{font-family:var(--mo);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:10px;}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:8px;margin-bottom:1.75rem;}
.dcard{padding:12px 15px;border:1px solid var(--bdr);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--sur2);}
.dcard:hover{border-color:var(--ac);}
.dcard.sel{border-color:var(--ac);background:var(--acd);}
.dcard-n{font-size:13px;font-weight:500;color:var(--tx);}
.dcard-c{font-size:12px;color:var(--mu);margin-top:2px;font-family:var(--mo);}
.count-row{display:flex;gap:8px;margin-bottom:1.75rem;flex-wrap:wrap;}
.cbtn{padding:10px 24px;border-radius:8px;border:1px solid var(--bdr2);background:transparent;color:var(--mu);cursor:pointer;font-family:var(--mo);font-size:15px;font-weight:500;transition:all .15s;}
.cbtn:hover{border-color:var(--ac);color:var(--ac);}
.cbtn.sel{background:var(--acd);border-color:var(--ac);color:var(--ac);}
.cbtn:disabled{opacity:.35;cursor:not-allowed;}
.type-row{display:flex;gap:8px;margin-bottom:1.75rem;flex-wrap:wrap;}
.tbtn{padding:8px 16px;border-radius:8px;border:1px solid var(--bdr2);background:transparent;color:var(--mu);cursor:pointer;font-family:var(--fn);font-size:13px;transition:all .15s;}
.tbtn:hover{border-color:var(--ac);color:var(--ac);}
.tbtn.sel{background:var(--acd);border-color:var(--ac);color:var(--ac);}
.mode-row{display:flex;gap:8px;margin-bottom:2rem;flex-wrap:wrap;}
.mbtn{padding:8px 18px;border-radius:8px;border:1px solid var(--bdr2);background:transparent;color:var(--mu);cursor:pointer;font-family:var(--fn);font-size:13px;transition:all .15s;}
.mbtn:hover{border-color:var(--ac);color:var(--ac);}
.mbtn.sel{background:var(--acd);border-color:var(--ac);color:var(--ac);}
/* STATS */
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;text-align:center;}
.stat-v{font-size:22px;font-weight:600;font-family:var(--mo);line-height:1;}
.stat-l{font-size:11px;color:var(--mu);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}
/* PROGRESS */
.prog-w{margin-bottom:1.25rem;}
.prog-t{height:3px;background:var(--sur2);border-radius:2px;overflow:hidden;}
.prog-f{height:3px;background:linear-gradient(90deg,var(--ac),#7eb8ff);border-radius:2px;transition:width .4s ease;}
.prog-m{display:flex;justify-content:space-between;font-size:12px;color:var(--mu);margin-top:6px;font-family:var(--mo);}
.dbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;}
.dbtn{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--bdr2);background:transparent;color:var(--mu);cursor:pointer;transition:all .15s;font-family:var(--fn);}
.dbtn:hover{border-color:var(--ac);color:var(--ac);}
.dbtn.active{background:var(--acd);border-color:var(--ac);color:var(--ac);}
/* QCARD */
.qcard{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:1.75rem;margin-bottom:1rem;animation:up .2s ease;}
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.qmeta{display:flex;gap:8px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;}
.qnum{font-size:12px;color:var(--mu);font-family:var(--mo);}
.qbadge{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--acd);color:var(--ac);border:1px solid rgba(79,142,247,.2);}
.qtype-badge{font-size:11px;padding:3px 10px;border-radius:12px;border:1px solid;}
.qtype-match{background:rgba(62,207,142,.1);color:var(--gn);border-color:rgba(62,207,142,.3);}
.qtype-order{background:rgba(245,166,35,.1);color:var(--am);border-color:rgba(245,166,35,.3);}
.qtype-hotspot{background:rgba(247,111,111,.1);color:var(--rd);border-color:rgba(247,111,111,.3);}
.qtype-cat{background:rgba(127,119,221,.1);color:#afa9ec;border-color:rgba(127,119,221,.3);}
.qtxt{font-size:16px;color:var(--tx);line-height:1.65;margin-bottom:1.5rem;}
/* MC OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--bdr);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--sur2);text-align:left;width:100%;font-family:var(--fn);}
.opt:hover:not(.locked){border-color:var(--ac);background:var(--acd);}
.opt.picked{border-color:var(--ac);background:var(--acd);}
.opt.correct{border-color:var(--gn);background:var(--gnd);}
.opt.wrong{border-color:var(--rd);background:var(--rdd);}
.opt-k{font-family:var(--mo);font-size:13px;font-weight:500;min-width:22px;color:var(--mu);line-height:1.5;flex-shrink:0;}
.opt.picked .opt-k{color:var(--ac);}
.opt.correct .opt-k{color:var(--gn);}
.opt.wrong .opt-k{color:var(--rd);}
.opt-t{font-size:14px;color:var(--tx);line-height:1.55;}
.opt.correct .opt-t{color:var(--gn);}
.opt.wrong .opt-t{color:var(--rd);}
.opt.picked .opt-t{color:var(--ac);}
.opt.correct .opt-k::after{content:' ✓';}
.opt.wrong .opt-k::after{content:' ✗';}
/* MATCHING */
.match-grid{display:grid;grid-template-columns:1fr 20px 1fr;gap:8px;align-items:center;}
.match-term{padding:10px 12px;background:var(--sur2);border:1px solid var(--bdr2);border-radius:8px;font-size:13px;color:var(--tx);line-height:1.4;}
.match-arrow{color:var(--mu);font-size:14px;text-align:center;}
.msel{width:100%;font-size:13px;padding:9px 10px;border-radius:8px;border:1px solid var(--bdr2);background:var(--sur2);color:var(--tx);font-family:var(--fn);cursor:pointer;}
.msel:focus{outline:none;border-color:var(--ac);}
.msel.ok{border-color:var(--gn);background:rgba(62,207,142,.1);color:var(--gn);}
.msel.bad{border-color:var(--rd);background:var(--rdd);color:var(--rd);}
/* ORDERING */
.order-rows{display:flex;flex-direction:column;gap:8px;}
.order-row{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:center;}
.order-num{width:32px;height:32px;border-radius:50%;background:var(--acd);color:var(--ac);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;border:1px solid rgba(79,142,247,.3);}
.osel{width:100%;font-size:13px;padding:9px 10px;border-radius:8px;border:1px solid var(--bdr2);background:var(--sur2);color:var(--tx);font-family:var(--fn);cursor:pointer;}
.osel:focus{outline:none;border-color:var(--ac);}
.osel.ok{border-color:var(--gn);background:rgba(62,207,142,.1);color:var(--gn);}
.osel.bad{border-color:var(--rd);background:var(--rdd);color:var(--rd);}
/* HOTSPOT */
.hs-wrap{position:relative;display:block;width:100%;}
.hs-svg{width:100%;display:block;border-radius:8px;}
.hs-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.hz{position:absolute;border:2px dashed transparent;border-radius:6px;cursor:pointer;pointer-events:all;transition:all .15s;}
.hz:hover{border-color:var(--ac);background:rgba(79,142,247,.1);}
.hz.picked{border-color:var(--ac);background:rgba(79,142,247,.15);}
.hz.ok{border-color:var(--gn);background:rgba(62,207,142,.15);}
.hz.bad{border-color:var(--rd);background:var(--rdd);}
.hz.reveal{border-color:var(--gn);background:rgba(62,207,142,.1);}
/* CAT */
.cat-track{display:flex;gap:5px;margin-bottom:1rem;flex-wrap:wrap;}
.cat-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;border:1px solid var(--bdr2);color:var(--mu);background:var(--sur2);}
.cat-dot.right{background:var(--gnd);border-color:rgba(62,207,142,.4);color:var(--gn);}
.cat-dot.wrong{background:var(--rdd);border-color:rgba(247,111,111,.4);color:var(--rd);}
.cat-dot.cur{background:var(--acd);border-color:rgba(79,142,247,.5);color:var(--ac);border-width:1.5px;}
.diff-bar{height:5px;border-radius:3px;background:var(--sur2);margin-bottom:4px;overflow:hidden;}
.diff-fill{height:5px;border-radius:3px;transition:width .5s ease,background .5s ease;}
.diff-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-bottom:1rem;font-family:var(--mo);}
/* SHARED */
.expl{margin-top:1.25rem;padding:14px 16px;border-radius:10px;background:rgba(79,142,247,.06);border-left:3px solid var(--ac);font-size:13.5px;color:#9aaac8;line-height:1.65;display:none;}
.expl.show{display:block;animation:up .2s ease;}
.actions{display:flex;gap:10px;margin-top:1.5rem;align-items:center;flex-wrap:wrap;}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--mu);transition:all .15s;font-family:var(--fn);}
.btn:hover{border-color:var(--tx);color:var(--tx);background:var(--sur2);}
.btn.primary{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:500;}
.btn.primary:hover{background:#3a7de8;}
.fb{margin-top:.75rem;padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.5;display:none;}
.fb.show{display:block;}
.fb.ok{background:var(--gnd);border:1px solid rgba(62,207,142,.3);color:var(--gn);}
.fb.bad{background:var(--rdd);border:1px solid rgba(247,111,111,.3);color:var(--rd);}
/* RESULTS */
.res-card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:2.5rem 2rem;text-align:center;animation:up .3s ease;}
.res-badge{display:inline-block;font-size:11px;padding:4px 14px;border-radius:20px;margin-bottom:1rem;font-family:var(--mo);letter-spacing:.1em;text-transform:uppercase;}
.res-badge.pass{background:var(--gnd);color:var(--gn);border:1px solid rgba(62,207,142,.3);}
.res-badge.fail{background:var(--rdd);color:var(--rd);border:1px solid rgba(247,111,111,.3);}
.res-score{font-size:56px;font-weight:600;font-family:var(--mo);line-height:1;letter-spacing:-.03em;}
.res-pct{font-size:18px;color:var(--mu);margin-top:8px;font-family:var(--mo);}
.res-msg{font-size:15px;margin-top:1.25rem;line-height:1.6;max-width:500px;margin-left:auto;margin-right:auto;}
.dr-section{margin-top:2rem;text-align:left;border-top:1px solid var(--bdr);padding-top:1.5rem;}
.dr-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:1rem;font-family:var(--mo);}
.dr-row{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px;}
.dr-n{flex:1;color:var(--mu);}
.dr-bw{width:130px;height:4px;background:var(--sur2);border-radius:2px;}
.dr-b{height:4px;border-radius:2px;background:var(--ac);}
.dr-b.g{background:var(--gn);}
.dr-b.r{background:var(--rd);}
.dr-v{width:40px;text-align:right;color:var(--tx);font-weight:500;font-family:var(--mo);font-size:13px;}
.type-breakdown{margin-top:1.5rem;text-align:left;border-top:1px solid var(--bdr);padding-top:1.5rem;}
.tb-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:13px;}
.tb-label{color:var(--mu);}
.tb-val{color:var(--tx);font-family:var(--mo);font-weight:500;}
@media(max-width:560px){.sbar{grid-template-columns:repeat(2,1fr);}.hdr{flex-direction:column;}.match-grid{grid-template-columns:1fr 16px 1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="logo-tag">ISC2 Certified in Cybersecurity</div>
      <h1>CC Practice Exam</h1>
      <div class="hdr-sub">310 MC · 10 matching · 8 ordering · 3 hotspot · CAT adaptive · offline</div>
    </div>
    <div class="timer-block" id="timer-block" style="display:none">
      <div class="timer" id="timer-disp">2:00:00</div>
      <div class="timer-lbl">time remaining</div>
    </div>
  </div>
  <div id="app"></div>
</div>
<script>




const DOMAINS=['Security Principles','Business Continuity & Incident Response','Access Controls','Network Security','Security Operations'];
const TOTAL_SECS=7200;

let S={
  screen:'start',filter:'All',count:100,timed:true,includeAdv:true,
  questions:[],idx:0,picked:null,answered:false,
  score:0,advScore:0,advTotal:0,dScore:{},dTotal:{},
  secs:TOTAL_SECS,ivl:null,
  // per-question state
  matchSelections:{},orderSelections:{},hsSelected:null,
  catDiff:50,catHistory:[],catCurrentQ:null,catCurrentPool:[]
};

function shuffle(a){return[...a].sort(()=>Math.random()-0.5);}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h+':'+String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}

function startTimer(){
  clearInterval(S.ivl);S.secs=TOTAL_SECS;updTimer();
  S.ivl=setInterval(()=>{S.secs--;updTimer();if(S.secs<=0){clearInterval(S.ivl);S.finished=true;render();}},1000);
}
function updTimer(){
  const el=document.getElementById('timer-disp');if(!el)return;
  el.textContent=fmt(S.secs);
  el.className='timer'+(S.secs<300?' dngr':S.secs<900?' warn':'');
}

// -- BUILD QUESTION LIST ------------------------------------------
function buildQuestions(){
  const pool=S.filter==='All'?MC_BANK:MC_BANK.filter(q=>q.d===S.filter);
  let qs=shuffle(pool).slice(0,Math.min(S.count,pool.length)).map(q=>({...q,qtype:'mc'}));
  if(S.includeAdv){
    const advPool=S.filter==='All'?ADV_BANK:ADV_BANK.filter(q=>q.d===S.filter);
    if(advPool.length>0){
      const advSample=shuffle(advPool).slice(0,Math.min(8,advPool.length));
      // interleave advanced questions roughly every 10 MC questions
      advSample.forEach((aq,i)=>{
        const pos=Math.min(Math.floor((i+1)*qs.length/(advSample.length+1)),qs.length);
        qs.splice(pos+i,0,{...aq,qtype:aq.type});
      });
    }
  }
  return qs;
}

function initQuiz(){
  DOMAINS.forEach(d=>{S.dScore[d]=0;S.dTotal[d]=0;});
  S.questions=buildQuestions();
  S.idx=0;S.picked=null;S.answered=false;S.score=0;S.advScore=0;S.advTotal=0;S.finished=false;
  S.matchSelections={};S.orderSelections={};S.hsSelected=null;
  S.catDiff=50;S.catHistory=[];S.catCurrentPool=shuffle(ADV_BANK.filter(q=>q.type==='mc'||true));
  S.screen='quiz';
  if(S.timed)startTimer();
  else{clearInterval(S.ivl);document.getElementById('timer-block').style.display='none';}
  render();
}

function resetQState(){
  S.picked=null;S.answered=false;
  S.matchSelections={};S.orderSelections={};S.hsSelected=null;
}

function render(){
  const app=document.getElementById('app');
  const tb=document.getElementById('timer-block');
  if(S.screen==='start'){tb.style.display='none';renderStart(app);return;}
  tb.style.display=S.timed?'block':'none';
  if(S.finished){clearInterval(S.ivl);renderResult(app);return;}
  const q=S.questions[S.idx];
  if(!q){S.finished=true;render();return;}
  if(q.qtype==='mc')renderMC(app,q);
  else if(q.qtype==='match')renderMatch(app,q);
  else if(q.qtype==='order')renderOrder(app,q);
  else if(q.qtype==='hotspot')renderHotspot(app,q);
}

// -- START SCREEN -------------------------------------------------
function renderStart(app){
  const domCards=['All',...DOMAINS].map(d=>{
    const cnt=d==='All'?MC_BANK.length:MC_BANK.filter(q=>q.d===d).length;
    return '<div class="dcard'+(S.filter===d?' sel':'')+'" onclick="setFilter(\''+d+'\')"><div class="dcard-n">'+d+'</div><div class="dcard-c">'+cnt+' MC questions</div></div>';
  }).join('');
  const pool=S.filter==='All'?MC_BANK:MC_BANK.filter(q=>q.d===S.filter);
  const cBtns=[30,50,100].map(n=>{
    const ok=n<=pool.length;
    return '<button class="cbtn'+(S.count===n?' sel':'')+(ok?'':' disabled')+'" '+(ok?'onclick="S.count='+n+';refreshCounts()"':'disabled')+'>'+n+'</button>';
  }).join('');
  const tBtns='<button class="tbtn'+(S.includeAdv?' sel':'')+'" onclick="S.includeAdv=true;this.classList.add(\'sel\');document.querySelectorAll(\'.tbtn\')[1].classList.remove(\'sel\')">MC + matching/ordering/hotspot</button><button class="tbtn'+(!S.includeAdv?' sel':'')+'" onclick="S.includeAdv=false;this.classList.remove(\'sel\');this.classList.add(\'sel\');document.querySelectorAll(\'.tbtn\')[0].classList.remove(\'sel\')">MC only</button>';
  const mBtns=[['Timed (2 hrs)',true],['Untimed',false]].map(([l,v])=>'<button class="mbtn'+(S.timed===v?' sel':'')+'" onclick="S.timed='+v+';refreshModes()">'+l+'</button>').join('');
  app.innerHTML='<div class="start-card"><h2>Configure your practice exam</h2><p>Select a domain to drill, or mix all 5. Toggle question types  --  advanced questions (matching, ordering, hotspot) simulate the real ISC2 exam format.<br><span style="color:var(--ac);font-family:var(--mo);font-size:12px;">310 MC - 10 matching - 8 ordering - 3 hotspot</span></p><div class="slbl">Filter by domain</div><div class="dgrid" id="dgrid">'+domCards+'</div><div class="slbl">Number of questions</div><div class="count-row" id="count-row">'+cBtns+'</div><div class="slbl">Question types</div><div class="type-row" id="type-row">'+tBtns+'</div><div class="slbl">Mode</div><div class="mode-row" id="mode-row">'+mBtns+'</div><div style="display:flex;align-items:center;justify-content:center;"><button class="btn primary" onclick="initQuiz()" style="font-size:15px;padding:12px 36px;">Start exam &#8594;</button></div></div>';
}
function setFilter(d){
  S.filter=d;
  const pool=d==='All'?MC_BANK:MC_BANK.filter(q=>q.d===d);
  if(S.count>pool.length)S.count=pool.length>=100?100:pool.length>=50?50:30;
  document.querySelectorAll('.dcard').forEach(el=>{el.classList.toggle('sel',el.querySelector('.dcard-n').textContent===d);});
  refreshCounts();
}
function refreshCounts(){

// -- STATS / PROGRESS HEADER --------------------------------------
function statsHTML(){
  const total=S.questions.length,done=S.idx,correct=S.score+(S.advScore);
  const pct=done>0?Math.round((correct/done)*100):0;
  return '<div class="sbar"><div class="stat"><div class="stat-v">'+done+'</div><div class="stat-l">Answered</div></div><div class="stat"><div class="stat-v">'+correct+'</div><div class="stat-l">Correct</div></div><div class="stat"><div class="stat-v">'+pct+'%</div><div class="stat-l">Score</div></div><div class="stat"><div class="stat-v">'+(total-done)+'</div><div class="stat-l">Remaining</div></div></div>';
}
function progHTML(){
  const pct=Math.round((S.idx/S.questions.length)*100);
  return '<div class="prog-w"><div class="prog-t"><div class="prog-f" style="width:'+pct+'%"></div></div><div class="prog-m"><span>Q'+(S.idx+1)+' of '+S.questions.length+'</span><span>'+pct+'% complete</span></div></div>';
}
function domainBarHTML(){
  return '<div class="dbar">'+['All',...DOMAINS].map(d=>'<button class="dbtn'+(S.filter===d?' active':'')+'" onclick="setFilter(\''+d+'\');initQuiz()">'+d+'</button>').join('')+'</div>';
}
function qmetaHTML(q,extra){
  return '<div class="qmeta"><span class="qnum">Q'+(S.idx+1)+'</span><span class="qbadge">'+q.d+'</span>'+(extra||'')+'</div>';
}
function explHTML(e){return'<div class="expl'+(S.answered?' show':'')+'"><strong style="color:var(--ac)">Explanation:</strong> '+e+'</div>';}
function actionsHTML(checkId,nextLabel){
  let h='<div class="actions">';
  if(!S.answered&&S.picked!==null)h+='<button class="btn primary" onclick="'+checkId+'()">Check answer</button>';
  if(S.answered)h+='<button class="btn primary" onclick="nextQ()">'+nextLabel+'</button>';
  h+='<button class="btn" onclick="S.screen=\'start\';clearInterval(S.ivl);render()">&#8592; Menu</button></div>';
  return h;
}

// -- MC -----------------------------------------------------------
function renderMC(app,q){
  const opts=q.o.map((o,i)=>{
    let cls='opt';
    if(S.answered){if(i===q.a)cls+=' correct';else if(i===S.picked)cls+=' wrong';cls+=' locked';}
    else if(i===S.picked)cls+=' picked';
    return'<button class="'+cls+'" onclick="pickMC('+i+')"><span class="opt-k">'+String.fromCharCode(65+i)+'.</span><span class="opt-t">'+o+'</span></button>';
  }).join('');
  const nextLbl=S.idx+1<S.questions.length?'Next question &#8594;':'See results';
  app.innerHTML=statsHTML()+progHTML()+domainBarHTML()+'<div class="qcard">'+qmetaHTML(q)+'<div class="qtxt">'+q.q+'</div><div class="opts">'+opts+'</div>'+explHTML(q.e)+actionsHTML('submitMC',nextLbl)+'</div>';
}
function pickMC(i){if(S.answered)return;S.picked=i;renderMC(document.getElementById('app'),S.questions[S.idx]);}
function submitMC(){
  if(S.picked===null||S.answered)return;
  S.answered=true;
  const q=S.questions[S.idx];
  S.dTotal[q.d]=(S.dTotal[q.d]||0)+1;
  if(S.picked===q.a){S.score++;S.dScore[q.d]=(S.dScore[q.d]||0)+1;}
  renderMC(document.getElementById('app'),q);
}

// -- MATCHING -----------------------------------------------------
function renderMatch(app,q){
  const sel=S.matchSelections;
  // Build rows  --  dropdowns with no-duplicate logic
  const rows=q.terms.map((term,i)=>{
    const usedElsewhere=Object.entries(sel).filter(([k,v])=>parseInt(k)!==i&&v!=='').map(([k,v])=>v);
    let cls='msel';
    if(S.answered){cls+=(sel[i]===q.answers[i]?' ok':sel[i]?(' bad'):' bad');}
    const optsHtml=q.answers.map((ans,j)=>{
      const disabled=!S.answered&&sel[i]!==ans&&usedElsewhere.includes(ans);
      return'<option value="'+ans+'" '+(sel[i]===ans?'selected':'')+(disabled?' disabled style="opacity:.4"':'')+'>'+ans+'</option>';
    }).join('');
    return'<div class="match-term">'+term+'</div><div class="match-arrow">&#8594;</div><select class="'+cls+'" id="ms'+i+'" onchange="updateMatch('+i+',this.value)"'+(S.answered?' disabled':'')+'><option value="">Select&#8230;</option>'+optsHtml+'</select>';
  }).join('');
  let checkDone=!S.answered?Object.values(sel).filter(v=>v!=='').length===q.terms.length:false;
  const nextLbl=S.idx+1<S.questions.length?'Next question &#8594;':'See results';
  app.innerHTML=statsHTML()+progHTML()+domainBarHTML()+'<div class="qcard">'+qmetaHTML(q,'<span class="qtype-badge qtype-match">Matching</span>')+'<div class="qtxt">'+q.q+'</div><div class="match-grid">'+rows+'</div>'+explHTML(q.e)+'<div class="actions">'+(!S.answered&&checkDone?'<button class="btn primary" onclick="submitMatch()">Check answers</button>':'')+(S.answered?'<button class="btn primary" onclick="nextQ()">'+nextLbl+'</button>':'')+'<button class="btn" onclick="S.screen=\'start\';clearInterval(S.ivl);render()">&#8592; Menu</button></div></div>';
}
function updateMatch(i,val){
  S.matchSelections[i]=val;
  renderMatch(document.getElementById('app'),S.questions[S.idx]);
}
function submitMatch(){
  if(S.answered)return;
  S.answered=true;
  const q=S.questions[S.idx];
  S.advTotal++;
  S.dTotal[q.d]=(S.dTotal[q.d]||0)+1;
  const allCorrect=q.terms.every((_,i)=>S.matchSelections[i]===q.answers[i]);
  if(allCorrect){S.advScore++;S.dScore[q.d]=(S.dScore[q.d]||0)+1;}
  renderMatch(document.getElementById('app'),q);
}

// -- ORDERING -----------------------------------------------------
function renderOrder(app,q){
  const sel=S.orderSelections;
  const rows=q.steps.map((step,i)=>{
    const usedElsewhere=Object.entries(sel).filter(([k,v])=>parseInt(k)!==i&&v!=='').map(([k,v])=>v);
    let cls='osel';
    if(S.answered){cls+=(sel[i]===q.steps[i]?' ok':sel[i]?(' bad'):' bad');}
    const optsHtml=q.steps.map(ans=>{
      const disabled=!S.answered&&sel[i]!==ans&&usedElsewhere.includes(ans);
      return'<option value="'+ans+'" '+(sel[i]===ans?'selected':'')+(disabled?' disabled style="opacity:.4"':'')+'>'+ans+'</option>';
    }).join('');
    return'<div class="order-row"><div class="order-num">'+(i+1)+'</div><select class="'+cls+'" id="os'+i+'" onchange="updateOrder('+i+',this.value)"'+(S.answered?' disabled':'')+'><option value="">Select step&#8230;</option>'+optsHtml+'</select></div>';
  }).join('');
  let checkDone=!S.answered?Object.values(sel).filter(v=>v!=='').length===q.steps.length:false;
  const nextLbl=S.idx+1<S.questions.length?'Next question &#8594;':'See results';
  app.innerHTML=statsHTML()+progHTML()+domainBarHTML()+'<div class="qcard">'+qmetaHTML(q,'<span class="qtype-badge qtype-order">Ordering</span>')+'<div class="qtxt">'+q.q+'</div><div class="order-rows">'+rows+'</div>'+explHTML(q.e)+'<div class="actions">'+(!S.answered&&checkDone?'<button class="btn primary" onclick="submitOrder()">Check order</button>':'')+(S.answered?'<button class="btn primary" onclick="nextQ()">'+nextLbl+'</button>':'')+'<button class="btn" onclick="S.screen=\'start\';clearInterval(S.ivl);render()">&#8592; Menu</button></div></div>';
}
function updateOrder(i,val){
  S.orderSelections[i]=val;
  renderOrder(document.getElementById('app'),S.questions[S.idx]);
}
function submitOrder(){
  if(S.answered)return;
  S.answered=true;
  const q=S.questions[S.idx];
  S.advTotal++;
  S.dTotal[q.d]=(S.dTotal[q.d]||0)+1;
  const allCorrect=q.steps.every((step,i)=>S.orderSelections[i]===step);
  if(allCorrect){S.advScore++;S.dScore[q.d]=(S.dScore[q.d]||0)+1;}

function renderHotspot(app,q){
  const svgHtml=buildHotspotSVG(q.scene);
  const zones=getHotspotZones(q.scene);
  let zoneHtml='';
  for(const[zk,zv] of Object.entries(zones)){
    if(!q.zones[zk])continue;
    let cls='hz';
    if(S.answered){
      if(zk===q.correct)cls+=' ok';
      else if(zk===S.hsSelected)cls+=' bad';
    } else if(zk===S.hsSelected) cls+=' picked';
    const label=q.zones[zk]?q.zones[zk].label:'';
    zoneHtml+='<div class="'+cls+'" style="'+zv.style+'" onclick="pickHotspot(\''+zk+'\',this)" title="'+label+'"></div>';
  }
  const selected=S.hsSelected?((q.zones[S.hsSelected]||{}).label||S.hsSelected):'Nothing selected  --  click a region';
  let checkDone=!S.answered&&S.hsSelected!==null;
  const nextLbl=S.idx+1<S.questions.length?'Next question &#8594;':'See results';
  app.innerHTML=statsHTML()+progHTML()+domainBarHTML()+'<div class="qcard">'+qmetaHTML(q,'<span class="qtype-badge qtype-hotspot">Hotspot</span>')+'<div class="qtxt">'+q.q+'</div><div class="hs-wrap">'+svgHtml+'<div class="hs-overlay">'+zoneHtml+'</div></div><div style="margin-top:.75rem;font-size:13px;color:var(--mu);">Selected: <span style="color:var(--tx)">'+selected+'</span></div>'+explHTML(q.e)+'<div class="actions">'+(!S.answered&&checkDone?'<button class="btn primary" onclick="submitHotspot()">Submit answer</button>':'')+(S.answered?'<button class="btn primary" onclick="nextQ()">'+nextLbl+'</button>':'')+'<button class="btn" onclick="S.screen=\'start\';clearInterval(S.ivl);render()">&#8592; Menu</button></div></div>';
}
function pickHotspot(zk){
  if(S.answered)return;
  S.hsSelected=zk;
  renderHotspot(document.getElementById('app'),S.questions[S.idx]);
}
function submitHotspot(){
  if(S.answered)return;
  S.answered=true;
  const q=S.questions[S.idx];
  S.advTotal++;
  S.dTotal[q.d]=(S.dTotal[q.d]||0)+1;
  if(S.hsSelected===q.correct){S.advScore++;S.dScore[q.d]=(S.dScore[q.d]||0)+1;}
  renderHotspot(document.getElementById('app'),q);
}

}

// -- RESULTS ------------------------------------------------------
function renderResult(app){
  const total=S.questions.length;
  const mcDone=S.idx-(S.advTotal||0);
  const correct=S.score+S.advScore;
  const pct=total>0?Math.round((correct/total)*100):0;
  const pass=pct>=70;
  const tUsed=TOTAL_SECS-S.secs;
  const timeStr=S.timed?'<p style="font-size:13px;color:var(--mu);margin-top:4px;font-family:var(--mo);">Time used: '+fmt(tUsed)+'</p>':'';
  const drRows=DOMAINS.map(d=>{
    const t=S.dTotal[d]||0,s=S.dScore[d]||0,p=t>0?Math.round((s/t)*100):0;
    const cls=p>=70?'g':p<50?'r':'';
    return'<div class="dr-row"><span class="dr-n">'+d+'</span><div class="dr-bw"><div class="dr-b '+cls+'" style="width:'+p+'%"></div></div><span class="dr-v">'+(t>0?p+'%':' -- ')+'</span></div>';
  }).join('');
  const typeRows=[
    ['Multiple choice',S.score+'/'+(S.idx-S.advTotal)],
    ['Matching / ordering / hotspot',S.advScore+'/'+S.advTotal],
    ['Overall',correct+'/'+total+' ('+pct+'%)'],
  ].map(([l,v])=>'<div class="tb-row"><span class="tb-label">'+l+'</span><span class="tb-val">'+v+'</span></div>').join('');
  app.innerHTML='<div class="res-card"><div class="res-badge '+(pass?'pass':'fail')+'">'+(pass?'PASS':'NEEDS IMPROVEMENT')+'</div><div class="res-score">'+correct+'/'+total+'</div><div class="res-pct">'+pct+'% &mdash; '+(pass?'Above':'Below')+' the 70% passing threshold</div>'+timeStr+'<div class="res-msg">'+(pass?'Great work! You are on track to pass the ISC2 CC exam. Keep drilling weak domains.':'Keep going! Review the domains with lower scores below, then retake to track your progress.')+'</div><div class="dr-section"><h3>Performance by domain</h3>'+drRows+'</div><div class="type-breakdown"><h3>Breakdown by question type</h3>'+typeRows+'</div><div style="display:flex;gap:10px;justify-content:center;margin-top:2rem;flex-wrap:wrap;"><button class="btn primary" onclick="initQuiz()">Retake</button><button class="btn" onclick="S.screen=\'start\';clearInterval(S.ivl);render()">Back to menu</button></div></div>';
}
