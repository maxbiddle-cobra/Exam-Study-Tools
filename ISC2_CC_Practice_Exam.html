{d:"Security Principles",q:"The CIA Triad in information security stands for:",o:["Control, Identity, Authentication","Compliance, Infrastructure, Assurance","Confidentiality, Integrity, Availability","Cybersecurity, Intelligence, Analysis"],a:2,e:"The CIA Triad is the core model of information security: Confidentiality (preventing unauthorized disclosure), Integrity (ensuring accuracy), and Availability (ensuring access when needed)."},
{d:"Security Principles",q:"Which term describes verifying that a user is who they claim to be?",o:["Authentication","Accountability","Non-repudiation","Authorization"],a:0,e:"Authentication is the process of verifying a claimed identity. It uses something you know (password), something you have (token), or something you are (biometric)."},
{d:"Security Principles",q:"A company purchases cyber insurance to cover potential breach losses. This is an example of:",o:["Risk acceptance","Risk avoidance","Risk transference","Risk mitigation"],a:2,e:"Risk transference shifts the financial burden of a risk to a third party such as an insurer. The organization still faces the risk but reduces its financial exposure."},
{d:"Security Principles",q:"Which of the following is an example of a technical control?",o:["Physical access badge","Security awareness training","Firewall implementation","Background check policy"],a:2,e:"Technical (logical) controls use technology to reduce risk  --  firewalls, encryption, access control lists, and IDS/IPS. Training is administrative; badges are physical."},
{d:"Security Principles",q:"Non-repudiation ensures that:",o:["A user cannot be held accountable","A system cannot be taken offline","An entity cannot deny having performed an action","Data cannot be modified in transit"],a:2,e:"Non-repudiation prevents a party from denying an action. Digital signatures are the most common mechanism, binding identity to a transaction."},
{d:"Security Principles",q:"Which principle requires two or more people to complete a sensitive task?",o:["Separation of duties","Dual control","Least privilege","Defense in depth"],a:1,e:"Dual control (two-person integrity) requires two authorized individuals to be present and active for sensitive operations, preventing one person from acting alone."},
{d:"Security Principles",q:"Data classification helps organizations:",o:["Apply appropriate controls based on data sensitivity","Encrypt all data automatically","Eliminate the need for access controls","Share data freely with all employees"],a:0,e:"Data classification assigns sensitivity levels (public, internal, confidential, secret) so proportionate security controls and handling requirements can be applied."},
{d:"Security Principles",q:"'Defense in depth' is BEST described as:",o:["Encrypting all data at rest","Relying on perimeter firewalls only","Using the strongest single control available","Layering multiple controls so failure of one does not compromise the whole system"],a:3,e:"Defense in depth layers multiple security controls. If one fails, others remain. No single control is foolproof, so redundancy is critical."},
{d:"Security Principles",q:"Which risk response accepts the risk without further action?",o:["Mitigation","Avoidance","Transference","Acceptance"],a:3,e:"Risk acceptance acknowledges the risk and decides not to act, typically when mitigation cost exceeds potential impact or risk is within acceptable tolerance."},
{d:"Security Principles",q:"What is the difference between a threat and a vulnerability?",o:["Threats only apply to physical security","A threat is a potential danger; a vulnerability is a weakness that can be exploited","They are the same thing","A vulnerability is a potential danger; a threat is a weakness"],a:1,e:"A threat is any potential danger (hacker, malware, flood). A vulnerability is a weakness that can be exploited. Risk arises when a threat exploits a vulnerability."},
{d:"Security Principles",q:"Which CIA Triad component ensures information is accessible only to those authorized?",o:["Availability","Accountability","Confidentiality","Integrity"],a:2,e:"Confidentiality ensures information is not disclosed to unauthorized individuals. Key mechanisms include encryption, access controls, and classification."},
{d:"Security Principles",q:"Annual security awareness training is an example of which type of control?",o:["Technical","Compensating","Administrative","Physical"],a:2,e:"Administrative (managerial) controls are policies, procedures, and training programs. They govern how people and processes operate within the security framework."},
{d:"Security Principles",q:"Risk is BEST defined as:",o:["The likelihood a threat exploits a vulnerability combined with the resulting impact","A type of malware","The cost of security controls","Any known vulnerability"],a:0,e:"Risk = Probability x Impact. It combines the likelihood of a threat exploiting a vulnerability with the magnitude of resulting harm."},
{d:"Security Principles",q:"'Need to know' is MOST closely associated with which security principle?",o:["Confidentiality","Accountability","Integrity","Availability"],a:0,e:"'Need to know' limits information access to those who require it for their duties, directly supporting confidentiality by minimizing exposure."},
{d:"Security Principles",q:"A security policy is BEST described as:",o:["A step-by-step incident response guide","A high-level document defining an organization's security objectives and rules","A technical firewall configuration","A list of approved software"],a:1,e:"A security policy is a high-level management document defining security goals, responsibilities, and rules. Procedures and standards implement the policy at lower levels."},
{d:"Security Principles",q:"Integrity in the CIA Triad means:",o:["Data is always available to authorized users","Data is accurate, consistent, and has not been tampered with","Data is backed up regularly","Data is encrypted at rest"],a:1,e:"Integrity ensures data has not been altered in an unauthorized manner. Hashing, digital signatures, and checksums verify integrity."},
{d:"Security Principles",q:"A firewall that blocks all traffic by default and allows only explicitly permitted traffic follows which principle?",o:["Separation of duties","Need to know","Default deny (implicit deny)","Least privilege"],a:2,e:"Default deny (implicit deny) blocks everything unless specifically allowed. This is fundamental to sound firewall and access control design."},
{d:"Security Principles",q:"Which of the following is an example of a physical security control?",o:["Antivirus software","Security badge reader on a data center door","Role-based access control","Data encryption"],a:1,e:"Physical controls protect the physical environment: badge readers, security cameras, locks, guards, and fences. They complement technical and administrative controls."},
{d:"Security Principles",q:"'Due diligence' in security means:",o:["Delegating all security tasks to IT","Accepting all risks as inevitable","Researching and understanding risks to act responsibly to address them","Assigning blame after an incident"],a:2,e:"Due diligence involves taking reasonable steps to identify risks. Due care means acting on that knowledge. Both demonstrate responsible security management."},
{d:"Security Principles",q:"Residual risk is BEST described as:",o:["Risk transferred to an insurer","The highest-priority risk in a risk register","Risk completely eliminated by controls","Risk remaining after security controls have been applied"],a:3,e:"Residual risk is what remains after controls are applied. No controls eliminate all risk; organizations decide if the residual risk is acceptable."},
{d:"Security Principles",q:"An attacker secretly intercepts communications between two parties. This is known as:",o:["Man-in-the-middle (MitM) attack","Phishing","Denial of service","SQL injection"],a:0,e:"A MitM attack involves an attacker secretly intercepting and potentially altering communications between two parties who believe they are communicating directly."},
{d:"Security Principles",q:"The PRIMARY purpose of security awareness training is to:",o:["Ensure employees understand and follow security policies","Train IT staff in penetration testing","Replace technical controls","Satisfy audit requirements only"],a:0,e:"Awareness training ensures all employees understand risks, policies, and responsibilities. Human error is a leading cause of breaches, making training essential."},
{d:"Security Principles",q:"Which of the following BEST describes 'separation of duties'?",o:["One person handles all sensitive tasks for efficiency","All employees have the same access level","A single administrator manages all security functions","Critical tasks are divided among multiple people to prevent fraud"],a:3,e:"Separation of duties divides critical tasks among multiple individuals so no single person can complete a fraudulent transaction or error without detection."},
{d:"Security Principles",q:"Which type of malware disguises itself as legitimate software to trick users into installing it?",o:["Worm","Ransomware","Rootkit","Trojan horse"],a:3,e:"A Trojan horse disguises itself as a legitimate program. Unlike viruses or worms, it doesn't self-replicate but relies on users installing it, then executes malicious actions."},
{d:"Security Principles",q:"Social engineering attacks primarily target:",o:["Application code","Network infrastructure","Human psychology and behavior","Database systems"],a:2,e:"Social engineering exploits human psychology  --  trust, fear, urgency  --  to manipulate people into disclosing information or performing actions that compromise security."},
{d:"Security Principles",q:"Which of the following is the BEST example of two-factor authentication?",o:["Two different passwords","Password and a one-time code sent to your phone","Password and a security question","Username and password"],a:1,e:"True two-factor authentication combines two different factor categories: something you know (password) and something you have (phone/token). A security question is still 'something you know.'"},
{d:"Security Principles",q:"A security baseline is BEST described as:",o:["The maximum security level achievable","A list of all known threats","The minimum acceptable security configuration for a system","A record of past incidents"],a:2,e:"A security baseline defines the minimum acceptable security configuration. Systems below baseline are non-compliant and must be remediated."},
{d:"Security Principles",q:"Which of the following describes 'accountability' in information security?",o:["Users are never monitored","Actions can be traced back to the individual who performed them","Administrators approve every user action","All users share a single login account"],a:1,e:"Accountability ensures that actions can be traced to individuals through audit logs, unique user IDs, and monitoring. It deters misuse and supports incident investigation."},
{d:"Security Principles",q:"Phishing is BEST described as:",o:["A method to crack passwords","A social engineering attack using deceptive emails or messages","A type of denial-of-service attack","A network port scanning technique"],a:1,e:"Phishing uses deceptive emails, texts, or websites to trick users into revealing credentials or installing malware. It is the most common form of social engineering."},
{d:"Security Principles",q:"Which of the following BEST describes a vulnerability assessment?",o:["A training exercise for security staff","A review of policies and procedures","An authorized simulated attack to test defenses","A systematic review of security weaknesses in a system"],a:3,e:"A vulnerability assessment systematically identifies and evaluates security weaknesses in systems, networks, and applications without actively exploiting them."},
{d:"Security Principles",q:"What is 'risk avoidance'?",o:["Reducing the impact of a risk","Accepting a risk and monitoring it","Eliminating the activity that creates the risk","Shifting the risk to a third party"],a:2,e:"Risk avoidance means stopping or not starting an activity that creates unacceptable risk. For example, not collecting sensitive data you don't need avoids the risk of its exposure."},
{d:"Security Principles",q:"Which of the following is an example of a preventive control?",o:["Audit log review","Firewall blocking unauthorized traffic","Security camera recording","Alert when unauthorized access is detected"],a:1,e:"Preventive controls stop incidents before they occur. Firewalls, encryption, and access controls are preventive. Cameras are detective; alerts are detective; log reviews are detective."},
{d:"Security Principles",q:"A detective control is designed to:",o:["Reduce the severity of an attack","Identify that an attack or incident has occurred","Stop an attack before it happens","Restore systems after an attack"],a:1,e:"Detective controls identify incidents after they occur  --  IDS alerts, audit log reviews, and security cameras are detective controls. Preventive controls stop events; corrective controls recover."},
{d:"Security Principles",q:"The principle of 'privacy by design' means:",o:["Privacy is only relevant for healthcare data","Privacy is the user's responsibility","Privacy features are added after a system is built","Privacy protections are built into systems from the beginning"],a:3,e:"Privacy by design integrates privacy protections into the design of systems and processes from the outset rather than adding them as an afterthought."},
{d:"Security Principles",q:"Which of the following BEST defines 'information security governance'?",o:["The framework ensuring security activities align with business goals and risk tolerance","Installing and configuring security tools","Writing incident response procedures","Training employees on phishing"],a:0,e:"Information security governance is the set of policies, roles, and oversight processes that ensure security strategies align with organizational goals and risk tolerance."},
{d:"Security Principles",q:"A corrective control is designed to:",o:["Deter potential attackers","Prevent an incident from occurring","Restore systems to normal after an incident","Detect that an incident has occurred"],a:2,e:"Corrective controls restore systems to normal operations after an incident. Examples include restoring from backup, patching a vulnerability, and removing malware."},
{d:"Security Principles",q:"Which of the following is an example of 'data at rest'?",o:["Data cached in a web browser","Data being processed in RAM","Data being transmitted over a network","Data stored on a hard drive or database"],a:3,e:"Data at rest refers to inactive data stored physically in any digital form  --  hard drives, databases, tapes. It is protected through encryption and access controls."}
];
const MC_BANK1=[
{d:"Security Principles",q:"Tailgating (piggybacking) is an example of which type of attack?",o:["Network attack","Social engineering / physical security breach","Cryptographic attack","Malware attack"],a:1,e:"Tailgating is a physical social engineering attack where an unauthorized person follows an authorized person through a secured door. Mitigations include mantraps and security awareness."},
{d:"Security Principles",q:"Which of the following BEST describes 'data integrity'?",o:["Data is encrypted during transmission","Data is classified as confidential","Data has not been altered in an unauthorized manner","Data is accessible to all users"],a:2,e:"Data integrity means data is complete, accurate, and has not been tampered with. Hashing algorithms (MD5, SHA-256) and digital signatures are used to verify integrity."},
{d:"Security Principles",q:"An organization decides not to collect social security numbers they don't need. This is an example of:",o:["Risk transference","Risk acceptance","Risk avoidance","Risk mitigation"],a:2,e:"By not collecting the data at all, the organization eliminates the associated risk  --  this is risk avoidance. You can't lose what you don't have."},
{d:"Security Principles",q:"Which of the following BEST describes 'information classification'?",o:["Encrypting all organizational data","Deleting old data automatically","Assigning sensitivity labels to data to guide handling and protection","Sorting files alphabetically"],a:2,e:"Information classification assigns labels like Public, Internal, Confidential, or Secret to data based on sensitivity, guiding how it should be handled, stored, and shared."},
{d:"Security Principles",q:"A 'compensating control' is BEST described as:",o:["A control that detects incidents","A primary security control","An alternative control used when the primary control cannot be implemented","A physical security measure"],a:2,e:"A compensating control is an alternative measure providing equivalent protection when the primary required control cannot be implemented due to technical or operational constraints."},
{d:"Security Principles",q:"Which of the following BEST defines 'asset'?",o:["Anything of value to the organization including data, software, hardware, and people","Only financial resources","Only physical equipment owned by an organization","Anything that can cause harm"],a:0,e:"An asset is anything of value to the organization that needs protection  --  hardware, software, data, intellectual property, people, and reputation are all assets."},
{d:"Security Principles",q:"Which of the following is the MAIN purpose of a risk assessment?",o:["To identify, analyze, and prioritize risks to make informed decisions","To test security controls","To create security policies","To eliminate all organizational risks"],a:0,e:"A risk assessment identifies threats and vulnerabilities, evaluates their likelihood and impact, and prioritizes them so the organization can allocate resources to the most significant risks."},
{d:"Business Continuity & Incident Response",q:"The PRIMARY goal of a Business Continuity Plan (BCP) is to:",o:["Identify all security vulnerabilities","Ensure critical business functions continue during a disruption","Recover all IT systems within one hour","Prevent all possible disasters"],a:1,e:"A BCP maintains or quickly resumes critical business functions during and after disruptions. It is broader than IT disaster recovery, covering people, processes, and communications."},
{d:"Business Continuity & Incident Response",q:"Recovery Time Objective (RTO) is defined as:",o:["The time required to restore a system after an outage","The maximum data loss acceptable","The cost of recovery operations","The frequency of backups"],a:0,e:"RTO is the target time for restoring a system or process. It defines how quickly recovery must occur to avoid unacceptable business impact."},
{d:"Business Continuity & Incident Response",q:"Recovery Point Objective (RPO) refers to:",o:["The cost of data recovery","The maximum acceptable data loss measured in time","The number of backup systems","How long a system can be down"],a:1,e:"RPO defines the maximum tolerable period of data loss. If RPO is 4 hours, backups must occur every 4 hours or less."},
{d:"Business Continuity & Incident Response",q:"The FIRST phase of the incident response lifecycle is:",o:["Recovery","Preparation","Containment","Eradication"],a:1,e:"NIST's incident response lifecycle begins with Preparation  --  establishing the capability to respond. Then Detection, Containment, Eradication, Recovery, and Post-Incident Review follow."},
{d:"Business Continuity & Incident Response",q:"Which backup type only copies data changed since the LAST FULL backup?",o:["Snapshot backup","Mirror backup","Differential backup","Incremental backup"],a:2,e:"A differential backup copies all data changed since the last full backup. It grows larger each day but restores faster than incremental (requires only full + latest differential)."},
{d:"Business Continuity & Incident Response",q:"A Business Impact Analysis (BIA) is used to:",o:["Identify critical business functions and the impact of their disruption","Identify all IT assets","Respond to active incidents","Train staff on incident response"],a:0,e:"A BIA identifies which business functions are critical, the resources they depend on, and the impact of disruption. It is the foundation for BCP and DRP strategies."},
{d:"Business Continuity & Incident Response",q:"A 'hot site' in disaster recovery is:",o:["A fully operational duplicate facility ready for immediate failover","A backup location with no equipment","A warm standby needing some configuration","An offsite tape storage facility"],a:0,e:"A hot site is a fully equipped duplicate facility that can take over immediately. It is the most expensive but fastest recovery option."},
{d:"Business Continuity & Incident Response",q:"During incident response, 'containment' is performed to:",o:["Document lessons learned","Prevent the incident from spreading further","Restore systems to normal operations","Remove the root cause of the attack"],a:1,e:"Containment limits damage and prevents spread  --  isolating affected systems, blocking traffic, or disabling accounts  --  before eradication begins."},
{d:"Business Continuity & Incident Response",q:"Which backup type copies only data changed since the LAST BACKUP OF ANY TYPE?",o:["Differential backup","Mirror backup","Incremental backup","Full backup"],a:2,e:"An incremental backup copies only data changed since the last backup (full or incremental). It is fast to back up but slower to restore, requiring the full backup plus all incrementals."},
{d:"Business Continuity & Incident Response",q:"A 'warm site' in disaster recovery is:",o:["A partially equipped facility that needs some configuration before use","A cloud-based backup service","A fully ready duplicate facility","An empty building with no infrastructure"],a:0,e:"A warm site has hardware and connectivity but needs configuration and data restoration before it can operate. It balances cost and recovery speed between hot and cold sites."},
{d:"Business Continuity & Incident Response",q:"A 'cold site' in disaster recovery is:",o:["A location with only basic infrastructure (power, space, connectivity)  --  no configured equipment","A facility with partial equipment","A fully operational duplicate facility","A cloud-based failover service"],a:0,e:"A cold site provides only basic facilities. Organizations must procure, install, and configure equipment after a disaster. It is the least expensive but slowest recovery option."},
{d:"Business Continuity & Incident Response",q:"The post-incident review (lessons learned) phase is important because:",o:["It restores systems to operation","It assigns blame to responsible parties","It is required by law","It identifies improvements to prevent or better respond to future incidents"],a:3,e:"Post-incident review improves future response by identifying what worked, what failed, and what should change. Blame assignment is counterproductive; the goal is improvement."},
{d:"Business Continuity & Incident Response",q:"Mean Time To Repair (MTTR) is defined as:",o:["The average time between system failures","The average time required to repair a failed system","The time between the last backup and a failure","The maximum time a system can be unavailable"],a:1,e:"MTTR is the average time needed to restore a failed system to operation. Lower MTTR indicates faster, more effective recovery processes."},
{d:"Business Continuity & Incident Response",q:"Mean Time Between Failures (MTBF) measures:",o:["How long a system typically operates before failing","How long it takes to repair a system","The cost of system downtime","The number of backups required"],a:0,e:"MTBF measures average operational time between failures. Higher MTBF indicates greater reliability. It helps organizations plan maintenance and redundancy strategies."},
{d:"Business Continuity & Incident Response",q:"Which of the following BEST describes an incident response plan?",o:["A documented set of procedures for detecting, containing, and recovering from security incidents","A plan to prevent all security incidents","A backup schedule","A technical configuration guide"],a:0,e:"An incident response plan documents procedures for identifying, containing, eradicating, and recovering from security incidents, ensuring a consistent and effective response."},
{d:"Business Continuity & Incident Response",q:"During incident eradication, the primary goal is to:",o:["Restore systems to production","Identify lessons learned","Remove the cause of the incident from affected systems","Notify law enforcement"],a:2,e:"Eradication removes the root cause  --  deleting malware, removing unauthorized accounts, patching vulnerabilities  --  so the incident cannot recur when systems are restored."},
{d:"Business Continuity & Incident Response",q:"Which of the following is a characteristic of a successful BCP test?",o:["All systems must be taken offline","Only IT staff participate","No disruption to operations is acceptable","The test reveals gaps or weaknesses that can be addressed"],a:3,e:"The value of BCP testing is discovering weaknesses before a real disaster. Finding gaps is success, not failure  --  it enables improvements before an actual event."},
{d:"Business Continuity & Incident Response",q:"What does 'data replication' provide in a disaster recovery context?",o:["Automated patch management","Compressed data archives","Near-real-time copies of data at an alternate site to minimize RPO","Encrypted data storage"],a:2,e:"Data replication continuously copies data to an alternate site, minimizing data loss (RPO). Synchronous replication provides zero data loss; asynchronous allows slight lag."},
{d:"Business Continuity & Incident Response",q:"A tabletop exercise in business continuity involves:",o:["Shutting down production systems to test recovery","Fully activating the DR site","A discussion-based walkthrough of the BCP/DRP without physically activating systems","Technical teams running automated failover scripts"],a:2,e:"A tabletop exercise is a discussion-based simulation where stakeholders walk through scenarios. It tests understanding and identifies gaps without operational disruption."},
{d:"Business Continuity & Incident Response",q:"Which of the following is a key element of an effective incident response team (IRT)?",o:["The team should include members from legal, HR, communications, and IT","The team should be external only","The team should consist only of IT staff","The team should only activate after significant damage has occurred"],a:0,e:"An effective IRT is cross-functional, including IT, legal, HR, communications/PR, and management. Incidents often have legal, regulatory, and reputational dimensions beyond technical response."},
{d:"Business Continuity & Incident Response",q:"What is the purpose of chain of custody in incident response?",o:["To ensure evidence is collected and preserved in a legally defensible manner","To restore systems faster","To document the attack timeline","To notify affected users"],a:0,e:"Chain of custody documents who handled evidence, when, and how, ensuring evidence integrity for legal proceedings. Broken chain of custody can make evidence inadmissible."},
{d:"Business Continuity & Incident Response",q:"Which of the following BEST describes 'disaster recovery'?",o:["The process of restoring IT systems and data after a disruption","The process of preventing all disasters","The process of training employees","The process of creating security policies"],a:0,e:"Disaster recovery (DR) focuses on restoring IT infrastructure, systems, and data after a disaster. It is a subset of the broader BCP."},
{d:"Business Continuity & Incident Response",q:"An organization's RTO is 4 hours and RPO is 1 hour. This means:",o:["Systems must recover within 4 hours and can lose up to 1 hour of data","Systems must recover within 1 hour and can lose up to 4 hours of data","Both must complete within 1 hour","Both must complete within 4 hours"],a:0,e:"RTO (4 hours) is the maximum downtime allowed. RPO (1 hour) is the maximum acceptable data loss. Backups must occur at least every hour to meet the RPO."},
{d:"Business Continuity & Incident Response",q:"Ransomware attacks are BEST countered by which recovery control?",o:["Stronger passwords","More frequent log reviews","Additional firewalls","Offline backups that are not connected to the network"],a:3,e:"Offline (air-gapped) backups are the most effective recovery control against ransomware. If backups are network-connected, ransomware can encrypt them too. Regular, tested offline backups enable recovery without paying ransom."},
{d:"Business Continuity & Incident Response",q:"Which of the following is the MOST important consideration when classifying an incident's severity?",o:["The number of help desk tickets received","Whether the attacker is known","The potential business impact and scope of affected systems","The time of day it occurred"],a:2,e:"Severity classification drives resource allocation and response urgency. The key factors are business impact (financial, reputational, operational) and the scope of affected systems."},
{d:"Business Continuity & Incident Response",q:"What is the purpose of a 'call tree' in incident response?",o:["To document a structured notification process so the right people are contacted quickly","To map network topology","To track backup schedules","To list all system vulnerabilities"],a:0,e:"A call tree documents who notifies whom during an incident, ensuring rapid, structured communication across the organization and with external parties like regulators or customers."},
{d:"Business Continuity & Incident Response",q:"Which of the following is NOT a phase of the NIST incident response lifecycle?",o:["Preparation","Post-incident activity","Detection and analysis","Risk assessment"],a:3,e:"NIST SP 800-61 defines four phases: Preparation; Detection and Analysis; Containment, Eradication, and Recovery; and Post-Incident Activity. Risk assessment is part of risk management, not the IR lifecycle."},
{d:"Business Continuity & Incident Response",q:"The concept of 'maximum tolerable downtime' (MTD) represents:",o:["The time between planned maintenance windows","The longest period a business function can be unavailable before causing unacceptable harm","The time to restore from backup","The ideal uptime target for a system"],a:1,e:"MTD (also called Maximum Tolerable Period of Disruption) is the longest time a business process can be disrupted before the impact becomes catastrophic. RTO must be less than MTD."},
{d:"Business Continuity & Incident Response",q:"Which type of test physically activates the disaster recovery site?",o:["Full interruption test","Walkthrough test","Tabletop exercise","Parallel test"],a:0,e:"A full interruption test activates the DR site and redirects actual operations there, providing the most realistic test. It carries risk of disruption and is typically the most expensive test type."},
{d:"Business Continuity & Incident Response",q:"What is the primary goal of the 'recovery' phase in incident response?",o:["Delete all affected systems","Identify the attacker","Return affected systems to normal operation in a secure manner","Document the incident"],a:2,e:"Recovery restores affected systems to normal, secure operation, confirming that threats are eliminated and systems are functioning correctly before returning to production."},
{d:"Business Continuity & Incident Response",q:"Which of the following BEST describes 'fault tolerance'?",o:["Both B and C","A system designed to continue operating even when components fail","A system that never fails","A system with no single point of failure"],a:0,e:"Fault tolerance means a system continues operating despite component failures. RAID, redundant power supplies, and clustering are examples. Eliminating single points of failure is key to achieving fault tolerance."}
];
const MC_BANK2=[
{d:"Business Continuity & Incident Response",q:"An incident response team has confirmed a breach. The NEXT step after identification is:",o:["Recovery","Eradication","Notification to all users","Containment"],a:3,e:"After identifying and confirming an incident, the next step is containment  --  limiting damage and preventing spread. Jumping to eradication without containment allows damage to continue."},
{d:"Business Continuity & Incident Response",q:"System availability of '99.9% uptime' equates to approximately how much downtime per year?",o:["About 3.65 days","About 8 hours","About 24 hours","About 8.76 hours"],a:3,e:"99.9% uptime = 0.1% downtime = 8.76 hours/year (0.001 x 8,760 hours). Known as 'three nines.' Many critical systems aim for 99.99% ('four nines') = ~52 minutes/year."},
{d:"Business Continuity & Incident Response",q:"Which of the following is the BEST reason to test a BCP regularly?",o:["Plans become outdated as systems, staff, and business processes change","Testing eliminates the need for backups","Testing is required by all laws","Testing reduces insurance premiums"],a:0,e:"Systems, personnel, and processes change over time. Regular testing ensures the plan reflects current reality and that personnel know their roles. An untested plan may fail when needed most."},
{d:"Business Continuity & Incident Response",q:"A parallel test in disaster recovery means:",o:["Shutting down the primary site and testing the DR site","Running both the primary and DR sites simultaneously to verify DR capability","Only testing communication procedures","Running a tabletop exercise"],a:1,e:"A parallel test activates the DR site and runs it alongside the primary site. It verifies DR capability without disrupting production, balancing realism and operational safety."},
{d:"Business Continuity & Incident Response",q:"Which term describes the practice of storing backup media at a separate physical location?",o:["Data replication","Offsite storage","RAID","Hot backup"],a:1,e:"Offsite storage protects backups from site-specific disasters (fire, flood, theft). The 3-2-1 rule (3 copies, 2 media types, 1 offsite) is a best practice for backup resilience."},
{d:"Business Continuity & Incident Response",q:"The '3-2-1 backup rule' recommends:",o:["3 daily backups, 2 weekly, 1 monthly","3 cloud providers, 2 on-premises servers, 1 tape","3 full backups weekly, 2 differential, 1 incremental","3 copies of data on 2 different media types with 1 copy stored offsite"],a:3,e:"The 3-2-1 rule: keep 3 copies, on at least 2 different types of storage media, with 1 copy offsite. This provides resilience against hardware failure, media failure, and site disasters."},
{d:"Business Continuity & Incident Response",q:"What is the main purpose of a disaster recovery plan (DRP)?",o:["Restore IT systems and services after a disaster to meet business requirements","Train employees on physical security","Prevent disasters from occurring","Create a list of all IT assets"],a:0,e:"A DRP provides detailed procedures for restoring IT systems, data, and services after a disaster. It is a technical subset of the broader BCP."},
{d:"Access Controls",q:"Which access control model assigns permissions based on a user's organizational role?",o:["Role-Based Access Control (RBAC)","Discretionary Access Control (DAC)","Attribute-Based Access Control (ABAC)","Mandatory Access Control (MAC)"],a:0,e:"RBAC assigns access rights based on roles (manager, auditor, developer). Users inherit permissions from their role, simplifying administration in large organizations."},
{d:"Access Controls",q:"In Mandatory Access Control (MAC), who determines access permissions?",o:["The system/security policy (administrator-defined labels)","The data custodian","The individual user","The data owner"],a:0,e:"In MAC, the system enforces access based on security labels and policies defined by administrators. Users cannot override these permissions, making MAC highly secure and rigid."},
{d:"Access Controls",q:"Multi-factor authentication (MFA) requires:",o:["At least two different types of authentication factors","Administrator approval for each login","A password and a username","Two passwords"],a:0,e:"MFA requires two or more factors from different categories: something you know, something you have, and something you are. Two passwords from the same category is NOT MFA."},
{d:"Access Controls",q:"Which authentication factor is a fingerprint scanner?",o:["Somewhere you are","Something you are","Something you know","Something you have"],a:1,e:"Biometrics (fingerprints, iris scans, facial recognition, voice) are 'something you are' factors. Passwords/PINs are 'something you know'; tokens/smart cards are 'something you have.'"},
{d:"Access Controls",q:"Discretionary Access Control (DAC) allows:",o:["Only system administrators to assign permissions","The system to assign permissions based on labels","Permissions based on job function","The data owner to decide who can access their resources"],a:3,e:"In DAC, the resource owner has discretion to grant or restrict access. Most operating systems use DAC. It is flexible but less secure than MAC, as owners can inadvertently grant excessive access."},
{d:"Access Controls",q:"Identity and Access Management (IAM) does NOT typically include:",o:["Single sign-on (SSO)","User provisioning","Access recertification","Penetration testing"],a:3,e:"IAM covers user lifecycle management, authentication, authorization, SSO, and access reviews. Penetration testing is a security assessment activity separate from IAM."},
{d:"Access Controls",q:"Which of the following BEST describes 'need to know'?",o:["Managers have access to all subordinate data","All employees should have access to all information","Information is freely shared to improve collaboration","Access is limited to those who require it for their specific duties"],a:3,e:"'Need to know' limits information access even within an authorized group  --  a user may have the right clearance level but still not receive access if they don't need it for their job."},
{d:"Access Controls",q:"De-provisioning in identity management refers to:",o:["Removing access rights when a user leaves or changes roles","Resetting a user's password","Creating a new user account","Granting additional permissions to a user"],a:0,e:"De-provisioning removes access rights when a user departs or changes roles. Timely de-provisioning prevents former employees or role changers from retaining inappropriate access."},
{d:"Access Controls",q:"Which of the following BEST describes 'single sign-on' (SSO)?",o:["Using one password for all systems","Logging in once to gain access to multiple systems without re-authenticating","A system where all users share one account","A method of multi-factor authentication"],a:1,e:"SSO allows users to authenticate once and access multiple applications. It improves user experience and can improve security by reducing password fatigue and reuse."},
{d:"Access Controls",q:"What is 'privilege escalation'?",o:["A legitimate process of promoting staff","An attack where a user gains higher access rights than authorized","The process of assigning admin rights to IT staff","Logging off and back in as a different user"],a:1,e:"Privilege escalation is when an attacker (or user) gains elevated access beyond what was authorized  --  either by exploiting vulnerabilities (vertical escalation) or accessing other users' accounts (horizontal escalation)."},
{d:"Access Controls",q:"Access control lists (ACLs) are used to:",o:["Define which users or systems are permitted to access specific resources","Log all user activity","Monitor user behavior","Encrypt data in transit"],a:0,e:"ACLs are tables listing access rights  --  specifying which subjects (users, groups, systems) can perform which operations (read, write, execute) on which objects (files, directories, network resources)."},
{d:"Access Controls",q:"Which of the following is a characteristic of Attribute-Based Access Control (ABAC)?",o:["Access is inherited from group membership","Access is based solely on job title","Only administrators assign access","Access decisions use multiple attributes (user, resource, environment) simultaneously"],a:3,e:"ABAC is the most flexible model, making access decisions based on combinations of attributes: user attributes (role, clearance), resource attributes (classification), and environmental attributes (time, location)."},
{d:"Access Controls",q:"A user account that has not been used for 90 days should be:",o:["Given additional permissions","Promoted to admin status","Left active in case the user returns","Disabled or reviewed to determine if it should be removed"],a:3,e:"Dormant accounts are a security risk  --  they may belong to former employees or contractors. Regular account reviews and automatic disabling of inactive accounts reduce this risk."},
{d:"Access Controls",q:"Which of the following BEST describes 'access recertification'?",o:["Creating new user accounts","Auditing system logs","Resetting all user passwords","Periodically reviewing and confirming that user access rights are still appropriate"],a:3,e:"Access recertification (periodic access review) ensures access rights remain appropriate as roles change. Managers confirm which permissions are still needed, and inappropriate access is revoked."},
{d:"Access Controls",q:"What is the purpose of a 'password policy'?",o:["To store passwords in plain text","To eliminate the need for authentication","To define rules for creating and managing strong passwords","To allow users to share passwords securely"],a:2,e:"A password policy defines requirements for password complexity, length, age, reuse, and storage. Strong password policies reduce the risk of unauthorized access through weak or compromised credentials."},
{d:"Access Controls",q:"Which of the following represents the STRONGEST password?",o:["Tr0ub4dor&3!xK#9","CompanyName2024","p@$$w0rd","Password123"],a:0,e:"Strong passwords are long, complex, and random  --  combining uppercase, lowercase, numbers, and symbols without dictionary words or predictable patterns. Length is especially important for strength."},
{d:"Access Controls",q:"Biometric authentication is MOST vulnerable to which of the following?",o:["Password dictionary attacks","SQL injection","Replay attacks using stolen biometric data","Brute force attacks"],a:2,e:"Unlike passwords, biometric data cannot be changed if compromised. Stolen fingerprints or facial data (e.g., from a spoofed sensor or database breach) can be replayed. This is a fundamental limitation of biometrics."},
{d:"Access Controls",q:"Which of the following is the MAIN benefit of using a password manager?",o:["It eliminates the need for passwords","It bypasses the need for strong password policies","It provides multi-factor authentication","It enables users to create and store unique, complex passwords for every account"],a:3,e:"Password managers enable users to create and remember unique, complex passwords for every account, reducing password reuse  --  one of the most common causes of credential-based breaches."},
{d:"Access Controls",q:"A user is authenticated but tries to access a file they are not authorized to view. Which security concept has prevented this?",o:["Authentication","Accountability","Non-repudiation","Authorization"],a:3,e:"Authorization controls what authenticated users are allowed to do. Authentication confirms identity; authorization confirms what that identity is permitted to access."},
{d:"Access Controls",q:"Kerberos is a network authentication protocol that uses:",o:["Tickets issued by a trusted third party (Key Distribution Center)","Public key infrastructure (PKI) only","Biometric verification","Usernames and passwords transmitted in plaintext"],a:0,e:"Kerberos uses a Key Distribution Center (KDC) to issue time-limited tickets that prove identity without transmitting passwords over the network. It is the default authentication protocol in Active Directory."},
{d:"Access Controls",q:"Which of the following is an example of 'something you have' authentication?",o:["Hardware token (RSA SecurID)","Password","Fingerprint","PIN"],a:0,e:"'Something you have' includes physical objects: hardware tokens, smart cards, mobile phones (for OTP apps). Passwords and PINs are 'something you know'; fingerprints are 'something you are.'"},
{d:"Access Controls",q:"The 'principle of least privilege' is BEST applied by:",o:["Giving all users administrator access for flexibility","Assigning all permissions when an account is created and removing them over time","Granting only the permissions required for a user's specific job function","Using shared accounts for efficiency"],a:2,e:"Least privilege means starting with zero access and granting only what is needed for the specific job. This limits damage from compromised accounts and insider threats."},
{d:"Access Controls",q:"Which of the following BEST describes 'federated identity management'?",o:["All users have a single password across all systems","Users must re-authenticate for every service","Users can authenticate once and access resources across multiple organizations using trust relationships","All organizations use the same user directory"],a:2,e:"Federated identity allows users to authenticate with their home organization and access resources in partner organizations without separate credentials, using standards like SAML or OAuth."},
{d:"Access Controls",q:"What is 'account lockout policy'?",o:["A policy requiring users to log out after each session","A policy preventing users from changing passwords","A policy that temporarily disables an account after a defined number of failed login attempts","A policy that locks accounts after 30 days of inactivity"],a:2,e:"Account lockout policy protects against brute force attacks by locking accounts after N failed attempts. The lockout duration and reset count must be balanced against denial-of-service risk."},
{d:"Access Controls",q:"Which of the following BEST describes a 'privileged account'?",o:["An account with elevated permissions beyond standard user access (e.g., admin, root)","Any account created before 2020","A shared account used by multiple people","Any account with a complex password"],a:0,e:"Privileged accounts (administrator, root, service accounts) have elevated permissions and require stronger controls: MFA, just-in-time access, enhanced monitoring, and privileged access management (PAM) tools."},
{d:"Access Controls",q:"Why should administrator accounts NOT be used for everyday tasks?",o:["Admin accounts are slower","Admin accounts require MFA","Admin accounts have a different interface","Using admin accounts daily increases the risk of malware executing with elevated privileges"],a:3,e:"Using admin accounts for routine work means any malware or mistake runs with full privileges. Best practice is to use a standard account daily and only elevate when administrative tasks specifically require it."},
{d:"Access Controls",q:"'Zero trust' security assumes:",o:["No user or system is inherently trusted  --  all must continuously verify identity and authorization","Users inside the network are trustworthy","Strong perimeter defenses eliminate internal threats","Only external users require authentication"],a:0,e:"Zero trust is a security model assuming no user, device, or network segment is inherently trustworthy. Every access request is verified regardless of location, following 'never trust, always verify.'"},
{d:"Access Controls",q:"Which of the following is the PRIMARY goal of privileged access management (PAM)?",o:["Automatically rotating all user passwords","Eliminating the use of admin accounts","Providing admin access to all employees","Controlling, monitoring, and auditing the use of privileged accounts to reduce security risk"],a:3,e:"PAM solutions control who has privileged access, enforce just-in-time elevation, record privileged sessions, and rotate credentials automatically  --  reducing the risk of privilege abuse."},
{d:"Access Controls",q:"An employee changes departments and receives new permissions but retains old ones. This creates:",o:["A honeypot","Excessive privilege / privilege creep","Defense in depth","Separation of duties"],a:1,e:"Privilege creep occurs when accumulated permissions from previous roles are not removed. Regular access recertification and de-provisioning workflows prevent this common security issue."},
{d:"Access Controls",q:"What does 'RBAC' stand for in access control?",o:["Risk-Based Access Control","Rule-Based Access Control","Role-Based Access Control","Resource-Based Access Control"],a:2,e:"RBAC stands for Role-Based Access Control. Access rights are assigned to roles, and users are assigned to roles, simplifying administration and ensuring consistent permissions across users with similar duties."},
{d:"Access Controls",q:"Which of the following BEST describes 'context-aware authentication'?",o:["Authentication that considers additional factors like device, location, and time of access","Authentication requiring three or more factors","Authentication that only uses passwords","Authentication that never requires a password"],a:0,e:"Context-aware (or risk-based) authentication evaluates contextual signals  --  device, location, time, behavior patterns  --  to adjust authentication requirements. Unusual context triggers step-up authentication."}
];
const MC_BANK3=[
{d:"Access Controls",q:"What is the purpose of an 'access control policy'?",o:["To define rules and standards governing who can access what resources under what conditions","To list all user passwords","To monitor network traffic","To encrypt all organizational data"],a:0,e:"An access control policy documents the organization's rules for access management: who can access what, under what conditions, based on what principles (least privilege, need to know, separation of duties)."},
{d:"Access Controls",q:"A smart card is an example of which authentication factor?",o:["Something you have","Something you are","Something you know","Somewhere you are"],a:0,e:"A smart card is a physical object the user possesses  --  'something you have.' Combined with a PIN ('something you know'), it forms two-factor authentication commonly used for physical and logical access."},
{d:"Access Controls",q:"Which of the following BEST describes 'identity proofing'?",o:["Verifying that a person is who they claim to be before issuing credentials","Resetting a forgotten password","Assigning permissions to a user","Creating a digital identity"],a:0,e:"Identity proofing establishes confidence in a person's claimed identity before enrolling them in a system. It may involve verifying government ID, in-person appearance, or knowledge-based authentication."},
{d:"Access Controls",q:"Which access control model is MOST commonly used in government and military environments?",o:["DAC","MAC","RBAC","ABAC"],a:1,e:"MAC is used extensively in government and military environments because it enforces strict, system-controlled access based on security classifications and clearance levels that users cannot override."},
{d:"Access Controls",q:"The concept of 'just-in-time' (JIT) access in privileged access management means:",o:["Passwords are changed every day","Elevated privileges are granted only for the specific duration needed for a task, then revoked","Admin access is always available to approved staff","All access is provided automatically"],a:1,e:"JIT access grants elevated privileges on demand for the minimum time needed, then automatically revokes them. This dramatically reduces the window of exposure if an admin account is compromised."},
{d:"Access Controls",q:"Why is it important to disable service accounts that are no longer in use?",o:["Orphaned service accounts can be exploited for unauthorized access","Service accounts are always shared accounts","Service accounts use too many system resources","Service accounts slow down authentication"],a:0,e:"Orphaned service accounts (belonging to decommissioned applications or departed employees) often have elevated privileges and are forgotten, making them attractive targets for attackers."},
{d:"Access Controls",q:"Which of the following BEST describes 'mandatory vacation' as a security control?",o:["A policy requiring employees to take vacation so others can detect fraudulent activities in their absence","A way to reduce workload on security staff","A HR benefit with no security purpose","A control that only applies to executives"],a:0,e:"Mandatory vacation forces employees away from their duties so peers can cover their work, potentially discovering fraud or errors. It is especially important for employees with access to financial systems."},
{d:"Network Security",q:"Which device operates at Layer 3 of the OSI model and routes traffic between networks?",o:["Router","Hub","Bridge","Switch"],a:0,e:"Routers operate at Layer 3 (Network layer) using IP addresses to forward packets between networks. Switches operate at Layer 2 (MAC addresses); hubs at Layer 1 (broadcast)."},
{d:"Network Security",q:"A DMZ (Demilitarized Zone) in network security is used to:",o:["Replace firewalls","Host public-facing servers while separating them from the internal network","Completely isolate internal networks","Encrypt all network traffic"],a:1,e:"A DMZ hosts externally accessible services (web servers, mail servers) in a semi-trusted zone. If a DMZ server is compromised, internal networks are still protected by the inner firewall."},
{d:"Network Security",q:"SSH is preferred over Telnet because:",o:["SSH encrypts all traffic; Telnet sends data in plaintext","SSH is faster","SSH requires no authentication","SSH uses a standard port"],a:0,e:"SSH (Secure Shell) encrypts all communications, including authentication credentials. Telnet transmits everything  --  including passwords  --  in plaintext, making it vulnerable to eavesdropping."},
{d:"Network Security",q:"What does a VPN primarily provide?",o:["Faster internet speeds","A secure encrypted tunnel over a public network","Physical network isolation","Protection against all malware"],a:1,e:"A VPN creates an encrypted tunnel over a public network, ensuring confidentiality and integrity of data in transit. It allows remote users to securely access private network resources."},
{d:"Network Security",q:"A Denial of Service (DoS) attack is designed to:",o:["Steal user credentials","Intercept network communications","Overwhelm a target system to make it unavailable to legitimate users","Exploit a software vulnerability"],a:2,e:"DoS attacks flood a target with traffic or requests to exhaust resources. DDoS (Distributed DoS) uses many sources to amplify the attack, making it harder to block."},
{d:"Network Security",q:"HTTPS uses which protocol to encrypt web communications?",o:["FTP","IPSec","SSH","TLS"],a:3,e:"HTTPS uses TLS (Transport Layer Security) to encrypt web traffic between browsers and servers. TLS replaced the older SSL protocol. It ensures confidentiality and integrity of web communications."},
{d:"Network Security",q:"An IDS (Intrusion Detection System) is BEST described as:",o:["A system that encrypts communications","A system that manages user access","A system that monitors traffic and alerts on suspicious activity but does not block","A system that blocks all attacks"],a:2,e:"An IDS monitors network traffic and generates alerts when suspicious activity is detected. Unlike an IPS (Intrusion Prevention System), an IDS does not actively block  --  it detects and reports."},
{d:"Network Security",q:"A stateful firewall differs from a stateless (packet filter) firewall because:",o:["It only inspects packet headers","It requires more network bandwidth","It operates at the application layer","It tracks the state of active connections to make context-aware filtering decisions"],a:3,e:"Stateful firewalls track TCP sessions and connection states, allowing or denying packets based on context. Stateless firewalls only inspect individual packets without connection context."},
{d:"Network Security",q:"What is the purpose of network segmentation?",o:["To eliminate the need for firewalls","To increase network speed","To reduce the number of IP addresses needed","To divide a network into smaller zones to limit the spread of attacks and control traffic flow"],a:3,e:"Network segmentation isolates network zones so a breach in one segment doesn't automatically spread to others. It also enables targeted access control and improves monitoring."},
{d:"Network Security",q:"Which protocol operates at the Transport layer of the OSI model and provides reliable, connection-oriented communication?",o:["IP","ICMP","TCP","UDP"],a:2,e:"TCP (Transmission Control Protocol) operates at Layer 4, providing reliable, ordered, error-checked delivery through connection establishment (three-way handshake) and acknowledgments."},
{d:"Network Security",q:"What is a 'honeypot' in network security?",o:["A network load balancer","A backup power supply","A type of encryption","A trap designed to attract and detect attackers by simulating a vulnerable system"],a:3,e:"A honeypot is a decoy system designed to attract attackers. It detects attacks, gathers intelligence on attacker techniques, and wastes attacker time  --  all while keeping real systems safe."},
{d:"Network Security",q:"Which of the following BEST describes a 'port scan'?",o:["A physical inspection of network cables","A type of DDoS attack","A method of encrypting network traffic","A reconnaissance technique used to identify open ports and services on a target system"],a:3,e:"Port scanning probes a target for open ports and services. Attackers use it for reconnaissance; defenders use it to audit their own exposure. Tools like Nmap are commonly used."},
{d:"Network Security",q:"Which layer of the OSI model do switches primarily operate at?",o:["Layer 1  --  Physical","Layer 3  --  Network","Layer 2  --  Data Link","Layer 4  --  Transport"],a:2,e:"Switches operate at Layer 2 (Data Link), forwarding frames based on MAC addresses within a local network. Layer 3 switches can also route between VLANs using IP addresses."},
{d:"Network Security",q:"Which of the following BEST describes a 'zero-day vulnerability'?",o:["A vulnerability with no known patch or fix that attackers may already be exploiting","A vulnerability that only affects old software","A vulnerability discovered more than a year ago","A vulnerability that is impossible to exploit"],a:0,e:"A zero-day vulnerability is one that is unknown to the vendor or has no patch. Attackers can exploit it before defenders know it exists, making it extremely dangerous."},
{d:"Network Security",q:"What is ARP spoofing?",o:["A method of encrypting ARP traffic","A technique to forge IP addresses in packet headers","An attack that sends fake ARP messages to associate an attacker's MAC address with a legitimate IP address","A DNS manipulation technique"],a:2,e:"ARP spoofing poisons ARP caches by sending fake ARP replies, mapping the attacker's MAC to a legitimate IP. This enables MitM attacks on local network traffic."},
{d:"Network Security",q:"Which of the following BEST describes a 'proxy server'?",o:["A server that acts as an intermediary between clients and servers, providing filtering and privacy","A server that only provides DNS resolution","A server dedicated to encryption","A server that stores backup data"],a:0,e:"A proxy server sits between clients and servers, forwarding requests. It can filter content, cache responses, enforce policies, and hide internal network details from external servers."},
{d:"Network Security",q:"VLAN (Virtual Local Area Network) technology is used to:",o:["Logically segment a physical network into separate broadcast domains","Encrypt network traffic between devices","Provide wireless network access","Create physical network segments requiring new hardware"],a:0,e:"VLANs logically segment a network without requiring physical separation. They can isolate traffic between departments or device types (e.g., IoT, guest WiFi) on the same physical infrastructure."},
{d:"Network Security",q:"Which of the following BEST describes DNS poisoning (cache poisoning)?",o:["Flooding a DNS server with traffic","Injecting false DNS records to redirect users to malicious sites","Encrypting DNS traffic","Blocking all DNS queries"],a:1,e:"DNS cache poisoning corrupts a DNS resolver's cache with fraudulent records, redirecting users from legitimate sites to attacker-controlled servers without their knowledge."},
{d:"Network Security",q:"What is the primary purpose of Network Access Control (NAC)?",o:["To ensure only compliant, authorized devices can connect to the network","To monitor application performance","To manage user passwords","To encrypt network traffic"],a:0,e:"NAC enforces security policies on devices attempting to connect to the network, checking compliance (patches, AV status, certificates) before granting access."},
{d:"Network Security",q:"Which protocol is used to securely transfer files?",o:["Telnet","SFTP (SSH File Transfer Protocol)","FTP","HTTP"],a:1,e:"SFTP (SSH File Transfer Protocol) transfers files over an encrypted SSH connection. Standard FTP transmits credentials and data in plaintext. FTPS adds TLS to FTP but SFTP is more commonly recommended."},
{d:"Network Security",q:"A penetration test differs from a vulnerability scan because:",o:["A penetration test actively attempts to exploit vulnerabilities; a scan only identifies them","A vulnerability scan requires more skill","Penetration tests are automated; scans are manual","They are the same thing"],a:0,e:"Vulnerability scans identify potential weaknesses. Penetration tests go further  --  authorized testers actively exploit vulnerabilities to determine the real-world impact of a successful attack."},
{d:"Network Security",q:"Which of the following is a characteristic of UDP?",o:["Connectionless and faster but with no delivery guarantee","Slower than TCP","Connection-oriented with guaranteed delivery","Encrypted by default"],a:0,e:"UDP (User Datagram Protocol) is connectionless and does not guarantee delivery, ordering, or error correction. It is used for speed-sensitive applications like video streaming, DNS, and VoIP."},
{d:"Network Security",q:"What does HTTPS port 443 signify?",o:["FTP file transfer","Email transmission","Plain HTTP traffic","Encrypted web traffic using TLS"],a:3,e:"Port 443 is the default port for HTTPS (HTTP Secure), which encrypts web traffic using TLS. Port 80 is standard HTTP (unencrypted). Knowing common ports is fundamental to network security."},
{d:"Network Security",q:"Which of the following BEST describes a 'SQL injection' attack?",o:["Encrypting database records","A physical attack on database servers","Inserting malicious SQL code into input fields to manipulate a database","A type of DoS attack"],a:2,e:"SQL injection inserts malicious SQL statements into input fields, potentially bypassing authentication, extracting data, or modifying the database. It is one of the most common web application attacks."},
{d:"Network Security",q:"What is a 'botnet'?",o:["A network of malware-infected computers controlled remotely by an attacker","A collection of legitimate servers providing cloud services","A network monitoring tool","A type of firewall architecture"],a:0,e:"A botnet is a network of compromised computers (bots/zombies) controlled by a command-and-control server. Botnets are used for DDoS attacks, spam campaigns, credential stuffing, and cryptomining."},
{d:"Network Security",q:"IPSec is used to:",o:["Control network routing","Manage domain name resolution","Provide authentication and encryption at the IP layer for VPNs and secure communications","Assign IP addresses to devices"],a:2,e:"IPSec (Internet Protocol Security) operates at Layer 3 and provides authentication (AH) and encryption (ESP) for IP packets. It is commonly used to build VPN tunnels."},
{d:"Network Security",q:"What is 'network sniffing'?",o:["Capturing and analyzing network traffic packets","Mapping network topology","Scanning for open ports","Blocking specific network protocols"],a:0,e:"Network sniffing (packet capture/analysis) captures network traffic for analysis. Defenders use it for troubleshooting and security monitoring; attackers use it to steal credentials and data on unencrypted networks."},
{d:"Network Security",q:"Which of the following BEST describes 'cross-site scripting' (XSS)?",o:["An encryption vulnerability","An attack injecting malicious scripts into web pages viewed by other users","A type of brute force attack","A network scanning technique"],a:1,e:"XSS injects malicious client-side scripts into web pages viewed by others. Attackers use it to steal session cookies, redirect users, or deface websites. Input validation and output encoding prevent XSS."},
{d:"Network Security",q:"Which wireless security protocol is considered MOST secure?",o:["WPA","WEP","WPA3","WPA2"],a:2,e:"WPA3 (released 2018) provides the strongest Wi-Fi security with improved encryption, forward secrecy, and protection against offline dictionary attacks. WEP is broken and should never be used."},
{d:"Network Security",q:"A 'next-generation firewall' (NGFW) differs from a traditional firewall because it:",o:["Operates exclusively at Layer 2","Only filters by IP address","Requires no configuration","Adds application awareness, deep packet inspection, and identity-based policies"],a:3,e:"NGFWs inspect traffic at the application layer, identifying applications regardless of port. They combine traditional stateful firewall capabilities with IDS/IPS, application control, and user identity awareness."},
{d:"Network Security",q:"What does the principle of 'network defense in depth' involve?",o:["Installing the most powerful single firewall available","Using only cloud-based security","Focusing all resources on perimeter security","Layering multiple security controls (firewalls, IDS, segmentation, encryption) so no single failure exposes the whole network"],a:3,e:"Network defense in depth mirrors the broader security concept: multiple overlapping controls at different layers (perimeter, network, host, application, data) so attackers face multiple independent barriers."}
