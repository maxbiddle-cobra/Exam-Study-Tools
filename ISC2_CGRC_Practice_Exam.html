{d:"Implementation of Security and Privacy Controls",q:"A security engineer implements audit logging (AU-2) and sends all logs to a SIEM. The same administrator who manages the systems being logged also manages the SIEM and has the ability to delete log entries. This violates which principle?",o:["Separation of network and application administration","SI-7 (Software, Firmware, and Information Integrity)","CM-5 (Access Restrictions for Change)  --  change management controls","AU-9 (Protection of Audit Information)  --  those who manage systems being audited must not have the ability to modify or delete audit records. The integrity of the audit trail requires that system administrators cannot tamper with evidence of their own actions"],a:3,e:"AU-9 specifically requires protecting audit information from modification and deletion  --  especially by the system administrators whose activities the logs record. If admins can delete logs, there is no reliable audit trail for insider threat detection. The SIEM should be managed by a separate security team with write-once storage, and admins should have no delete privileges on audit records."}
];
const MC_BANK9=[
{d:"Implementation of Security and Privacy Controls",q:"A federal system has been operating with all users sharing a single generic 'user' login account for ease of use. An auditor flags this as a critical finding. Which controls are most directly violated?",o:["PE-3  --  physical access controls","CP-9  --  system backup requirements","IA-2 (Identification and Authentication) which requires UNIQUE identification of each user, and AU-2/AU-3 (Audit Logging) which requires attributable records. Shared accounts eliminate accountability  --  you cannot determine which individual performed any specific action, making incident investigation impossible and violating the accountability principle fundamental to information security","SC-8 and SC-28  --  transmission and storage encryption"],a:2,e:"Shared accounts fundamentally undermine two security pillars: identification (you cannot know who is using the account) and accountability (you cannot attribute actions to individuals for investigation or non-repudiation). IA-2 requires unique identification. AU-2/AU-3 require that audit records be attributable to specific individuals. This is one of the most basic yet frequently violated security requirements."},
{d:"Implementation of Security and Privacy Controls",q:"An agency is implementing CM-6 (Configuration Settings) for its Windows workstations using DISA STIGs. A system owner objects that some STIG settings break a critical legacy application. The ISSO should:",o:["Document the specific STIG settings that conflict with the application, implement those settings where possible, request formal deviations from conflicting settings with documented risk justification, implement compensating controls for the security gaps created, and obtain AO approval of the deviation. This is the standard STIG deviation process","Remove the legacy application immediately","Apply all STIG settings and accept that the application will break","Apply no STIG settings until the application is updated"],a:0,e:"STIG deviations are a standard, accepted process. Not every setting can be applied in every environment. The correct procedure: identify conflicting settings, document them formally as deviations, quantify the security gap, implement compensating controls to the extent possible, and get AO approval. This is far better than either applying settings that break operations or applying no settings at all."},
{d:"Implementation of Security and Privacy Controls",q:"An organization's CP-9 (System Backup) control requires daily backups. During a ransomware incident, IT discovers that backups have been running but have been silently failing for 3 months  --  the backup jobs report success but no data was actually written. What is the MOST relevant contributing control failure?",o:["CP-4 (Contingency Plan Testing)  --  backup completeness and restorability must be tested periodically, not just monitored for 'job success' status. Testing should include actual restoration of test data to verify backup integrity. Monitoring job success indicators without validating actual recoverability is a common and catastrophic gap","IR-4  --  incident handling procedures","CP-9 only  --  backup frequency was correct","AU-2  --  audit logging of backup events"],a:0,e:"CP-4 requires testing the contingency plan  --  which includes actually restoring from backup to verify data integrity and recoverability. Many organizations test whether backups run (job success) but never test whether backups actually restore. Silent backup failures are not unusual; the only way to detect them is test restorations. NIST strongly recommends periodic restoration tests, not just monitoring backup job status."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"An assessor interviews the system administrator about patch management procedures. The admin states that 'we always patch within 30 days as required.' The assessor then pulls vulnerability scan data and finds 47 Critical and High CVEs older than 60 days on production servers. The assessor should:",o:["Dismiss the scan results since the admin confirmed compliance","Document the discrepancy as an 'Other Than Satisfied' finding. The interview (what the admin says) conflicts with test results (what the vulnerability scanner shows). Per SP 800-53A, assessors use all three methods  --  interview results must be corroborated by examination and test evidence. Conflicting evidence favors objective test data over self-reported compliance","Average the interview and scan results and rate as 'Partially Satisfied'","Accept the administrator's verbal statement and note it as satisfied"],a:1,e:"SP 800-53A's three methods (examine, interview, test) must be used together and corroborated. When interview results conflict with test evidence, objective evidence (scanner data) takes precedence over self-reporting. The assessor's role is to independently verify  --  not accept attestation. This discrepancy is itself a significant finding: either the admin is unaware of the actual patch state (monitoring failure) or was not truthful."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"A FedRAMP 3PAO is conducting an annual assessment of a cloud service provider. The 3PAO lead assessor previously worked at the CSP as a security engineer for two years before joining the 3PAO. The JAB program reviewer should:",o:["Flag this as a conflict of interest requiring resolution. FedRAMP requires 3PAO assessors to be independent with no prior relationships that could compromise objectivity. An assessor who helped design or implement the controls they are now assessing cannot provide an objective evaluation. The assessment team should be reconstituted with assessors who have no prior relationship with the CSP","Allow it since 2 years have passed","Only flag it if the assessor worked on the specific controls being assessed","Allow the assessment to proceed since the assessor changed employers"],a:0,e:"Independence is fundamental to the credibility of security assessments. An assessor who previously implemented controls they are now assessing has an inherent conflict  --  they may unconsciously rationalize their own prior work or have blind spots. FedRAMP's 3PAO accreditation requirements and SP 800-37's assessor independence requirements both address this. The assessment's findings would be suspect regardless of the assessor's intentions."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"An agency is conducting a security control assessment and the assessor proposes to simply reuse the system owner's self-attestation for all 'operational' controls (training completion records, incident response exercises, physical access logs). Why is this problematic?",o:["Only privileged users' attestations are suspect","It is acceptable for operational controls since technical controls require more scrutiny","Self-attestation by the system owner for their own system's controls is not independent assessment. SP 800-37 requires independent assessors to independently verify control implementation  --  not rubber-stamp the system owner's claims. Operational controls are often where the most significant gaps exist, and independent verification through document review, interviews with multiple parties, and observation is essential","Operational controls are exempt from assessment requirements"],a:2,e:"The system owner has inherent incentive to present their system favorably. Independent assessment means the assessor independently gathers and evaluates evidence  --  not validates the owner's self-assessment. For operational controls, evidence should include: actual records (training completion logs, not just a summary), interviews with multiple personnel (not just the ISSO), and direct observation where feasible."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"During an assessment, a tester attempts a SQL injection attack on a web application and successfully extracts a list of usernames and hashed passwords from the user database. This finding should be reported as:",o:["A Medium finding requiring patching within 30 days","A finding only if the hashes are crackable","A Critical or High finding affecting SI-10 (Information Input Validation), SC-28 (Protection of Information at Rest  --  user credentials), AU-9 (if the attack wasn't detected), and IA-5 (Authenticator Management). SQL injection enabling database extraction is one of the most serious application vulnerabilities regardless of password hashing","A Low finding since passwords are hashed"],a:2,e:"SQL injection enabling data extraction is Critical regardless of hashing. The immediate impact: username enumeration, hashed passwords susceptible to offline cracking, potential for further exploitation (stored procedures, admin access). Multiple controls are implicated: input validation (SI-10), data protection (SC-28), monitoring failures (AU-6 if attack wasn't detected in logs), and identity controls (IA-5). Hashing reduces but does not eliminate the severity."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"An assessor is reviewing AU-2 (Event Logging) and finds that the system logs authentication events, but does not log failed API calls to a sensitive financial data endpoint. The system owner argues that 'we log logins, which satisfies AU-2.' The assessor should:",o:["Document this as Other Than Satisfied  --  AU-2 requires organizations to identify events that need logging based on security objectives for the specific system. For a financial system, failed API calls to sensitive endpoints are security-relevant events that must be captured for threat detection and incident investigation. AU-2 compliance requires system-specific analysis of what constitutes auditable events, not just generic login logging","Accept it if the API calls generate database audit logs instead","Accept the system owner's interpretation since login logging satisfies the intent","Upgrade the finding to Critical since financial data is involved"],a:0,e:"AU-2 requires the organization to determine which events are security-relevant FOR THEIR SPECIFIC SYSTEM and ensure those events are logged. A financial system with sensitive API endpoints must log failed/suspicious API calls  --  these are primary indicators of data exfiltration attempts, credential stuffing, and API abuse. Generic login logging satisfies a minimum, not the full intent of AU-2 in a sensitive financial context."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"A security assessment reveals that a system's Security Assessment Report (SAR) from 18 months ago identified 12 High findings. The current POA&M shows only 4 have been remediated; the other 8 are listed as 'In Progress' with no milestone dates. The Authorizing Official reviewing this for reauthorization should:",o:["Treat the incomplete POA&M as a significant risk indicator. Eight unmitigated High findings with no milestone dates after 18 months suggests the risk management process has broken down. The AO should require specific, funded milestones for each open item before granting reauthorization, impose shorter conditional authorization periods with interim reviews, and consider whether compensating controls exist for the open findings","Only deny authorization if any findings are Critical","Grant a full 3-year ATO since most findings were remediated","Accept the 8 in-progress items since work has started"],a:0,e:"A POA&M with no milestone dates is not a functioning POA&M  --  it's a list of acknowledged failures without accountability. The AO's role includes ensuring that authorized systems maintain an active remediation program. Eight High findings with no progress timeline after 18 months is a governance failure, not just a technical one. The AO should impose conditions and shorter authorization periods with mandatory milestone reviews."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"An organization is conducting its first comprehensive security control assessment after operating under an outdated authorization for 5 years. The ISSO expects the assessment to be straightforward since 'nothing major has changed.' The assessor should be MOST concerned about:",o:["Only the technical controls since administrative controls rarely change","Control drift  --  over 5 years, systems change incrementally through patches, configuration changes, staff turnover, new interconnections, and technology refreshes. The SSP likely no longer accurately describes the actual system. Controls that were working in year 1 may have degraded, and new gaps may have emerged. The assessor should treat this essentially as an initial authorization assessment","The timeliness of the deliverables","The cost of the assessment"],a:1,e:"Five years without active assessment is a significant risk. Technology, threats, personnel, and configurations all change. SSP documentation becomes stale. Controls that once functioned may have degraded through staff turnover (no one trained on procedures), system changes (new interconnections never assessed), or simple neglect (patch cycles slipping). Treating a 5-year-old authorization as 'basically current' is a dangerous assumption the assessor should explicitly test."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"During assessment preparation, a system owner asks whether they can pre-stage evidence  --  preparing labeled folders for each control with supporting documentation before the assessor arrives. The assessor's response should be:",o:["Evidence preparation by the system owner invalidates the assessment","Only pre-staging technical evidence is acceptable; administrative evidence must not be pre-staged","This is not allowed  --  assessors must find evidence independently","Pre-staging organized evidence is acceptable and encouraged  --  it makes the assessment more efficient. However, the assessor must independently verify evidence authenticity (e.g., checking that configuration screenshots match live systems, that training records are genuine, that policy documents are currently in effect). Organized evidence reduces time but does not reduce the assessor's independent verification obligation"],a:3,e:"Well-organized evidence packages are a hallmark of mature security programs and are explicitly encouraged by NIST. Assessors should work efficiently with provided evidence while independently verifying its accuracy  --  spot-checking that screenshots match live systems, confirming training records against HR systems, and cross-referencing documentation against actual configurations. Organized evidence saves time without compromising independence."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"An assessor tests CM-6 (Configuration Settings) by comparing a server's actual configuration against the organization's approved hardening standard. The server passes all checks. However, the assessor notices the approved standard is 3 years old and was written for the previous OS version. This situation should be reported as:",o:["Satisfied with a recommendation to update documentation","Other Than Satisfied  --  the control requires systems to be configured using current security configuration guidance (DISA STIGs, CIS Benchmarks, vendor guides). An outdated standard written for a previous OS version may not address current vulnerabilities and configuration options. The finding is that the approved standard itself is inadequate, not just whether the system matches it","Satisfied  --  the system matches its approved standard","Only an issue if DISA has published a new STIG for the current OS"],a:1,e:"CM-6 compliance requires that the configuration standard itself be current and adequate  --  not just that the system matches whatever standard exists. An outdated standard for a previous OS version will miss new security configuration requirements introduced for the current version. The assessor's job is to evaluate whether the control is providing effective security, not just whether paperwork is internally consistent."},
{d:"Assessment and Audit of Security and Privacy Controls",q:"A privacy control assessment is being conducted alongside the security control assessment for a system processing employee health information under HIPAA. The privacy assessor should evaluate which controls FIRST?",o:["PT-1 (Policy and Procedures) only since it governs all other privacy controls","Only technical privacy controls like encryption and access logging","AP-1 and AP-2 (Authority and Purpose)  --  determining whether the organization has legal authority to collect the health information and has limited collection to what is necessary for the stated purpose. These foundational privacy controls must be satisfied before evaluating implementation controls; if there is no authority for collection or collection exceeds the stated purpose, no amount of technical privacy controls remedies the fundamental violation","Data retention controls since HIPAA has specific retention requirements"],a:2,e:"Privacy assessments must begin with authority and purpose (AP family). The most foundational privacy question is: is there legal authority to collect this information and is collection limited to what is necessary? If the answer is no, technical controls are irrelevant to the privacy violation. This 'data minimization' principle  --  collecting only what is needed for a stated, authorized purpose  --  is foundational to GDPR, HIPAA, and the Privacy Act."},
{d:"Authorization and Approval of Information System",q:"An AO receives an authorization package for a system with a CVSS 9.8 vulnerability documented in the SAR as 'Other Than Satisfied.' The system owner has submitted an SSP noting that the patch is scheduled for 30 days post-authorization. The AO is being asked to grant a full ATO. The MOST appropriate decision is:",o:["Grant the ATO and forget the vulnerability since authorization already occurred","Grant a full ATO  --  the 30-day patch plan is documented","Grant a conditional ATO with the explicit condition that the CVSS 9.8 vulnerability be remediated within 15 days (not 30), with a mechanism for the AO to be notified immediately upon completion and to reassess if the deadline is missed. A Critical vulnerability should have a shorter remediation window than standard POA&M timelines","Deny the ATO and require remediation before any authorization"],a:2,e:"A conditional ATO is the appropriate mechanism when there are known high-risk findings that can be remediated quickly. The AO should grant operation (assuming mission need outweighs risk) but impose tighter conditions than the standard POA&M timeline for a CVSS 9.8  --  this is one of the most severe possible vulnerability scores and should not sit unpatched for 30 days post-authorization. The AO should also implement compensating control requirements in the meantime."}
];
const MC_BANK10=[
{d:"Authorization and Approval of Information System",q:"An AO learns that a system under their authorization was involved in a significant data breach affecting 100,000 individuals. The breach occurred through a vulnerability that was documented in the SAR as 'Other Than Satisfied' and listed in the POA&M with a 90-day remediation timeline. The breach occurred on day 45. From an authorization perspective, the AO should:",o:["Report the breach to law enforcement only","Revoke the ATO immediately and never reauthorize the system","Immediately review whether the POA&M timeline and compensating controls were adequate given the known risk. The breach during the remediation window may indicate that the AO's original risk acceptance was incorrect (insufficient compensating controls were required) or that the system should have been removed from operation pending remediation. The AO must decide whether to revoke the ATO pending full remediation and investigation","Take no action since the breach occurred within the authorized POA&M remediation window"],a:2,e:"A breach during an open POA&M window for the exploited vulnerability raises serious questions about whether the authorization should have been conditional on stronger compensating controls or a shorter remediation window. The AO must reassess: was the original risk acceptance appropriate? The answer may be yes (risk was accepted with reasonable compensating controls and an attacker acted faster than expected) or no (the risk was underestimated). Either way, the AO must make a new authorization decision with full situational awareness."},
{d:"Authorization and Approval of Information System",q:"A contracting officer asks whether FedRAMP authorization of a cloud service means the agency doesn't need to do anything further before using the service. The correct response is:",o:["Correct  --  FedRAMP authorization means the agency can immediately use the service","Correct if the agency is the same as the sponsoring agency in the FedRAMP package","Incorrect  --  FedRAMP authorization means the CSP has been assessed at the federal level, but each agency must still issue its own ATO based on the FedRAMP package. The agency must review the FedRAMP authorization package, implement all customer-responsibility controls, assess any agency-specific configurations, and have their AO sign an agency ATO before using the service for sensitive data","Correct only for Low-impact data"],a:2,e:"FedRAMP authorization enables reciprocity  --  the CSP's controls don't need to be reassessed  --  but each agency still needs an agency ATO. The agency must review the FedRAMP package, implement customer-managed controls (access management, data classification, user training), assess their specific implementation, and have their AO formally accept risk and sign an agency ATO. FedRAMP dramatically reduces the burden but does not eliminate the agency authorization step."},
{d:"Authorization and Approval of Information System",q:"An AO is reviewing an authorization package for a system scheduled to go live next week. The SAR shows 3 High findings and 15 Medium findings. All 3 High findings have compensating controls in place. The program office is under significant pressure to meet the go-live date. The AO should:",o:["Delegate the decision to the program manager since it is their deadline","Grant a full ATO since go-live is scheduled and the findings have compensating controls","Make an independent risk determination based on the evidence  --  not the schedule pressure. If the compensating controls adequately reduce the High finding risks, a conditional ATO with POA&M milestones may be appropriate. If compensating controls are inadequate, the AO should require remediation regardless of schedule pressure. Schedule pressure is never a valid factor in an AO's authorization decision","Deny all ATOs with more than 2 High findings as a standing policy"],a:2,e:"The AO's role requires independence from schedule and political pressure. The AO is the official who accepts risk on behalf of the organization  --  that decision must be based solely on risk evidence, not operational convenience. An AO who grants ATOs under schedule pressure without adequate risk basis is abdicating their responsibility and may face personal accountability if the system is later breached due to the known findings."},
{d:"Authorization and Approval of Information System",q:"A system has been operating under an ongoing authorization for 2 years with continuous monitoring in place. The monitoring program reports that patching compliance has dropped from 98% to 61% over the past 4 months, and 3 Critical CVEs have been unpatched for more than 45 days. The AO receives this in the monthly security status report. The correct AO action is:",o:["Accept the report and file it since no breach has occurred","Lower the monitoring frequency to avoid generating concerning reports","Note the trend for the annual reauthorization review","Treat this as a potential authorization trigger event requiring immediate response. Declining patch compliance and Critical unpatched CVEs represent materially increased risk that may exceed the AO's original risk acceptance. The AO should require immediate escalation, a root cause explanation, an emergency patching plan, and potentially impose a conditional authorization status until compliance is restored"],a:3,e:"Ongoing authorization requires the AO to actively respond to monitoring data  --  not just receive it. A 37-point drop in patch compliance over 4 months with multiple unpatched Critical CVEs is exactly the type of risk drift that ongoing authorization is designed to catch. The AO must actively engage: require explanation, impose timeline requirements, potentially restrict system capabilities until compliance is restored. Passive receipt of bad reports without action defeats the purpose of ongoing authorization."},
{d:"Authorization and Approval of Information System",q:"During the authorization process, the ISSO realizes the current SSP does not document 15 cloud services the system uses to process data. These were added over the past year without going through change management. The AO has received the authorization package. The ISSO should:",o:["Tell the AO verbally but not update the SSP","Add the cloud services to the SSP after authorization is granted","Complete the authorization with the current package and document the cloud services at next review","Immediately notify the AO of the omission before the authorization decision is made. An authorization decision made on an incomplete package  --  one that doesn't reflect 15 external data-processing services  --  would be made on false premises. The AO cannot accept risk they don't know exists. The SSP must be updated, the cloud services must be reviewed (FedRAMP status, ISAs), and the authorization decision should be deferred until the package is complete"],a:3,e:"The AO's risk decision is only valid for the system as documented. An authorization package that omits 15 cloud services processing the system's data is materially incomplete. The AO cannot accept risk for data flows they don't know exist. The ISSO has an obligation to ensure the AO has complete, accurate information  --  proceeding with a known-incomplete package would be a significant authorization process failure."},
{d:"Authorization and Approval of Information System",q:"A new Authorizing Official takes over from a predecessor. The previous AO granted ATOs that the new AO believes were made with inadequate evidence. The new AO wants to immediately revoke all ATOs and restart the authorization process. A senior security advisor should counsel that:",o:["Only the Inspector General can revoke existing ATOs","The new AO has no authority to revoke authorizations granted by their predecessor","Immediate revocation is the only appropriate response to concerns about prior authorizations","Mass immediate revocation would cause operational disruption disproportionate to the risk. The correct approach is to review the monitoring data for each system, prioritize systems with highest risk or weakest evidence bases, require updated authorization packages for those systems within a defined timeline, and revoke only specific authorizations where current risk evidence indicates unacceptable risk. Governance transitions should be managed, not chaotic"],a:3,e:"AOs have full authority over their authorization decisions, including revoking predecessors' ATOs. However, mass immediate revocation without risk prioritization would create unnecessary operational disruption. The risk-based approach: use continuous monitoring data to identify systems with highest risk or poorest evidence, prioritize those for immediate attention, and create a structured timeline for updating authorization packages for all systems."},
{d:"Authorization and Approval of Information System",q:"An agency operates a system under an ATO granted 2 years ago. Since then, the system has added 3 new external interconnections, migrated to a new cloud hosting environment, and added a new major application module processing sensitive PII. No reauthorization or change management review has occurred. From an authorization standpoint:",o:["Only the cloud migration requires reauthorization","Only the PII change requires reauthorization","The 3-year ATO remains valid since it hasn't expired","These changes likely constitute 'significant changes' under SP 800-37 that individually or collectively invalidate the original authorization basis. The system is effectively operating without a valid authorization since the AO's risk decision was made for a materially different system. The ISSO should immediately initiate change management review and an updated authorization package"],a:3,e:"SP 800-37 requires that significant changes to system architecture, operating environment, interconnections, or data handling trigger reassessment. Three such changes without review effectively means the AO has no awareness of the current system's risk posture  --  the authorization is based on a system that no longer exists as described. This is a serious governance failure requiring immediate attention."},
{d:"Authorization and Approval of Information System",q:"An organization's AO is a senior IT manager with deep technical knowledge. Legal counsel questions whether the AO has the appropriate organizational authority to formally accept mission risk on behalf of the organization for a system handling classified information. This concern is:",o:["Valid  --  the AO must have sufficient organizational authority and accountability, not just technical knowledge. For systems with significant risk implications, the AO should be a senior official with the organizational standing to bear accountability for the risk decision. Technical knowledge is a plus but not a substitute for organizational authority and accountability","Unfounded  --  technical knowledge is the primary AO qualification","Only relevant for classified systems under IC directives","Irrelevant since any manager can serve as AO"],a:0,e:"The AO's qualifications under SP 800-37 emphasize organizational authority and accountability, not primarily technical expertise. The AO must have sufficient organizational standing to (a) be accountable if the risk decision is wrong and (b) direct resources to address security issues. A technically capable but organizationally junior AO may make good decisions but lacks the authority and accountability the role requires."},
{d:"Authorization and Approval of Information System",q:"An authorization package review reveals the POA&M shows 8 findings from the SAR  --  all marked as 'Accepted Risk' with no remediation planned. The rationale for each is simply 'risk accepted per ISSO determination.' The AO should:",o:["Require the ISSO to get supervisor sign-off instead of AO review","Reject this approach  --  risk acceptance must be an AO-level decision, not an ISSO determination. The ISSO identifies risk and makes recommendations; only the AO has the organizational authority to formally accept risk on behalf of the organization. All 8 'accepted' items must be formally reviewed by the AO with documented rationale, and the AO must personally decide whether each finding's risk is within organizational tolerance","Accept findings where the ISSO justification exceeds 100 words","Accept the ISSO's risk determinations since they are the system security expert"],a:1,e:"Risk acceptance is explicitly an AO-level authority under SP 800-37. The ISSO can recommend acceptance and provide technical analysis, but the formal decision belongs to the AO. POA&M entries showing ISSO-level risk acceptance without AO concurrence represent a fundamental authorization process failure  --  the AO may not even be aware of the findings being accepted on their behalf."},
{d:"Authorization and Approval of Information System",q:"A system owner argues that since their system is 'internal only' with no internet connectivity, the ATO process is unnecessary overhead. The ISSO should explain that:",o:["The system owner is correct  --  internal-only systems are exempt from ATO requirements","Internal systems require only a lightweight authorization process","FISMA, OMB A-130, and the RMF apply to ALL federal information systems regardless of connectivity. Internal systems can still be compromised through insider threats, supply chain attacks, lateral movement from breached systems, and removable media. Many of the most damaging breaches in history originated from or affected internal-only systems. Authorization is required based on data sensitivity and mission criticality, not internet exposure","The ATO is only required for systems processing classified information"],a:2,e:"FISMA and the RMF apply universally to federal information systems. The ATO requirement exists because all systems carrying sensitive data or supporting critical missions need documented risk management  --  regardless of connectivity. Insider threats, USB-based malware, lateral movement from internet-connected systems, and physical access attacks all affect internal systems. 'Air-gapped' or internal-only status reduces but does not eliminate risk."},
{d:"Authorization and Approval of Information System",q:"Two federal agencies both use the same commercial SaaS product with a FedRAMP Moderate authorization. Agency A has already issued an agency ATO. Agency B wants to use the same product and asks whether they can simply reference Agency A's ATO. The correct answer is:",o:["No  --  Agency B must conduct a completely independent assessment","No  --  each agency must issue its own ATO, but Agency B can significantly leverage Agency A's work. Agency B can reference the FedRAMP package (not Agency A's ATO), review Agency B's specific customer-responsibility controls, assess Agency B's configuration and use case, and issue their own ATO without repeating the CSP infrastructure assessment. The FedRAMP package is shared; agency ATOs are not","Yes if both agencies are in the same department","Yes  --  Agency A's ATO can be shared directly"],a:1,e:"FedRAMP reciprocity works at the CSP level  --  the CSP's FedRAMP package is what agencies share, not each other's ATOs. Each agency issues its own ATO based on: the shared FedRAMP package (CSP controls) + their own implementation of customer-responsibility controls + their agency-specific configuration review. Agency B cannot simply adopt Agency A's ATO since Agency A's specific implementation, data types, and user population may differ."},
{d:"Continuous Monitoring",q:"An organization's continuous monitoring program generates weekly vulnerability scan reports showing the same 25 High findings for 6 consecutive weeks with no remediation progress. The security analyst files the reports. What is wrong with this monitoring program?",o:["Only unpatched Critical findings require escalation","The scan frequency should be reduced to monthly to avoid alert fatigue","Nothing  --  weekly reporting is an adequate monitoring frequency","The monitoring program has data collection without action  --  reports are generated but no escalation or remediation process is triggered. Effective ISCM per SP 800-137 requires not just collecting and reporting data but responding to findings. Unaddressed repeat findings indicate a broken feedback loop between monitoring and remediation. The AO should be receiving these reports and triggering POA&M updates and remediation accountability"],a:3,e:"SP 800-137 defines ISCM as including analysis, response, AND reporting  --  not just data collection. Monitoring that generates reports with no response mechanism defeats the purpose. The correct program has defined escalation paths: unresolved findings beyond defined thresholds trigger escalation to the ISSO, AO notification, and formal POA&M entries with accountability. Monitoring without action is theater, not security."},
{d:"Continuous Monitoring",q:"A system undergoes a major architecture change  --  moving from on-premises to a cloud-hybrid model  --  while still under an active ongoing authorization. The ISSO asks whether the continuous monitoring program needs to change. The correct answer is:",o:["Only if the system's categorization changes","Only if FedRAMP requirements differ from current monitoring","Yes  --  the monitoring strategy must be updated to reflect the new environment. Cloud environments require different monitoring tools (cloud-native security tools, CSPM platforms), different metrics (cloud configuration compliance, API activity monitoring), and new data collection methods. The AO should be notified of the architecture change, the SSP updated, and the monitoring plan revised before the migration completes","No  --  the monitoring program covers the system regardless of architecture"],a:2,e:"Continuous monitoring strategies are tied to the specific operating environment. A cloud migration changes the threat landscape, the available monitoring tools, the relevant metrics (e.g., cloud storage bucket permissions, IAM role assignments), and the required monitoring frequency for cloud-specific risks. The ISCM strategy must be updated as part of the migration planning  --  not retrofitted after problems arise."},
{d:"Continuous Monitoring",q:"CISA releases a new Known Exploited Vulnerability (KEV) advisory for a CVE in software used by a federal agency. The agency's continuous monitoring team must patch within CISA's required timeframe under BOD 22-01. To respond effectively, the team needs to first know which systems are affected. What program capability enables this rapid identification?",o:["An accurate, current asset inventory with software component tracking (ideally including Software Bills of Materials  --  SBOMs) that allows querying which systems run the affected software version. Without this capability, the agency must manually audit hundreds of systems under time pressure. CM-8 (System Component Inventory) combined with vulnerability management tooling enables immediate identification of affected systems","Incident response procedures","The annual FISMA report","The system categorization documentation"],a:0,e:"Asset inventory with software component tracking is the enabler of rapid vulnerability response. When a KEV advisory drops, the first question is 'which of our systems are affected?' Without automated inventory and software tracking, that question takes days to answer manually. CM-8 (Component Inventory) and RA-5 (Vulnerability Scanning) combined with SBOM capability enable answering it in minutes. This is why CISA and Executive Order 14028 both emphasize SBOM adoption."}
];
const MC_BANK11=[
{d:"Continuous Monitoring",q:"A system's ongoing authorization has been in place for 18 months. The AO has been receiving monthly security status reports but has not reviewed a single one, delegating the review to a junior analyst who files them without escalation. During this period, the system's patch compliance dropped from 95% to 72% and 4 High vulnerabilities have been open for more than 90 days. From an authorization perspective:",o:["Only Critical vulnerabilities require AO attention","The ongoing authorization is valid since reports were generated","The AO has effectively abandoned their ongoing authorization responsibilities. The AO must maintain awareness of system risk posture to make ongoing authorization decisions  --  delegation of report review to a junior analyst without escalation criteria or AO review of trends means the AO has no actual situational awareness. If the system is breached through one of the open vulnerabilities, the AO cannot claim they were unaware  --  passive receipt of reports does not satisfy ongoing authorization","The AO has properly delegated ongoing monitoring duties"],a:2,e:"Ongoing authorization requires active AO engagement with monitoring data, not passive accumulation of filed reports. The AO must have processes ensuring that significant risk trends (declining patch compliance, aging high vulnerabilities) are escalated to their attention and trigger action. An AO who cannot describe the current risk posture of their authorized system is not fulfilling their ongoing authorization responsibilities."},
{d:"Continuous Monitoring",q:"A cybersecurity team is designing an ISCM program and asks how frequently different controls should be assessed. Which framework provides specific guidance on monitoring frequencies for different control types?",o:["FIPS 199 provides monitoring frequencies","SP 800-53 Rev 5 specifies daily monitoring for all controls","NIST SP 800-137 provides the framework for determining monitoring frequencies. Frequencies should be based on: control volatility (how often the control can change), threat likelihood, vulnerability exposure, and system criticality. Some controls (patch status, log review) should be assessed continuously or weekly; others (physical security, policy reviews) may be assessed quarterly or annually. One-size-fits-all frequency (e.g., 'all controls assessed annually') is explicitly rejected by SP 800-137","FISMA requires monthly monitoring for all federal systems"],a:2,e:"SP 800-137 provides the risk-based framework for ISCM frequencies. The key principle: monitoring frequency should match control volatility and risk. A configuration setting that is rarely changed doesn't need daily scanning; patch status that changes with every Patch Tuesday needs near-real-time monitoring. Applying the same frequency to all controls wastes resources on stable controls while under-monitoring dynamic ones."},
{d:"Continuous Monitoring",q:"An organization receives a threat intelligence report indicating that an APT group is actively targeting federal agencies using a specific TTPs pattern involving PowerShell-based persistence mechanisms. The continuous monitoring team should:",o:["Only act if the APT group has previously targeted this specific agency","Wait for CISA to issue a formal directive before taking action","File the report for the annual risk assessment","Immediately correlate the threat intelligence against existing monitoring data to determine if any indicators of compromise (IoCs) from the APT campaign are present, adjust detection rules in the SIEM to detect the specific TTPs, increase monitoring frequency for PowerShell execution and persistence mechanisms, and brief the AO on the elevated threat. This is proactive threat-informed monitoring per SP 800-137"],a:3,e:"SP 800-137 and threat-informed defense principles require using threat intelligence to actively adjust monitoring. When a specific threat actor and TTPs are identified, monitoring programs should: hunt for existing IoCs, tune detection rules for the specific TTPs, increase monitoring in affected areas, and brief leadership. Waiting passively for a formal directive while an active threat is known is a program failure."},
{d:"Continuous Monitoring",q:"An organization is transitioning from a traditional 3-year authorization cycle to ongoing authorization. The program manager asks what the 'finish line' looks like for ongoing authorization. The correct answer is:",o:["The finish line is when all controls are automated","The finish line is when three consecutive months of monitoring show no High findings","There is no finish line  --  ongoing authorization is a continuous process that runs for the life of the system","Ongoing authorization is complete when the monitoring program is mature enough to provide the AO with real-time risk awareness, all major controls are assessed on appropriate frequency schedules, reporting mechanisms are automated, and escalation paths are defined. The 'finish line' is achieving a steady-state where the AO has continuous visibility into risk posture  --  but ongoing authorization itself never ends until the system is decommissioned"],a:2,e:"Ongoing authorization is a perpetual commitment, not a project with an end date. The program matures over time  --  improving automation, refining frequencies, improving metrics  --  but never 'completes.' The AO's ongoing risk awareness must be maintained for the entire system lifecycle. This is a philosophical shift from the point-in-time authorization model: security is a continuous program, not a periodic event."},
{d:"Continuous Monitoring",q:"During system decommissioning, an IT team plans to donate old servers to a local school. The servers previously held Moderate-impact agency data including employee PII. The ISSO objects. Why is this objection appropriate?",o:["IT equipment donation is exempt from sanitization requirements for government surplus","MP-6 (Media Sanitization) requires sanitization commensurate with data sensitivity before media leaves organizational control. For Moderate-impact data including PII, simple formatting is insufficient  --  NIST SP 800-88 requires either secure overwriting (DoD 5220.22-M standard or equivalent), degaussing, or physical destruction for magnetic media. Donating unsanitized or inadequately sanitized drives with employee PII is a privacy breach waiting to happen","The ISSO is being overly cautious  --  formatting the drives is sufficient for donation","Only Hard drives classified above Moderate require secure sanitization"],a:1,e:"MP-6 and NIST SP 800-88 are clear: data sensitivity drives sanitization requirements. Formatting (which simply marks space as available without erasing data) is insufficient for Moderate systems with PII. Standard overwriting tools, NIST-approved degaussing, or physical destruction are required. Numerous government agencies have faced significant breach notification costs from improperly sanitized equipment donations  --  this is a well-documented, preventable risk."},
{d:"Continuous Monitoring",q:"An agency's ISCM program currently provides the AO with a quarterly security status report. A new regulation requires real-time security dashboards for all AOs. What is the PRIMARY technical enabler for this shift?",o:["Increasing the number of assessment findings per report","Security automation and orchestration tools  --  automated vulnerability scanners, configuration compliance tools, SIEM with real-time dashboards, and GRC platforms that aggregate metrics automatically. Manual report preparation cannot achieve real-time frequency; automation is the only scalable path to continuous AO awareness. This aligns with SP 800-137's emphasis on automated collection and analysis","Reducing the number of monitored controls to enable faster reporting","Hiring more security analysts to prepare more frequent reports"],a:1,e:"The shift from periodic to real-time monitoring requires automation at every layer: automated scanning tools (vulnerability management, configuration compliance), automated data aggregation (SIEM, CSPM), and dashboard platforms (GRC tools, security dashboards) that transform raw data into AO-consumable risk metrics. Manual processes cannot scale to real-time reporting for systems with hundreds of assets and thousands of controls."},
{d:"Continuous Monitoring",q:"A continuous monitoring program identifies that a user account belonging to an employee on extended medical leave has been used to access sensitive financial records at 2:00 AM on three consecutive nights. What is the MOST appropriate immediate response?",o:["Increase logging frequency on the account and continue monitoring","Log the activity for the quarterly security review","Contact the employee to ask if they are working remotely","Treat this as a potential security incident  --  immediately disable the account, preserve logs for forensic investigation, notify the ISSO and incident response team, and begin investigating whether the employee's credentials were stolen or if there is another explanation. The combination of anomalous timing (2 AM), impossible activity (employee on medical leave), and sensitive data access constitutes strong indicators of compromise requiring immediate IR-4 response"],a:3,e:"This scenario describes textbook IoCs: impossible user (employee known to be on medical leave), anomalous timing (2 AM), sensitive target (financial records). AU-6 (Audit Review) and IR-4 (Incident Handling) require treating these indicators as potential incidents and responding immediately  --  not collecting more data passively. The account must be disabled to stop potential ongoing access while the investigation determines whether credentials were compromised."},
{d:"Continuous Monitoring",q:"An organization's ISCM program monitors 95% of controls but has excluded physical security controls (PE family) from monitoring because 'physical security is managed by facilities, not IT.' Why is this an ISCM gap?",o:["Physical security controls are not part of the ISCM program and the exclusion is appropriate","PE controls are part of the authorization boundary and must be included in the ISCM program regardless of which team manages them. Physical security failures (unauthorized data center access, theft of media, tailgating) can directly impact confidentiality, integrity, and availability of information systems. The AO's risk awareness must include physical security posture. Coordination between IT security and facilities management is required for comprehensive ISCM","Physical security monitoring is only required for High-impact systems","Physical security should only be monitored by the Inspector General"],a:1,e:"ISCM must cover all controls within the authorization boundary  --  including PE controls. The AO's risk decision encompasses physical security risks: an unauthorized individual accessing a server room has the same effect whether the attacker is digital or physical. Excluding PE from ISCM creates a blind spot in the AO's risk awareness. Organizational silos (IT vs. Facilities) do not determine what is in or out of scope for ISCM."},
{d:"Continuous Monitoring",q:"A system's continuous monitoring program has not been updated to reflect a major system architecture change from 6 months ago. The monitoring program is still checking controls relevant to the old architecture but missing several controls critical to the new cloud environment. This situation MOST directly affects:",o:["Only the annual FISMA metrics","The system's security categorization","The POA&M closure dates only","The validity of the ongoing authorization  --  the AO's risk awareness is based on monitoring data, but the monitoring program is measuring the wrong things. The AO believes they have visibility into current risk when they actually have visibility into a system that no longer exists as described. This is a fundamental continuous monitoring program failure requiring immediate update of the ISCM strategy to reflect the current architecture"],a:3,e:"When the ISCM program doesn't match the actual system, the AO is flying blind. They receive reports showing compliance for controls that aren't relevant while missing data on actual current risks. This is worse than having no monitoring  --  it creates false confidence. Architecture changes must trigger immediate ISCM program updates as part of the change management process (CM-3), not as a separate, deferred activity."}
];
