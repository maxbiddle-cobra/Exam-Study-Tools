<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISC2 CGRC Certification Practice Exam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');
:root{
  --bg:#0d1219;--sur:#161c2a;--sur2:#1c2438;
  --bdr:rgba(255,255,255,0.07);--bdr2:rgba(255,255,255,0.13);
  --tx:#e4e8f0;--mu:#6e7d9a;
  --ac:#5b8dee;--acd:rgba(91,141,238,0.12);
  --gn:#34c98a;--gnd:rgba(52,201,138,0.12);
  --rd:#f06b6b;--rdd:rgba(240,107,107,0.12);
  --am:#e8973a;--fn:'IBM Plex Sans',sans-serif;--mo:'IBM Plex Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--tx);font-family:var(--fn);min-height:100vh;line-height:1.6;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(91,141,238,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(91,141,238,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0;}
.wrap{max-width:820px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:1;}
.hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--bdr);}
.logo-tag{font-family:var(--mo);font-size:11px;color:var(--ac);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.logo-tag::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--ac);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.hdr h1{font-size:22px;font-weight:600;letter-spacing:-.02em;}
.hdr-sub{font-size:13px;color:var(--mu);margin-top:3px;}
.timer-block{text-align:right;flex-shrink:0;}
.timer{font-family:var(--mo);font-size:28px;font-weight:500;letter-spacing:.04em;line-height:1;}
.timer.warn{color:var(--am);}
.timer.dngr{color:var(--rd);animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:.4;}}
.timer-lbl{font-size:11px;color:var(--mu);margin-top:4px;font-family:var(--mo);}
.start-card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:2.5rem 2rem;animation:up .3s ease;}
.start-card h2{font-size:20px;font-weight:600;margin-bottom:6px;}
.start-card>p{font-size:14px;color:var(--mu);margin-bottom:2rem;line-height:1.6;}
.slbl{font-family:var(--mo);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:10px;}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;margin-bottom:1.75rem;}
.dcard{padding:12px 15px;border:1px solid var(--bdr);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--sur2);}
.dcard:hover{border-color:var(--ac);}
.dcard.sel{border-color:var(--ac);background:var(--acd);}
.dcard-n{font-size:12px;font-weight:500;color:var(--tx);line-height:1.4;}
.dcard-c{font-size:11px;color:var(--mu);margin-top:3px;font-family:var(--mo);}
.count-row{display:flex;gap:8px;margin-bottom:1.75rem;flex-wrap:wrap;}
.cbtn{padding:10px 24px;border-radius:8px;border:1px solid var(--bdr2);background:transparent;color:var(--mu);cursor:pointer;font-family:var(--mo);font-size:15px;font-weight:500;transition:all .15s;}
.cbtn:hover{border-color:var(--ac);color:var(--ac);}
.cbtn.sel{background:var(--acd);border-color:var(--ac);color:var(--ac);}
.cbtn:disabled{opacity:.35;cursor:not-allowed;}
.type-row,.mode-row{display:flex;gap:8px;margin-bottom:1.75rem;flex-wrap:wrap;}
.tbtn,.mbtn{padding:8px 18px;border-radius:8px;border:1px solid var(--bdr2);background:transparent;color:var(--mu);cursor:pointer;font-family:var(--fn);font-size:13px;transition:all .15s;}
.tbtn:hover,.mbtn:hover{border-color:var(--ac);color:var(--ac);}
.tbtn.sel,.mbtn.sel{background:var(--acd);border-color:var(--ac);color:var(--ac);}
.sbar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem;}
.stat{background:var(--sur);border:1px solid var(--bdr);border-radius:10px;padding:12px 14px;text-align:center;}
.stat-v{font-size:22px;font-weight:600;font-family:var(--mo);line-height:1;}
.stat-l{font-size:11px;color:var(--mu);margin-top:4px;text-transform:uppercase;letter-spacing:.06em;}
.prog-w{margin-bottom:1.25rem;}
.prog-t{height:3px;background:var(--sur2);border-radius:2px;overflow:hidden;}
.prog-f{height:3px;background:linear-gradient(90deg,var(--ac),#8ab4f8);border-radius:2px;transition:width .4s ease;}
.prog-m{display:flex;justify-content:space-between;font-size:12px;color:var(--mu);margin-top:6px;font-family:var(--mo);}
.dbar{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1.5rem;}
.dbtn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--bdr2);background:transparent;color:var(--mu);cursor:pointer;transition:all .15s;font-family:var(--fn);}
.dbtn:hover{border-color:var(--ac);color:var(--ac);}
.dbtn.active{background:var(--acd);border-color:var(--ac);color:var(--ac);}
.qcard{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:1.75rem;margin-bottom:1rem;animation:up .2s ease;}
@keyframes up{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.qmeta{display:flex;gap:8px;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap;}
.qnum{font-size:12px;color:var(--mu);font-family:var(--mo);}
.qbadge{font-size:11px;padding:3px 9px;border-radius:12px;background:var(--acd);color:var(--ac);border:1px solid rgba(91,141,238,.2);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.qtype-badge{font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid;}
.qtype-match{background:rgba(52,201,138,.1);color:var(--gn);border-color:rgba(52,201,138,.3);}
.qtype-order{background:rgba(232,151,58,.1);color:var(--am);border-color:rgba(232,151,58,.3);}
.qtype-hotspot{background:rgba(240,107,107,.1);color:var(--rd);border-color:rgba(240,107,107,.3);}
.qtxt{font-size:15px;color:var(--tx);line-height:1.65;margin-bottom:1.5rem;}
.opts{display:flex;flex-direction:column;gap:8px;}
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--bdr);border-radius:10px;cursor:pointer;transition:all .15s;background:var(--sur2);text-align:left;width:100%;font-family:var(--fn);}
.opt:hover:not(.locked){border-color:var(--ac);background:var(--acd);}
.opt.picked{border-color:var(--ac);background:var(--acd);}
.opt.correct{border-color:var(--gn);background:var(--gnd);}
.opt.wrong{border-color:var(--rd);background:var(--rdd);}
.opt-k{font-family:var(--mo);font-size:13px;font-weight:500;min-width:22px;color:var(--mu);line-height:1.5;flex-shrink:0;}
.opt.picked .opt-k{color:var(--ac);}
.opt.correct .opt-k{color:var(--gn);}
.opt.wrong .opt-k{color:var(--rd);}
.opt-t{font-size:14px;color:var(--tx);line-height:1.55;}
.opt.correct .opt-t{color:var(--gn);}
.opt.wrong .opt-t{color:var(--rd);}
.opt.picked .opt-t{color:var(--ac);}
.opt.correct .opt-k::after{content:" ✓";}
.opt.wrong .opt-k::after{content:" ✗";}
.match-grid{display:grid;grid-template-columns:1fr 18px 1fr;gap:8px;align-items:center;margin-bottom:.5rem;}
.match-term{padding:9px 11px;background:var(--sur2);border:1px solid var(--bdr2);border-radius:8px;font-size:12px;color:var(--tx);line-height:1.4;}
.match-arrow{color:var(--mu);font-size:13px;text-align:center;}
.msel{width:100%;font-size:12px;padding:8px 9px;border-radius:8px;border:1px solid var(--bdr2);background:var(--sur2);color:var(--tx);font-family:var(--fn);cursor:pointer;}
.msel:focus{outline:none;border-color:var(--ac);}
.msel.ok{border-color:var(--gn);background:rgba(52,201,138,.1);color:var(--gn);}
.msel.bad{border-color:var(--rd);background:var(--rdd);color:var(--rd);}
.order-rows{display:flex;flex-direction:column;gap:8px;}
.order-row{display:grid;grid-template-columns:32px 1fr;gap:10px;align-items:center;}
.order-num{width:32px;height:32px;border-radius:50%;background:var(--acd);color:var(--ac);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;border:1px solid rgba(91,141,238,.3);}
.osel{width:100%;font-size:13px;padding:8px 10px;border-radius:8px;border:1px solid var(--bdr2);background:var(--sur2);color:var(--tx);font-family:var(--fn);cursor:pointer;}
.osel:focus{outline:none;border-color:var(--ac);}
.osel.ok{border-color:var(--gn);background:rgba(52,201,138,.1);color:var(--gn);}
.osel.bad{border-color:var(--rd);background:var(--rdd);color:var(--rd);}
.hs-wrap{position:relative;display:block;width:100%;}
.hs-svg{width:100%;display:block;border-radius:8px;}
.hs-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
.hz{position:absolute;border:2px dashed transparent;border-radius:5px;cursor:pointer;pointer-events:all;transition:all .15s;}
.hz:hover{border-color:var(--ac);background:rgba(91,141,238,.1);}
.hz.picked{border-color:var(--ac);background:rgba(91,141,238,.15);}
.hz.ok{border-color:var(--gn);background:rgba(52,201,138,.15);}
.hz.bad{border-color:var(--rd);background:var(--rdd);}
.expl{margin-top:1.25rem;padding:14px 16px;border-radius:10px;background:rgba(91,141,238,.06);border-left:3px solid var(--ac);font-size:13px;color:#8a9abf;line-height:1.65;display:none;}
.expl.show{display:block;animation:up .2s ease;}
.actions{display:flex;gap:10px;margin-top:1.5rem;align-items:center;flex-wrap:wrap;}
.btn{padding:10px 22px;border-radius:8px;font-size:14px;cursor:pointer;border:1px solid var(--bdr2);background:transparent;color:var(--mu);transition:all .15s;font-family:var(--fn);}
.btn:hover{border-color:var(--tx);color:var(--tx);background:var(--sur2);}
.btn.primary{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:500;}
.btn.primary:hover{background:#4a7de0;}
.res-card{background:var(--sur);border:1px solid var(--bdr);border-radius:14px;padding:2.5rem 2rem;text-align:center;animation:up .3s ease;}
.res-badge{display:inline-block;font-size:11px;padding:4px 14px;border-radius:20px;margin-bottom:1rem;font-family:var(--mo);letter-spacing:.1em;text-transform:uppercase;}
.res-badge.pass{background:var(--gnd);color:var(--gn);border:1px solid rgba(52,201,138,.3);}
.res-badge.fail{background:var(--rdd);color:var(--rd);border:1px solid rgba(240,107,107,.3);}
.res-score{font-size:56px;font-weight:600;font-family:var(--mo);line-height:1;letter-spacing:-.03em;}
.res-pct{font-size:18px;color:var(--mu);margin-top:8px;font-family:var(--mo);}
.res-msg{font-size:15px;margin-top:1.25rem;line-height:1.6;max-width:500px;margin-left:auto;margin-right:auto;}
.dr-section{margin-top:2rem;text-align:left;border-top:1px solid var(--bdr);padding-top:1.5rem;}
.dr-section h3{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:1rem;font-family:var(--mo);}
.dr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:12px;}
.dr-n{flex:1;color:var(--mu);line-height:1.3;}
.dr-bw{width:90px;height:4px;background:var(--sur2);border-radius:2px;flex-shrink:0;}
.dr-b{height:4px;border-radius:2px;background:var(--ac);}
.dr-b.g{background:var(--gn);}
.dr-b.r{background:var(--rd);}
.dr-v{width:36px;text-align:right;color:var(--tx);font-weight:500;font-family:var(--mo);font-size:12px;flex-shrink:0;}
.type-breakdown{margin-top:1.5rem;text-align:left;border-top:1px solid var(--bdr);padding-top:1.5rem;}
.tb-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:13px;}
.tb-label{color:var(--mu);}
.tb-val{color:var(--tx);font-family:var(--mo);font-weight:500;}
.exam-info{background:var(--sur2);border:1px solid var(--bdr);border-radius:10px;padding:1rem 1.25rem;margin-bottom:1.75rem;font-size:12px;color:var(--mu);line-height:1.8;}
.exam-info span{color:var(--ac);font-family:var(--mo);}
@media(max-width:560px){.sbar{grid-template-columns:repeat(2,1fr);}.hdr{flex-direction:column;}.match-grid{grid-template-columns:1fr 14px 1fr;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div>
      <div class="logo-tag">ISC2 Certified in Governance, Risk and Compliance</div>
      <h1>CGRC Practice Exam</h1>
      <div class="hdr-sub">163 MC &middot; 7 matching &middot; 3 ordering &middot; 2 hotspot &middot; 7 domains &middot; fully offline</div>
    </div>
    <div class="timer-block" id="tb" style="display:none">
      <div class="timer" id="td">3:00:00</div>
      <div class="timer-lbl">time remaining</div>
    </div>
  </div>
  <div id="app"></div>
</div>
<script>

const DOMAINS=["Security & Privacy Governance, Risk Management, and Compliance Program","Scope of the Information System","Selection and Approval of Security and Privacy Controls","Implementation of Security and Privacy Controls","Assessment and Audit of Security and Privacy Controls","Authorization and Approval of Information System","Continuous Monitoring"];
const TOTAL_SECS=10800;
var S={screen:'start',filter:'All',count:50,timed:true,includeAdv:true,questions:[],idx:0,picked:null,answered:false,score:0,advScore:0,advTotal:0,dScore:{},dTotal:{},secs:TOTAL_SECS,ivl:null,matchSel:{},orderSel:{},hsPick:null,finished:false};
function shuffle(a){return[].slice.call(a).sort(function(){return Math.random()-.5;});}
function fmt(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h+':'+('0'+m).slice(-2)+':'+('0'+sec).slice(-2);}
function startTimer(){clearInterval(S.ivl);S.secs=TOTAL_SECS;updTimer();S.ivl=setInterval(function(){S.secs--;updTimer();if(S.secs<=0){clearInterval(S.ivl);S.finished=true;render();}},1000);}
function updTimer(){var el=document.getElementById('td');if(!el)return;el.textContent=fmt(S.secs);el.className='timer'+(S.secs<600?' dngr':S.secs<1800?' warn':'');}
function buildQs(){
  var pool=S.filter==='All'?MC_BANK:MC_BANK.filter(function(q){return q.d===S.filter;});
  var qs=shuffle(pool).slice(0,Math.min(S.count,pool.length)).map(function(q){return Object.assign({},q,{qtype:'mc'});});
  if(S.includeAdv){
    var ap=S.filter==='All'?ADV_BANK:ADV_BANK.filter(function(q){return q.d===S.filter;});
    if(ap.length){
      var sv=shuffle(ap).slice(0,Math.min(6,ap.length));
      sv.forEach(function(aq,i){var p=Math.min(Math.floor((i+1)*qs.length/(sv.length+1)),qs.length);qs.splice(p+i,0,Object.assign({},aq,{qtype:aq.type}));});
    }
  }
  return qs;
}
function initQuiz(){DOMAINS.forEach(function(d){S.dScore[d]=0;S.dTotal[d]=0;});S.questions=buildQs();S.idx=0;S.picked=null;S.answered=false;S.score=0;S.advScore=0;S.advTotal=0;S.finished=false;S.matchSel={};S.orderSel={};S.hsPick=null;S.screen='quiz';if(S.timed)startTimer();else{clearInterval(S.ivl);document.getElementById('tb').style.display='none';}render();}
function resetQ(){S.picked=null;S.answered=false;S.matchSel={};S.orderSel={};S.hsPick=null;}
function render(){var app=document.getElementById('app');var tb=document.getElementById('tb');if(S.screen==='start'){tb.style.display='none';renderStart(app);return;}tb.style.display=S.timed?'block':'none';if(S.finished){clearInterval(S.ivl);renderResult(app);return;}var q=S.questions[S.idx];if(!q){S.finished=true;render();return;}if(q.qtype==='mc')renderMC(app,q);else if(q.qtype==='match')renderMatch(app,q);else if(q.qtype==='order')renderOrder(app,q);else if(q.qtype==='hotspot')renderHotspot(app,q);}
function shortD(d){var w=d.split(' ');return w.length>4?w.slice(0,4).join(' ')+'...':d;}
function renderStart(app){
  var cards=['All'].concat(DOMAINS).map(function(d){
    var cnt=d==='All'?MC_BANK.length:MC_BANK.filter(function(q){return q.d===d;}).length;
    var sel=S.filter===d?' sel':'';
    var dn=d.replace(/'/g,"\\'");
    return '<div class="dcard'+sel+'" onclick="setF(\''+dn+'\')"><div class="dcard-n">'+d+'</div><div class="dcard-c">'+cnt+' MC questions</div></div>';
  }).join('');
  var pool=S.filter==='All'?MC_BANK:MC_BANK.filter(function(q){return q.d===S.filter;});
  var cBtns=[25,50,100].map(function(n){
    var ok=n<=pool.length;
    var selCls=S.count===n?' sel':'';
    var disCls=ok?'':' disabled';
    var clkAttr=ok?'onclick="S.count='+n+';rCounts()"':'disabled';
    return '<button class="cbtn'+selCls+disCls+'" '+clkAttr+'>'+n+'</button>';
  }).join('');
  var advSel=S.includeAdv?' sel':'';
  var mcSel=!S.includeAdv?' sel':'';
  var timedSel=S.timed?' sel':'';
  var untimedSel=!S.timed?' sel':'';
  app.innerHTML='<div class="start-card"><h2>Configure your practice exam</h2><p>CGRC is a linear exam: <strong>125 questions, 3 hours</strong>, 70% passing threshold. Seven domains weighted by the June 2024 exam update. NIST RMF and SP 800-53 are central topics.</p><div class="exam-info"><span>125 questions</span> &nbsp;-&nbsp; <span>3 hours</span> &nbsp;-&nbsp; <span>Linear (not CAT)</span> &nbsp;-&nbsp; <span>700/1000</span> to pass &nbsp;-&nbsp; <span>$599 USD</span> &nbsp;-&nbsp; 2 yrs experience &nbsp;-&nbsp; Pearson VUE</div><div class="slbl">Filter by domain</div><div class="dgrid">'+cards+'</div><div class="slbl">Number of questions</div><div class="count-row" id="cr">'+cBtns+'</div><div class="slbl">Question types</div><div class="type-row"><button class="tbtn'+advSel+'" onclick="S.includeAdv=true;rTypes()">MC + matching / ordering / hotspot</button><button class="tbtn'+mcSel+'" onclick="S.includeAdv=false;rTypes()">MC only</button></div><div class="slbl">Mode</div><div class="mode-row"><button class="mbtn'+timedSel+'" onclick="S.timed=true;rModes()">Timed (3 hrs)</button><button class="mbtn'+untimedSel+'" onclick="S.timed=false;rModes()">Untimed</button></div><div style="display:flex;align-items:center;justify-content:center;"><button class="btn primary" onclick="initQuiz()" style="font-size:15px;padding:12px 36px;">Start exam &#8594;</button></div></div>';
}
function setF(d){S.filter=d;var pool=d==='All'?MC_BANK:MC_BANK.filter(function(q){return q.d===d;});if(S.count>pool.length)S.count=pool.length>=100?100:pool.length>=50?50:25;document.querySelectorAll('.dcard').forEach(function(el){el.classList.toggle('sel',el.querySelector('.dcard-n').textContent===d);});rCounts();}
function rCounts(){var pool=S.filter==='All'?MC_BANK:MC_BANK.filter(function(q){return q.d===S.filter;});var r=document.getElementById('cr');if(!r)return;r.innerHTML=[25,50,100].map(function(n){var ok=n<=pool.length;var selCls=S.count===n?' sel':'';var disCls=ok?'':' disabled';var clkAttr=ok?'onclick="S.count='+n+';rCounts()"':'disabled';return'<button class="cbtn'+selCls+disCls+'" '+clkAttr+'>'+n+'</button>';}).join('');}
function rTypes(){document.querySelectorAll('.tbtn').forEach(function(b,i){b.classList.toggle('sel',i===0?S.includeAdv:!S.includeAdv);});}
function rModes(){document.querySelectorAll('.mbtn').forEach(function(b,i){b.classList.toggle('sel',i===0?S.timed:!S.timed);});}
function sBar(){var tot=S.questions.length,done=S.idx,cor=S.score+S.advScore,pct=done>0?Math.round(cor/done*100):0;return'<div class="sbar"><div class="stat"><div class="stat-v">'+done+'</div><div class="stat-l">Answered</div></div><div class="stat"><div class="stat-v">'+cor+'</div><div class="stat-l">Correct</div></div><div class="stat"><div class="stat-v">'+pct+'%</div><div class="stat-l">Score</div></div><div class="stat"><div class="stat-v">'+(tot-done)+'</div><div class="stat-l">Remaining</div></div></div>';}
function pBar(){var pct=Math.round(S.idx/S.questions.length*100);return'<div class="prog-w"><div class="prog-t"><div class="prog-f" style="width:'+pct+'%"></div></div><div class="prog-m"><span>Q'+(S.idx+1)+' of '+S.questions.length+'</span><span>'+pct+'% complete</span></div></div>';}
function dBar(){var btns=['All'].concat(DOMAINS).map(function(d){var act=S.filter===d?' active':'';var dn=d.replace(/'/g,"\\'");return'<button class="dbtn'+act+'" onclick="setF(\''+dn+'\');initQuiz()">'+shortD(d)+'</button>';}).join('');return'<div class="dbar">'+btns+'</div>';}

{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"ISO 31000 provides guidance on:",o:["Incident response procedures","Risk management principles and guidelines applicable to any organization or sector","Information security management systems","Cryptographic key management"],a:1,e:"ISO 31000 is a broad risk management standard providing principles, framework, and process applicable to any sector. It is not certifiable but provides overarching guidance aligned with ISO 27001 and NIST RMF."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"What is 'third-party risk management' (TPRM)?",o:["Annual financial audits of suppliers","Identifying, assessing, and mitigating risks that third parties  --  vendors, contractors, partners  --  introduce to the organization","Managing risks from cloud providers only","Managing risks from employees only"],a:1,e:"TPRM addresses risks from external parties who handle organizational data or provide critical services  --  requiring due diligence, security requirements in contracts, SLAs, and ongoing compliance monitoring."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"What is the purpose of security awareness and training in a GRC context?",o:["Auditing security configurations","Replacing technical security controls","Ensuring personnel understand security responsibilities and can execute the organization's security policies effectively","Testing system vulnerabilities"],a:2,e:"Per NIST SP 800-50 and the AT control family, security awareness and training ensures all personnel  --  from end users to executives  --  understand their role in protecting organizational information and can recognize threats."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"What does FIPS stand for and who issues FIPS standards?",o:["Federal Information Processing Standards, issued by NIST for U.S. federal agencies","Financial Information Privacy Standards, issued by the FTC","Federal Internet Protocol Standards, issued by IETF","Federated Identity Standards, issued by OMB"],a:0,e:"FIPS (Federal Information Processing Standards) are mandatory standards issued by NIST under the authority of the Secretary of Commerce, applicable to all U.S. federal agencies and contractors handling federal information."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"'Privacy by design' means:",o:["All systems must be open to privacy audits","Privacy features are added after a system is built","Only databases must store personal information","Privacy protections are built into systems and processes from the outset rather than as an afterthought"],a:3,e:"Privacy by design embeds privacy into system design and business practices from the start. It is a foundational principle of GDPR and the NIST Privacy Framework  --  proactive rather than reactive privacy protection."},
{d:"Scope of the Information System",q:"What is the purpose of FIPS 199?",o:["Providing standards for security categorization of federal information and information systems into Low, Moderate, or High impact levels","Selecting security controls","Guiding system authorization","Defining continuous monitoring requirements"],a:0,e:"FIPS 199 (Standards for Security Categorization) defines three impact levels based on potential adverse impact to confidentiality, integrity, and availability if information is compromised. These levels drive control baseline selection."},
{d:"Scope of the Information System",q:"The 'high water mark' principle in FIPS 199 means:",o:["Averaging the three CIA impact levels","Using only the availability impact level","Using only the confidentiality impact level","Taking the highest single impact level across all information types and security objectives as the overall system categorization"],a:3,e:"The high water mark: the overall system categorization equals the highest impact value across all information types and all three security objectives. If any single element is High, the system is categorized High overall."},
{d:"Scope of the Information System",q:"NIST SP 800-60 is used to:",o:["Conduct security assessments","Map information types to security categories and impact levels during the categorization process","Define security control requirements","Define authorization procedures"],a:1,e:"NIST SP 800-60 (Guide for Mapping Types of Information and Information Systems to Security Categories) maps information types to provisional impact levels as input to the FIPS 199 categorization process."}

{d:"Scope of the Information System",q:"What is a 'general support system' (GSS) in federal IT?",o:["A backup system for critical operations","Any publicly accessible website","An interconnected set of resources providing common functionality under the same direct management control  --  like network infrastructure supporting multiple applications","A general-purpose employee laptop"],a:2,e:"A GSS (NIST SP 800-18) provides infrastructure support for multiple applications. Its authorization covers the infrastructure; applications using it may reference the GSS controls as inheritable common controls."},

{d:"Selection and Approval of Security and Privacy Controls",q:"What is a 'security control baseline' in NIST SP 800-53B?",o:["A security testing checklist","A starting set of controls selected based on system impact level that can be tailored to specific organizational needs","A list of approved security vendors","A minimum security configuration for workstations"],a:1,e:"NIST SP 800-53B defines Low, Moderate, and High baselines  --  progressively comprehensive sets of controls matched to system impact level. These are the starting point before tailoring."},
{d:"Selection and Approval of Security and Privacy Controls",q:"'Tailoring' a security control baseline involves:",o:["Automatically applying all controls in the catalog","Replacing the baseline with internally developed controls","Reducing controls to meet budget constraints","Adding, removing, or adjusting controls to align with the organization's specific risk environment, operational requirements, and mission objectives"],a:3,e:"Tailoring (per SP 800-53B) includes scoping, parameter selection, compensating controls, and overlays. It customizes the baseline for specific contexts while maintaining appropriate security. All tailoring must be documented and justified."},

{d:"Selection and Approval of Security and Privacy Controls",q:"What is 'common control inheritance'?",o:["Sharing encryption keys between systems","Using the same password across systems","Reusing authorization packages from previous systems","A system leveraging security controls provided by another entity rather than implementing the same control independently"],a:3,e:"Common control inheritance reduces duplication  --  a system inheriting the data center's physical security controls doesn't need to implement its own. The Common Control Provider maintains the controls; inheriting systems document them in their SSP."},
{d:"Selection and Approval of Security and Privacy Controls",q:"What is the 'least functionality' principle supported by CM-7?",o:["Systems should have the fewest possible users","Configuring systems to provide only essential capabilities  --  disabling unnecessary functions, ports, protocols, and services","Minimizing the number of security controls","Using the simplest encryption algorithm"],a:1,e:"CM-7 requires configuring systems to support only essential functions and prohibiting unnecessary ones, reducing the attack surface. Each unnecessary service is a potential attack vector."},

{d:"Implementation of Security and Privacy Controls",q:"Which NIST SP 800-53 control requires protecting information during transmission?",o:["AU-9 (Protection of Audit Information)","SI-12 (Information Management and Retention)","AC-17 (Remote Access)","SC-8 (Transmission Confidentiality and Integrity)"],a:3,e:"SC-8 requires protecting the confidentiality and integrity of transmitted information using cryptography (TLS, IPSec). SC-8(1) specifically requires FIPS 140-3 validated encryption for federal sensitive information."},

{d:"Continuous Monitoring",q:"What is the relationship between continuous monitoring and ongoing authorization?",o:["They operate independently","Continuous monitoring is the enabler of ongoing authorization  --  providing the AO with real-time risk awareness that allows authorization to be maintained dynamically","Continuous monitoring replaces authorization","They are competing concepts"],a:1,e:"Ongoing authorization (SP 800-37 Rev 2) is sustained by continuous monitoring (SP 800-137)  --  the AO's ongoing risk awareness comes from monitoring data. Without effective monitoring, ongoing authorization cannot be credibly maintained."},
{d:"Continuous Monitoring",q:"What is FISMA reporting and what does it require organizations to provide?",o:["Only security incident reports to law enforcement","Quarterly financial reporting","Monthly technical vulnerability reports","Annual reporting to OMB and Congress on federal agency security posture  --  authorized systems, assessment results, POA&M status, major incidents, and continuous monitoring effectiveness"],a:3,e:"FISMA requires annual reporting to OMB covering: system inventories, authorization status, assessment results, training completion, incident statistics, and continuous monitoring maturity. This reporting drives accountability for agency security programs."},
{d:"Continuous Monitoring",q:"What is a 'software bill of materials' (SBOM) and its role in continuous monitoring?",o:["A machine-readable inventory of all software components and dependencies  --  enabling rapid identification of components affected by newly disclosed CVEs","A software purchase invoice","A software development project plan","A software licensing compliance document"],a:0,e:"SBOMs (per Executive Order 14028) document all components in software including open-source libraries. When a new vulnerability is disclosed, organizations with SBOMs can immediately identify which systems are affected."},
{d:"Continuous Monitoring",q:"What is 'patch management' in continuous monitoring?",o:["Managing vendor contract updates","Managing configuration changes","Updating documentation","Systematically identifying, testing, and deploying software patches within required timeframes to close known vulnerability windows"],a:3,e:"Patch management is one of the highest-value continuous monitoring activities  --  rapidly applying security patches (especially Critical/High CVEs) dramatically reduces exploitable vulnerabilities. SI-2 and RA-5 address this."}
];
const MC_BANK6=[
{d:"Continuous Monitoring",q:"What does 'ongoing assessment' in continuous monitoring involve?",o:["Automated compliance reporting only","Selectively and continuously assessing a rotating subset of controls based on their volatility and criticality  --  maintaining confidence in effectiveness without waiting for periodic comprehensive reassessments","Testing only technical controls","Reassessing all controls annually"],a:1,e:"Ongoing assessment implements different assessment frequencies based on risk  --  highly dynamic controls assessed more frequently; stable controls assessed less frequently. SP 800-137 provides frequency guidance tied to control characteristics."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"A federal agency CISO is reviewing a system that processes personally identifiable information (PII) for 2 million citizens. The system was categorized as Moderate. A privacy officer argues it should be High due to the volume of PII. The CISO disagrees because individual record sensitivity is low. Who is correct and what should drive the decision?",o:["Neither  --  all systems processing PII must be categorized High per OMB A-130","The privacy officer  --  the volume of affected individuals is a factor in determining potential impact to individuals, which can elevate the categorization","Both are wrong  --  PII categorization is determined solely by the data type table in NIST SP 800-60","The CISO  --  volume alone does not change the impact level; only sensitivity of individual records matters under FIPS 199"],a:1,e:"FIPS 199 and SP 800-60 consider both sensitivity and the potential magnitude of harm. A large-scale breach affecting 2 million individuals could have severe adverse effects on those individuals even if each record has low individual sensitivity. Volume of affected individuals is a legitimate factor in determining potential impact, and the privacy officer's concern warrants a formal impact analysis review."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"An agency's Authorizing Official has approved an ATO with a condition requiring remediation of three HIGH findings within 90 days. Day 85 arrives and two findings are closed but one remains open because the vendor has not released the patch. The ISSO should FIRST:",o:["Shut down the system immediately since the condition is not met","Close the POA&M item since it is the vendor's responsibility","Request a 30-day extension from the AO, document the vendor dependency, and implement a compensating control while awaiting the patch","Escalate to the Inspector General"],a:2,e:"When a POA&M milestone cannot be met due to circumstances outside the organization's control (vendor patch unavailability), the correct action is to notify the AO, document the dependency, request a milestone extension with justification, and implement a compensating control to reduce risk during the delay. This is standard POA&M management practice per SP 800-37."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"A security analyst discovers that a third-party cloud provider used for email services has suffered a breach exposing agency employee email metadata. The cloud contract does not include a security incident notification requirement. What is the PRIMARY lesson and corrective action?",o:["Ensure future contracts include incident notification requirements, SLAs for security reporting, and right-to-audit clauses  --  and retroactively amend the current contract if possible","Classify all email as sensitive to prevent future breaches","Report the breach to CISA and take no further action on the contract","Immediately terminate the cloud contract and migrate to on-premises email"],a:0,e:"This scenario illustrates a supply chain risk management gap. Contracts with external providers (SA-9) must include security requirements  --  incident notification timelines, security reporting obligations, and audit rights. The immediate corrective action is retroactive contract amendment and the long-term fix is ensuring all future contracts contain these provisions per SP 800-161 and NIST RMF Prepare step guidance."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"During an organization-wide risk assessment, the risk executive identifies that four different business units each have independently accepted similar medium-level risks. Individually each acceptance is within unit-level tolerance, but in aggregate they represent an unacceptable enterprise-level exposure. This is an example of:",o:["Risk aggregation  --  where individually acceptable risks combine to exceed enterprise risk tolerance, requiring organization-level intervention","Risk avoidance through decentralization","Risk transference across business units","Normal risk management where unit-level decisions are always sufficient"],a:0,e:"Risk aggregation (SP 800-39, Tier 1) occurs when risks that appear acceptable at the system or business unit level combine at the enterprise level to exceed organizational risk capacity. The risk executive function exists specifically to prevent this  --  maintaining enterprise-level visibility and overriding unit-level decisions when aggregate risk is unacceptable."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"An agency is preparing its annual FISMA report. The CISO notes that 15% of systems have expired ATOs (more than 3 years old without reauthorization). Under the ongoing authorization model in SP 800-37 Rev 2, what is the correct interpretation of this situation?",o:["15% expired ATOs is within acceptable FISMA tolerances and requires no action","Only systems with HIGH categorization need active authorization maintenance","Expired ATOs are a critical FISMA finding requiring immediate system shutdown","Under ongoing authorization, a fixed 3-year expiration is replaced by continuous monitoring  --  but systems without active monitoring programs and current AO risk awareness are effectively unauthorized regardless of whether a date has passed"],a:3,e:"SP 800-37 Rev 2 moves away from fixed-term ATOs toward ongoing authorization maintained through continuous monitoring. However, 'ongoing' authorization requires that the AO maintains current, documented awareness of system risk through active monitoring. Systems without effective monitoring programs lack the evidence base for ongoing authorization  --  they are effectively operating without valid authorization regardless of any prior ATO date."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"A program manager argues that implementing all NIST SP 800-53 High baseline controls for a new Moderate system will make it 'more secure' and therefore should be done regardless of cost. The CISO should respond that:",o:["The program manager is correct  --  more controls always equals more security","The decision should be escalated to the Inspector General","All controls in SP 800-53 should always be implemented to ensure compliance","Security controls should be proportionate to risk. Implementing High baseline controls on a Moderate system adds cost and operational burden without commensurate risk reduction, and may actually impede mission by creating unnecessary restrictions"],a:3,e:"The RMF is explicitly risk-based. Implementing controls disproportionate to actual risk wastes resources, creates operational friction, and may impede mission without improving security. NIST SP 800-53B baselines are calibrated to provide appropriate protection at each impact level. Tailoring should be justified by risk  --  not by a desire to over-invest."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"A newly appointed SAISO inherits a risk management program where each system's AO makes independent risk acceptance decisions with no enterprise oversight. Several AOs have each accepted risks that, when combined, leave the agency with no effective defense-in-depth for its most critical mission systems. The SAISO should FIRST establish:",o:["A policy requiring all AOs to use only the High baseline","A mandatory re-authorization of all systems","An enterprise risk management function providing Tier 1 oversight  --  setting organizational risk tolerance, reviewing aggregate risk posture across all systems, and overriding individual AO decisions that conflict with enterprise risk capacity","A new AO training program"],a:2,e:"This describes the need for the Tier 1 (organizational) risk management function described in SP 800-39. Without enterprise oversight, siloed risk decisions can collectively undermine security. The risk executive function establishes organizational risk tolerance, reviews aggregate posture, and ensures system-level decisions align with enterprise risk capacity."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"An organization subject to GDPR receives a data subject access request (DSAR) asking for all personal data held about that individual. The organization has 30 days to respond but cannot locate all PII because it lacks a comprehensive data inventory. The root cause of this problem from a GRC perspective is:",o:["Insufficient encryption of personal data","Failure to train employees on GDPR requirements","Absence of a privacy officer","Lack of a data inventory  --  a foundational privacy control (data mapping) that must be maintained to meet GDPR Article 30 requirements and respond to DSARs"],a:3,e:"GDPR requires organizations to maintain records of processing activities (Article 30) and respond to DSARs within 30 days. The inability to locate PII traces directly to a missing data inventory/mapping program  --  a foundational privacy control. Without knowing what PII you hold and where it is, privacy compliance is impossible."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"A risk assessment identifies a critical vulnerability in an internet-facing web application. The system owner proposes accepting the risk because remediation would require a 2-week system outage. The Authorizing Official should:",o:["Automatically accept the risk since the system owner proposed it","Evaluate whether a compensating control (WAF rules, temporary access restriction, or increased monitoring) can reduce risk to an acceptable level during the remediation window, then make a documented risk acceptance or remediation decision","Deny the ATO immediately","Defer the decision to the Inspector General"],a:1,e:"Risk acceptance must be an informed, documented AO decision  --  not automatic approval of whatever the system owner proposes. When remediation has operational impact, the AO should evaluate whether compensating controls can bridge the risk gap, establish a firm remediation timeline, and document the basis for whatever decision is made. This is core to the AO's ongoing authorization responsibilities."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"During the Prepare step of the RMF, an agency is establishing roles and responsibilities. The program manager wants to serve as both the System Owner and the Security Control Assessor for cost savings. Why is this problematic?",o:["Only the AO role cannot be combined with other roles","There is no conflict  --  these roles can be combined for small systems","The assessor must be independent of the system development and management process  --  a system owner assessing their own controls creates a conflict of interest that undermines the validity of assessment findings","Program managers are not qualified to perform either role"],a:2,e:"SP 800-37 requires assessor independence  --  the SCA must not have been involved in developing, implementing, or managing the system being assessed. A system owner has direct stake in the system's success and cannot objectively assess their own controls. This independence requirement is fundamental to the credibility of the authorization package."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"An agency has a legacy system running on an operating system that is no longer supported by the vendor (end of life). The system handles Moderate-impact data and cannot be replaced for 18 months. What is the MOST appropriate risk management approach?",o:["Accept the risk with no additional controls since migration is already planned","Recategorize the system as Low to reduce control requirements","Immediately shut down the system","Implement compensating controls (network isolation, enhanced monitoring, application whitelisting, virtual patching), document the residual risk in the POA&M with a firm migration timeline, and obtain AO approval to continue operating under these conditions"],a:3,e:"End-of-life systems present significant risk (no security patches for new CVEs) but immediate shutdown is often operationally infeasible. The correct approach is: implement compensating controls to reduce exposure, document the situation thoroughly in the POA&M with milestones, quantify residual risk, and obtain the AO's explicit, informed acceptance. The 18-month timeline must be firm and tracked."},
{d:"Security & Privacy Governance, Risk Management, and Compliance Program",q:"A compliance officer insists that achieving ISO 27001 certification means the agency has satisfied all FISMA requirements. This statement is:",o:["Correct for civilian agencies but not for national security systems","Incorrect  --  ISO 27001 certification demonstrates an ISMS meeting international standards, but FISMA requires specific compliance with NIST standards (SP 800-53 controls, RMF process, FISMA reporting) which are distinct from ISO 27001 requirements","Correct if the agency is a contractor rather than a federal agency","Correct  --  ISO 27001 and FISMA are equivalent frameworks"],a:1,e:"ISO 27001 and FISMA are complementary but distinct. FISMA mandates use of NIST standards (SP 800-53, SP 800-37 RMF, FIPS 140-3, etc.) which are not fully mapped to ISO 27001. ISO 27001 certification does not satisfy FISMA reporting requirements, RMF process requirements, or the specific control requirements of SP 800-53. Both can coexist, but neither fully satisfies the other."},
{d:"Scope of the Information System",q:"A system owner is defining the authorization boundary for a web application. The application uses a shared database server also used by three other applications, a shared load balancer, and a shared authentication service managed by the enterprise IT team. Which approach is MOST correct?",o:["Include all shared components in the web application's authorization boundary","Include only the web application code in the boundary","Authorize each shared component separately with no inheritance","Exclude shared components and document them as common controls or external services inherited from their respective authorizations  --  the web application boundary should include only what the application owner manages directly"],a:3,e:"Authorization boundaries should reflect actual management control. Shared infrastructure managed by another entity (enterprise IT) should be handled as common controls (if within the same organization's ATO framework) or external services (if outside). Including components the system owner doesn't manage creates false responsibility and assessment scope creep. Document inheritance and external dependencies clearly in the SSP."}
];
const MC_BANK7=[
{d:"Scope of the Information System",q:"A FIPS 199 categorization workshop determines that a system processes two information types: Administrative Financial (Low/Low/Low) and Law Enforcement Sensitive (Moderate/High/Moderate). What is the overall system categorization?",o:["High  --  because the high water mark principle selects the highest value across all information types and security objectives (Integrity = High)","Moderate/High/Moderate  --  because we report each CIA component separately","Low  --  because the majority of information types are Low","Moderate  --  because we average the impact levels"],a:0,e:"FIPS 199 high water mark: the overall system categorization takes the highest single value across all information types and all three security objectives. Law Enforcement Sensitive has an Integrity impact of High. Under the high water mark, the system is categorized HIGH overall. This drives selection of the SP 800-53B High baseline for control selection."},
{d:"Scope of the Information System",q:"A system owner wants to exclude a mobile app from the authorization boundary because 'it's just a front-end UI and contains no data.' The security team disagrees. Who is likely correct and why?",o:["The system owner  --  UI components with no local data storage are always excluded","Neither  --  mobile apps always require a separate authorization","The security team  --  if the mobile app authenticates users, transmits sensitive data to backend services, and presents sensitive information on screen, it is part of the system boundary regardless of local data storage. Excluding it would leave authentication, transmission, and display controls outside the scope of assessment","The ISSO should decide based on the app's download count"],a:2,e:"Authorization boundary decisions must reflect actual data flow and security risk, not just data storage. A mobile app that authenticates users and displays sensitive data is a critical attack surface  --  authentication weaknesses, insecure transmission, and screen capture attacks are all in-scope risks. Excluding it from the boundary means those controls will never be assessed, leaving a gap."},
{d:"Scope of the Information System",q:"During system characterization, a team discovers that the system shares a database with another authorized system. The database contains data from both systems. How should this be handled in the authorization boundary?",o:["Exclude the database from both boundaries since it is shared","Create a new standalone authorization for the database only","Document the shared database as an interconnection and evaluate whether it should be within one system's boundary (as a common resource) or treated as a shared service, and establish an ISA to govern the interface. Both SSPs must document the dependency","Both systems share the database ATO  --  no additional action needed"],a:2,e:"Shared components require explicit boundary decisions and documentation. Options include: designating one system as the database owner (common control provider) and having the other inherit, or treating it as a shared service with both systems documenting the dependency. An Interconnection Security Agreement (ISA) documents the interface requirements. Undocumented sharing is a common finding in authorizations."},
{d:"Scope of the Information System",q:"A privacy officer is reviewing a system that collects name, email address, and work phone number of agency employees for an internal directory. The system owner argues no PIA is needed because 'it's just work contact information.' The privacy officer should:",o:["Escalate to legal counsel before making any determination","Agree  --  work contact information is not PII","Conduct a Privacy Threshold Analysis (PTA) to determine whether the information constitutes PII. Work contact information can constitute PII and requires PTA; if PII is confirmed, a PIA is required regardless of perceived sensitivity","Require a full PIA immediately without conducting a PTA first"],a:2,e:"A PTA is the correct first step  --  it determines whether PII is present and whether a PIA is required. Name and email address are PII regardless of context (personal or work). OMB A-130 requires a PTA for all federal information systems to determine PIA necessity. The system owner's judgment about sensitivity does not determine whether PII controls apply."},
{d:"Scope of the Information System",q:"An organization is planning to migrate a Moderate-impact system to a FedRAMP-authorized cloud service. The system owner asks whether re-categorization is needed. The correct answer is:",o:["Yes  --  moving to a cloud environment may change the threat landscape, interconnections, and operating environment, potentially affecting the categorization. A formal review is required, though the categorization may remain Moderate if the analysis confirms no material change","No  --  moving to the cloud always reduces impact level to Low","No  --  categorization is based solely on data type and does not change with environment","Yes  --  all cloud-hosted systems must be recategorized as High"],a:0,e:"Moving to a cloud environment changes the operating environment  --  shared tenancy, new interconnections, different physical security, and a different threat landscape. SP 800-37 requires reviewing categorization when the operating environment changes significantly. The categorization may not change, but the formal review process is required to confirm it. The system's SSP must also be updated to reflect the new environment."},
{d:"Scope of the Information System",q:"A system categorized as Low impact is going to begin processing a new information type: sensitive personally identifiable information (SPII) including SSNs and financial account numbers. What is the correct action BEFORE the new data is processed?",o:["No action needed  --  the categorization can be updated at next reauthorization","Lower the categorization to avoid additional control requirements","The system must be recategorized immediately. SPII including SSNs and financial account numbers is typically Moderate or High impact for confidentiality. Processing this data without re-categorization, updated controls, and updated authorization would mean operating without appropriate security measures","Update only the privacy documentation, not the security categorization"],a:2,e:"Adding a new information type with significantly higher sensitivity changes the system's security categorization, which in turn changes the required control baseline. Operating a system with inadequate controls for the data it actually processes is a fundamental security failure. The correct sequence: re-categorize -> identify new controls needed -> implement -> re-assess -> obtain updated authorization before processing SPII."},
{d:"Scope of the Information System",q:"A system boundary diagram shows 50 servers, 3 databases, 2 web applications, and a batch processing job. During assessment, the assessor discovers an untracked ETL (extract-transform-load) process that moves data from one of the databases to an external analytics platform. This is MOST accurately described as:",o:["An undocumented data flow potentially outside the authorization boundary  --  a significant finding that could mean sensitive data is leaving the authorization boundary without assessed controls governing that transmission and the external platform","An issue only if the analytics platform is in a different network","A normal part of any database system","A minor configuration issue requiring only documentation"],a:0,e:"Undocumented data flows are one of the most common and serious authorization boundary gaps. If data is leaving the boundary to an external platform, that transmission and the receiving system should have been assessed as part of the interconnection (ISA) and the data sensitivity must be evaluated for the new destination. This is a significant SAR finding requiring POA&M entry."},
{d:"Selection and Approval of Security and Privacy Controls",q:"A system owner reviews the Moderate baseline from SP 800-53B and decides to remove AC-17 (Remote Access) because 'no remote access is currently planned.' Six months later, COVID-19 forces the entire workforce remote and the system must allow VPN access with no prior security assessment of remote access controls. What risk management principle was violated?",o:["Access control decisions are always reversible with no risk impact","Least functionality  --  unnecessary services should be disabled","The system owner had authority to make this tailoring decision  --  no principle was violated","Failure to consider likely future requirements during tailoring. Removing controls with documented justification is acceptable, but the tailoring decision should have included a plan to reassess if remote access became necessary. The lesson is that tailoring requires forward-looking risk analysis, not just current-state assessment"],a:3,e:"Tailoring decisions require consideration of the full operational context including likely future states. Removing AC-17 based on current state without acknowledging it might be needed created a gap that materialized under crisis conditions. Risk-based tailoring must document the assumption (no remote access) and include a trigger for reassessment if that assumption changes  --  not simply remove the control and forget it."},
{d:"Selection and Approval of Security and Privacy Controls",q:"A security engineer proposes implementing SC-28 (Protection of Information at Rest) using a home-grown encryption algorithm developed internally, arguing it is 'proprietary and therefore more secure.' The CISO should reject this because:",o:["SC-13 requires use of NIST-approved cryptographic algorithms and FIPS 140-3 validated modules for federal systems. Home-grown algorithms have not undergone the rigorous public cryptanalysis that NIST-approved algorithms (AES, SHA-3) have  --  security through obscurity is not a valid substitute for validated cryptography","The algorithm hasn't been patented yet","Proprietary encryption is more expensive than commercial solutions","Internal development of encryption is prohibited by FISMA"],a:0,e:"SC-13 requires NIST-approved, FIPS-validated cryptography. The cryptographic community long ago established that home-grown algorithms should never be trusted for security  --  not because they're necessarily weak in design, but because they haven't undergone the decades of public scrutiny that AES, SHA-3, and RSA have. 'Security through obscurity' (hiding the algorithm) violates fundamental cryptographic principles."},
{d:"Selection and Approval of Security and Privacy Controls",q:"An assessor reviewing a system's SSP finds that the system owner documented AC-6 (Least Privilege) as 'Satisfied' but the system has 47 accounts with administrator privileges out of 200 total users (23.5%). The assessor should:",o:["Document AC-6 as 'Other Than Satisfied'  --  23.5% of users having admin privileges almost certainly violates least privilege regardless of any policy documentation, and warrants a finding requiring access rights review and reduction","Ask the system owner to explain the business need before making a determination","Accept the system owner's self-attestation","Escalate only if some users have domain admin rights"],a:0,e:"AC-6 requires that users have only the access required for their specific job functions. 23.5% admin accounts is a red flag that warrants deep scrutiny. Even if there is some business justification for elevated access, the assessor's role is to independently verify  --  not accept self-attestation. The finding should be documented with evidence (account listing), and the system owner should be required to demonstrate each admin account has legitimate justification."},
{d:"Selection and Approval of Security and Privacy Controls",q:"A system is migrating to a FedRAMP-authorized cloud service. The cloud provider's FedRAMP package documents that they are responsible for physical security (PE controls) and network infrastructure (SC-7 boundary protection at the datacenter level). The agency is responsible for application-level access control and data encryption. This division of responsibility is BEST described as:",o:["The FedRAMP shared responsibility model  --  the CSP manages infrastructure controls (inherited by the agency), the agency manages controls for their application and data. Both parties' responsibilities must be documented in the agency's SSP and in the FedRAMP customer responsibility matrix","A compliance gap that must be resolved before migration","Acceptable only for Low-impact systems","A violation of SP 800-53 requiring dual implementation of all controls"],a:0,e:"FedRAMP's shared responsibility model explicitly divides controls between the CSP (infrastructure layer  --  physical, network, hypervisor) and the customer (application, data, identity management layer). The agency inherits CSP-managed controls and implements customer-managed controls. Both must be documented  --  the agency's SSP must reflect which controls are inherited from the FedRAMP package and which are agency-implemented."},
{d:"Selection and Approval of Security and Privacy Controls",q:"During tailoring, a system owner wants to add a control not in SP 800-53  --  specifically, requiring all API access to use client certificate mutual TLS authentication. This type of addition is BEST described as:",o:["Only valid if approved by NIST","An organization-defined control or control enhancement. SP 800-53B allows organizations to add controls beyond the baseline when risk analysis identifies the need. The control should be documented in the SSP with justification and assessed as part of the authorization process","Prohibited  --  only controls from SP 800-53 may be used","Automatically satisfying SC-8 without separate documentation"],a:1,e:"Organizations are explicitly permitted to add controls beyond SP 800-53 baselines when risk analysis supports it. SP 800-53B's tailoring process includes adding organization-defined controls. These must be documented in the SSP with rationale and are subject to assessment like any other control. Mutual TLS for APIs is a legitimate enhancement for systems with high-value API integrations."},
{d:"Selection and Approval of Security and Privacy Controls",q:"A new cybersecurity analyst asks why NIST SP 800-53 Rev 5 contains both 'security controls' and 'privacy controls' in the same catalog when they seem to serve different purposes. The correct explanation is:",o:["Rev 5 integrated privacy controls (previously in SP 800-53 Appendix J) directly into the control catalog because security and privacy are interconnected  --  many security controls directly support privacy objectives (encryption, access control, audit logging), while dedicated privacy controls (PT, IP families) address privacy-specific requirements like consent, transparency, and individual redress that go beyond security","Privacy controls only apply to healthcare organizations under HIPAA","Privacy controls are optional additions only required under GDPR","They are identical  --  privacy and security controls are the same thing"],a:0,e:"SP 800-53 Rev 5 was a landmark revision that integrated privacy directly into the control catalog. This reflects the recognition that security and privacy are interrelated but distinct disciplines  --  a system can be secure (no unauthorized access) but still violate privacy (collecting more data than necessary). The integrated catalog ensures organizations consider both simultaneously during control selection."},
{d:"Selection and Approval of Security and Privacy Controls",q:"A risk assessment identifies that the organization's most critical system has no controls addressing supply chain risk for its commercial off-the-shelf (COTS) software components. Under SP 800-53 Rev 5, which control family should be consulted FIRST?",o:["SR  --  Supply Chain Risk Management","CM  --  Configuration Management","SI  --  System and Information Integrity","SA  --  System and Services Acquisition"],a:0,e:"SP 800-53 Rev 5 added the SR (Supply Chain Risk Management) control family specifically to address supply chain risks. SR controls (SR-2 Supply Chain Risk Management Plan, SR-3 Supply Chain Controls and Processes, SR-11 Component Authenticity) govern requirements for hardware and software provenance, trusted suppliers, and supply chain incident response. SA controls address acquisition process security more broadly."}
];
const MC_BANK8=[
{d:"Selection and Approval of Security and Privacy Controls",q:"An organization uses a shared identity management service for all its systems. This service manages user accounts, MFA, and single sign-on. Under the RMF, IA controls for individual systems would MOST appropriately be documented as:",o:["Only AC controls can be inherited; IA must always be system-specific","IA controls are always system-specific and cannot be inherited","Each system must independently implement all IA controls","IA controls are inherited as common controls from the identity management service's authorization. Individual system SSPs document the inheritance, identify any system-specific IA requirements not covered by the common service, and reference the identity service's control documentation"],a:3,e:"Shared enterprise services (identity management, physical security, network infrastructure) are classic common control providers. Systems using the shared identity service inherit its IA controls and document that inheritance in their SSP. This is one of the primary efficiency benefits of the common control model  --  implementing and assessing centralized identity management once rather than once per system."},
{d:"Selection and Approval of Security and Privacy Controls",q:"A system owner is tailoring the Moderate baseline and wants to remove AU-14 (Session Audit) because 'the system doesn't process classified information.' The security team should respond that:",o:["All Moderate baseline controls are mandatory and cannot be removed","AU-14 is not in the Moderate baseline, so no action is needed","The system owner is correct  --  AU-14 only applies to classified systems","Tailoring decisions must be risk-based and documented, not made based on classification level alone. AU-14 (session recording for privileged users) may be appropriate for Moderate systems handling sensitive PII or financial data. The removal should only proceed with documented risk analysis showing that the residual risk without AU-14 is acceptable given other compensating controls"],a:3,e:"Classification level is not the only criterion for control applicability. The CGRC exam heavily tests that tailoring must be risk-based  --  any removal requires documented justification showing that the control is not applicable to the specific environment OR that compensating controls provide equivalent protection. 'It's not classified' is insufficient justification for removing a control from a sensitive system."},
{d:"Selection and Approval of Security and Privacy Controls",q:"A program manager is reviewing the cost of implementing the full SP 800-53B High baseline for a new system. They want to implement 'risk-informed tailoring' to reduce the number of controls. An auditor warns that removing controls from the High baseline requires extensive documentation. Who best characterizes proper tailoring?",o:["The program manager  --  tailoring is explicitly authorized and every control should be evaluated for applicability. However, controls removed or modified require documented justification in the SSP showing the rationale (not applicable, compensating control, accepted risk) and the AO must concur. Tailoring is not a cost-reduction shortcut but a risk-management tool","Tailoring documentation is optional if cost savings exceed 20% of the security budget","The auditor  --  all controls in the High baseline are mandatory and cannot be removed","Both are wrong  --  only the SAORM can authorize tailoring of the High baseline"],a:0,e:"Both perspectives contain truth, but the program manager's risk-based approach better represents NIST's intent. Tailoring IS authorized and expected  --  SP 800-53B explicitly states baselines are starting points. However, every tailoring decision must be documented in the SSP with rationale, and the AO must understand and accept the resulting risk posture. Tailoring for cost alone without risk analysis is inappropriate."},
{d:"Implementation of Security and Privacy Controls",q:"A system administrator is terminated involuntarily after a workplace dispute. The ISSO is notified two weeks later when the former employee's badge access is finally revoked. Which control failure does this MOST directly represent?",o:["A minor process gap with low risk since physical access was also present","Physical security failure  --  badge access should require biometrics","An HR compliance issue outside the scope of the information security program","PS-4 (Personnel Termination) and AC-2 (Account Management) failure  --  immediate revocation of all logical and physical access upon termination is required. Two weeks of continued access for a disgruntled former employee represents significant insider threat exposure"],a:3,e:"PS-4 requires immediate notification to security teams upon termination and revocation of all access (logical and physical). AC-2 requires timely account disabling/removal. Two weeks of access for an involuntarily terminated employee with knowledge of systems is a critical insider threat risk. ISSO notification procedures and automatic account disable workflows must be established to prevent this gap."},
{d:"Implementation of Security and Privacy Controls",q:"A penetration tester gains access to a production database by exploiting the fact that a developer account (used for testing 6 months ago) was never disabled. This account had database administrator privileges. This finding MOST directly indicates failure of:",o:["AU-6  --  Audit Review and Analysis","SC-28  --  Protection of Information at Rest","AC-2 (Account Management)  --  accounts that are no longer needed must be disabled or removed; and AC-6 (Least Privilege)  --  a developer account should never have had persistent database administrator privileges in production","SI-3  --  Malicious Code Protection"],a:2,e:"This is a classic AC-2 and AC-6 finding. AC-2 requires periodic account reviews and disabling of accounts that are no longer needed. AC-6 requires that accounts have only the minimum privileges needed  --  a developer's temporary testing account with persistent DBA rights in production violates both. This combination is extremely common in real breaches."},
{d:"Implementation of Security and Privacy Controls",q:"An organization implements encryption for all data at rest on its servers using a FIPS 140-3 validated tool. However, the encryption keys are stored in a plaintext configuration file on the same servers, accessible to any user with read access to that directory. This implementation:",o:["Requires only a documentation update to the SSP","Is acceptable if the directory has restricted permissions","Defeats the purpose of encryption at rest. SC-28 requires encryption, but SC-12 (Cryptographic Key Management) requires keys to be protected commensurate with the sensitivity of the data they protect. Storing keys alongside the encrypted data removes all confidentiality protection  --  anyone with access to the server can decrypt the data","Is fully compliant since FIPS 140-3 validated encryption is used"],a:2,e:"Encryption is only as strong as key management. SC-12 requires proper key management  --  keys must be protected at least as strongly as the data they protect, using hardware security modules (HSMs), key vaults, or other approved mechanisms. Storing encryption keys in plaintext adjacent to encrypted data effectively provides no confidentiality protection."},
{d:"Implementation of Security and Privacy Controls",q:"A large agency runs 200 servers. A critical patch addressing a CVE with a CVSS score of 9.8 (Critical) is released on a Tuesday. Agency policy requires Critical patches be applied within 30 days. On day 3, an attacker exploits the vulnerability on an unpatched server. An auditor later asks why the patch wasn't applied sooner. The ISSO should explain:",o:["Only internet-facing servers require expedited patching","The 30-day window for Critical patches is dangerously long given modern exploit timelines. CISA BOD 22-01 requires CVEs in its Known Exploited Vulnerability catalog to be patched within 2 weeks (or less for actively exploited issues). The ISSO should recommend revising patch policy to emergency patch timelines (24-72 hours) for Critical vulnerabilities with active exploitation","Patching all 200 servers in 3 days is impossible so no failure occurred","30-day policy was met since the breach occurred within the window"],a:1,e:"CVSS 9.8 with active exploitation warrants emergency response  --  CISA's BOD 22-01 and continuous monitoring best practices (SP 800-137) require risk-based patch response timelines. A 30-day uniform window is inadequate for Critical/actively exploited vulnerabilities. The ISSO should escalate and advocate for tiered patch SLAs: Critical/active exploitation = 24-72 hours; Critical = 7 days; High = 14-30 days."},
{d:"Implementation of Security and Privacy Controls",q:"An ISSO is reviewing a system that processes HIPAA-regulated health information. The system has a valid ATO and implements the NIST Moderate baseline. A HIPAA auditor flags several gaps versus the HIPAA Security Rule requirements. The ISSO responds that the system has a valid ATO under NIST. Who is correct?",o:["Only the most recent audit finding governs","The auditor  --  FISMA/NIST compliance and HIPAA compliance are separate legal obligations. The NIST Moderate baseline does not guarantee satisfaction of all HIPAA Security Rule requirements. Organizations subject to multiple regulatory frameworks must satisfy all applicable requirements, not just one","Both are wrong  --  HIPAA and NIST have been harmonized and are now identical","The ISSO  --  a valid ATO supersedes all other compliance requirements"],a:1,e:"Multiple regulatory frameworks can apply simultaneously. A HIPAA-covered federal agency must satisfy both FISMA/NIST requirements AND the HIPAA Security Rule. NIST provides guidance on mapping between frameworks, but a NIST ATO does not automatically equal HIPAA compliance. The organization must address gaps between what NIST requires and what HIPAA additionally mandates."},
{d:"Implementation of Security and Privacy Controls",q:"A developer argues that since all data is encrypted in transit (TLS 1.3), there is no need to implement application-level input validation for the web application. The security architect should respond:",o:["TLS 1.3 is not FIPS-approved so neither control is valid","Only database inputs require validation; web form inputs are lower risk","The developer is correct  --  TLS 1.3 is sufficient for all application security","TLS protects data in transit from network interception but has no effect on application-layer attacks. Input validation (SI-10) protects against injection attacks (SQL injection, XSS, command injection) that occur AFTER the TLS session is established. Defense in depth requires both transport security AND application security controls"],a:3,e:"TLS and input validation operate at different layers and protect against different threats. TLS prevents network interception; input validation prevents application-layer attacks that occur within the established session. SI-10 (Information Input Validation) is a distinct requirement from SC-8 (Transmission Confidentiality). Defense in depth requires controls at every layer  --  eliminating one because another exists at a different layer is a logical error."},
{d:"Implementation of Security and Privacy Controls",q:"A business continuity exercise reveals that the IT team can restore a critical system from backup within 4 hours, but the system's Recovery Time Objective (RTO) is 2 hours. This exercise finding should result in:",o:["Accepting the 4-hour recovery as close enough to 2 hours","Revising the RTO to 4 hours since that is what is achievable","A POA&M entry requiring investment in faster recovery capabilities (hot standby, improved backup infrastructure) to meet the 2-hour RTO that mission requirements dictate. The RTO is driven by mission need, not by current recovery capability  --  technology must be improved to meet the objective, not the objective lowered to match current capability","Reclassifying the system's availability impact as Moderate"],a:2,e:"RTOs are mission-driven  --  they express how long the mission can tolerate a system outage. If current technology cannot meet the mission-driven RTO, that is a gap requiring investment, not a reason to weaken the objective. CP-4 (Contingency Plan Testing) exists precisely to discover these gaps before an actual disaster. The finding goes in the POA&M with a funded remediation plan."},
{d:"Implementation of Security and Privacy Controls",q:"An organization implements SC-7 (Boundary Protection) using a next-generation firewall. The firewall is configured to allow all outbound traffic by default ('permit any any' outbound). A security reviewer flags this as inadequate. Why?",o:["Firewalls should only be configured with inbound rules","Outbound filtering is only required for High-impact systems","The firewall brand determines whether outbound filtering is required","SC-7 requires monitoring and controlling communications at system boundaries in BOTH directions. Unrestricted outbound traffic enables command-and-control (C2) communication by malware, data exfiltration, and other egress-based attacks. Effective boundary protection requires egress filtering to restrict outbound traffic to only authorized destinations and protocols"],a:3,e:"SC-7 boundary protection applies to traffic in both directions. Unrestricted outbound is one of the most common and dangerous misconfigurations  --  it allows malware to communicate with C2 servers, enables data exfiltration, and permits lateral movement to external systems. NIST and CISA both emphasize egress filtering as a critical security control. The 'permit any any' outbound rule effectively neutralizes the firewall for half of its protective function."},
{d:"Implementation of Security and Privacy Controls",q:"A system handles financial transaction data and is subject to PCI DSS in addition to NIST RMF. The PCI requirement to maintain a cardholder data environment (CDE) segmented from all other networks maps to which NIST SP 800-53 control?",o:["MP-4  --  Media Storage","AC-4  --  Information Flow Enforcement","CM-7  --  Least Functionality","SC-7  --  Boundary Protection, combined with SC-2 (Separation of System and User Functionality) and AC-4 (Information Flow Enforcement). Network segmentation of sensitive data environments is addressed by the SC and AC control families, with SC-7 being the primary boundary protection control"],a:3,e:"PCI DSS network segmentation requirements map primarily to SC-7 (Boundary Protection), AC-4 (Information Flow Enforcement), and SC-2. The CDE isolation requirement is essentially a strict implementation of boundary protection  --  controlling all traffic flows in and out of the CDE using firewalls, ACLs, and network segmentation. Organizations mapping PCI to NIST can use these control families as the framework for meeting PCI segmentation requirements."},
{d:"Implementation of Security and Privacy Controls",q:"An organization's security policy requires MFA for all privileged access but a system uses a shared 'root' account with only a password for database administration, justified as 'necessary for legacy application compatibility.' This situation should be handled by:",o:["Issuing a waiver to the policy and taking no further action","Recategorizing the system as Low to reduce IA requirements","Implementing MFA as required or, if technically infeasible, implementing a compensating control (PAM solution with session recording and access approval workflow, IP restriction, enhanced audit logging of all root activity) and documenting the technical constraint in the SSP with AO approval of the compensating control approach","Accepting the risk since legacy applications are exempted from MFA requirements"],a:2,e:"Shared privileged accounts without MFA represent significant risk, but if legacy technical constraints genuinely prevent MFA implementation, compensating controls are the appropriate response  --  not acceptance without mitigation. A Privileged Access Management (PAM) solution that records and controls all privileged sessions, requires approval workflows, and generates alerts provides meaningful compensating protection. The constraint must be documented in the SSP and accepted by the AO."},
